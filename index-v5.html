<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--cream, #f7f3ec);
    background-image:
      radial-gradient(ellipse at 10% 90%, rgba(58, 107, 42, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 5%, rgba(139, 94, 60, 0.04) 0%, transparent 50%);

    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;

  #shell { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 0; }

    .v5-frame-outer { width: min(100vw - 64px, 820px) !important; max-width: 820px !important; }

      height: min(100vh - 64px, 1000px) !important;

      border-radius: 16px !important;

<body>
<a class="v5-eyebrow" href="index.html">← Legacy launcher</a>
<div id="shell"><div id="root"></div></div>

<script type="text/babel" data-presets="react">
'use strict';

// ── Theme tokens ────────────────────────────────────────────────────────────
const T = {
  soil:'#3a2510', soilMid:'#52331a',
  cedar:'#8b5e3c', cedarPale:'#e0c8a8', cedarWash:'#f2e8d8',
  leaf:'#3a6b2a', leafBright:'#4e8c3c', leafPale:'#c8e6c0', leafWash:'#edf5e8',
  sun:'#d4a820', sunBright:'#e8c84a', sunPale:'#faf0c0',
  rust:'#b84a1a', rustLight:'#d4651a',
  cream:'#f7f3ec', creamMid:'#ede5d8',
  panel:'#fffdf9',
  text:'#1e1208', textMid:'#4a3018', textSoft:'#6f5840', textMuted:'#9a8068',
  border:'#c8b090', borderSoft:'#dfd0b8',
  rain:'#8ba8b5',
  fontDisp: "'Fraunces', Georgia, serif",
  fontSerif:"'Lora', Georgia, serif",
  fontSans: "'DM Sans', system-ui, sans-serif",
  fontMono: "'DM Mono', ui-monospace, monospace",
};

// ── Date helpers ────────────────────────────────────────────────────────────
function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
const TODAY = new Date();
const WEEK_NOW = isoWeek(TODAY);
const DAY_OF_SEASON = Math.floor((TODAY - new Date(TODAY.getFullYear(), 0, 1)) / 86400000) + 1;
const WEEKDAY = TODAY.toLocaleDateString('en-US', { weekday: 'long' });
const MONTH_DAY = TODAY.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

// ── Primitives ──────────────────────────────────────────────────────────────
function Label({ children, color = T.textSoft, size = 10, style = {} }) {
  return <span style={{
    fontFamily: T.fontMono, fontSize: size, fontWeight: 500,
    textTransform: 'uppercase', letterSpacing: 0.12, color, ...style,
  }}>{children}</span>;
}
function Disp({ children, size = 22, weight = 600, style = {} }) {
  return <span style={{
    fontFamily: T.fontDisp, fontSize: size, fontWeight: weight,
    letterSpacing: -0.015, lineHeight: 1.08, color: T.text, ...style,
  }}>{children}</span>;
}

// ── Phone frame chrome ──────────────────────────────────────────────────────
function FakeStatusBar() {
  const fg = T.text;
  return (
    <div className="v5-status" style={{
      height: 44, padding: '0 20px', display: 'flex',
      alignItems: 'flex-end', justifyContent: 'space-between',
      paddingBottom: 4, flexShrink: 0,
    }}>
      <span style={{ fontFamily: '-apple-system, system-ui', fontSize: 14, fontWeight: 600, color: fg }}>9:41</span>
      <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
        <svg width="16" height="10" viewBox="0 0 16 10"><rect x="0" y="6" width="2.5" height="4" rx="0.5" fill={fg}/><rect x="4" y="4" width="2.5" height="6" rx="0.5" fill={fg}/><rect x="8" y="2" width="2.5" height="8" rx="0.5" fill={fg}/><rect x="12" y="0" width="2.5" height="10" rx="0.5" fill={fg}/></svg>
        <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0.5" y="0.5" width="18" height="9" rx="2.5" stroke={fg} fill="none"/><rect x="2" y="2" width="14" height="6" rx="1" fill={fg}/></svg>
      </div>
    </div>
  );
}
function TabBar({ active }) {
  const tabs = [
    { id:'hub',     label:'Hub',     href:'index-v5.html' },
    { id:'paint',   label:'Paint',   href:'garden-painting.html' },
    { id:'planner', label:'Plan',    href:'garden-planner-v5.html' },
    { id:'doctor',  label:'Doctor',  href:'garden-doctor-v5.html' },
    { id:'journal', label:'Journal', href:'how-it-thinks-v5.html' },
  ];
  return (
    <nav style={{
      flexShrink: 0, height: 66, background: T.panel,
      borderTop: `1px solid ${T.borderSoft}`,
      display: 'flex', alignItems: 'flex-start', padding: '8px 0 0',
    }}>
      {tabs.map(t => (
        <a key={t.id} href={t.href} aria-current={t.id === active ? 'page' : undefined} style={{
          flex: 1, textAlign: 'center', padding: '4px 0',
          borderTop: t.id === active ? `2px solid ${T.leaf}` : '2px solid transparent',
          marginTop: -9, paddingTop: 11, textDecoration: 'none',
          color: t.id === active ? T.leaf : T.textMuted, minHeight: 44,
        }}>
          <Label size={10} color={t.id === active ? T.leaf : T.textMuted}
            style={{ fontWeight: t.id === active ? 600 : 400 }}>{t.label}</Label>
        </a>
      ))}
    </nav>
  );
}
function PhoneFrame({ children }) {
  return (
    <div className="v5-frame-outer" style={{ width: 'min(100vw, 410px)', maxWidth: 410, display: 'flex', justifyContent: 'center' }}>
      <div className="v5-phone" style={{
        width: 390, maxWidth: '100%', height: 844, maxHeight: '100vh',
        background: '#fff', borderRadius: 38, overflow: 'hidden', position: 'relative',
        boxShadow: '0 24px 60px rgba(20,12,4,0.22), 0 0 0 1px rgba(0,0,0,0.06)',
      }}>{children}</div>
    </div>
  );
}

// ── Icons ───────────────────────────────────────────────────────────────────
const Icons = {
  gear: (s = 14, c = T.text) => (
    <svg width={s} height={s} viewBox="0 0 14 14" fill="none" stroke={c} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <circle cx="7" cy="7" r="2.2" fill="none"/>
      <path d="M7 1.4v1.5M7 11.1v1.5M1.4 7h1.5M11.1 7h1.5M3 3l1.05 1.05M9.95 9.95L11 11M3 11l1.05-1.05M9.95 4.05L11 3"/>
    </svg>
  ),
  close: (s = 14, c = T.text) => (
    <svg width={s} height={s} viewBox="0 0 14 14" fill="none" stroke={c} strokeWidth="1.5" strokeLinecap="round">
      <path d="M3 3l8 8M11 3l-8 8"/>
    </svg>
  ),
  plan: (s = 28, c = T.leaf) => (
    <svg width={s} height={s} viewBox="0 0 28 28" fill="none" stroke={c} strokeWidth="1.4" strokeLinecap="round" aria-hidden="true">
      <rect x="4" y="6" width="20" height="16" rx="1.5" fill={c} fillOpacity="0.06"/>
      <path d="M4 11h20M9 6v16M14 6v16M19 6v16M4 16h20"/>
    </svg>
  ),
  paint: (s = 28, c = T.leaf) => (
    <svg width={s} height={s} viewBox="0 0 28 28" fill="none" stroke={c} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <rect x="4.5" y="9" width="19" height="13" rx="1.5" fill={c} fillOpacity="0.06"/>
      <path d="M9 9V6.5a1.5 1.5 0 0 1 1.5-1.5h7a1.5 1.5 0 0 1 1.5 1.5V9"/>
      <circle cx="11" cy="15" r="1.4" fill={c}/>
      <circle cx="17" cy="15" r="1.4" fill={c} fillOpacity="0.4"/>
      <circle cx="14" cy="19" r="1.4" fill={c} fillOpacity="0.7"/>
    </svg>
  ),
  doctor: (s = 28, c = T.leaf) => (
    <svg width={s} height={s} viewBox="0 0 28 28" fill="none" stroke={c} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M14 4c-3 4-6 7-6 11a6 6 0 0 0 12 0c0-4-3-7-6-11z" fill={c} fillOpacity="0.06"/>
      <path d="M11 14c0 1.5 1 3 3 3"/>
    </svg>
  ),
  journal: (s = 28, c = T.leaf) => (
    <svg width={s} height={s} viewBox="0 0 28 28" fill="none" stroke={c} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M5 6.5C5 5.7 5.7 5 6.5 5h12A1.5 1.5 0 0 1 20 6.5V22l-3-2-3 2-3-2-3 2-3-2v-1.5z" fill={c} fillOpacity="0.06"/>
      <path d="M9 10h7M9 13h7M9 16h4"/>
    </svg>
  ),
  arrow: (s = 14, c = T.textMuted) => (
    <svg width={s} height={s} viewBox="0 0 14 14" fill="none" stroke={c} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M5 3l4 4-4 4"/>
    </svg>
  ),
};

// ── Tweaks panel ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { density: 'comfortable', showRecent: true };
const TWEAK_KEY = 'gos.hub.tweaks';
const RECENTS_KEY = 'gos.hub.recents';

function loadTweaks() {
  try {
    const raw = window.localStorage.getItem(TWEAK_KEY);
    if (!raw) return TWEAK_DEFAULTS;
    return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
  } catch (_) { return TWEAK_DEFAULTS; }
}
function saveTweaks(t) {
  try { window.localStorage.setItem(TWEAK_KEY, JSON.stringify(t)); } catch (_) {}
}
function loadRecents() {
  try {
    const raw = window.localStorage.getItem(RECENTS_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.slice(0, 3) : [];
  } catch (_) { return []; }
}
function Seg({ value, opts, onChange }) {
  return (
    <div style={{ display: 'flex', background: T.cedarWash, borderRadius: 6, padding: 2, gap: 2 }}>
      {opts.map(([val, lab]) => (
        <button key={val} onClick={() => onChange(val)} style={{
          flex: 1, padding: '5px 8px', borderRadius: 4, border: 'none',
          background: value === val ? T.panel : 'transparent',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 500,
          color: value === val ? T.text : T.textSoft,
          boxShadow: value === val ? '0 1px 2px rgba(44,27,11,0.1)' : 'none',
          cursor: 'pointer', minHeight: 28,
        }}>{lab}</button>
      ))}
    </div>
  );
}
function TweaksPanel({ tweak, setTweak, onClose }) {
  const setKey = (k, v) => { const next = { ...tweak, [k]: v }; setTweak(next); saveTweaks(next); };
  return (
    <>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.42)', zIndex: 50 }}/>
      <div role="dialog" aria-modal="true" aria-label="Tweaks" style={{
        position: 'absolute', top: 60, right: 12, zIndex: 51,
        width: 264, maxWidth: 'calc(100% - 24px)',
        background: T.panel, borderRadius: 12, border: `1px solid ${T.border}`,
        boxShadow: '0 16px 48px rgba(44,27,11,0.28)',
        padding: '14px 16px 16px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
          <Disp size={17}>Tweaks</Disp>
          <button onClick={onClose} aria-label="Close tweaks" style={{
            width: 24, height: 24, borderRadius: 6, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', color: T.textSoft,
          }}>{Icons.close(12, T.textSoft)}</button>
        </div>
        <div style={{ marginBottom: 14 }}>
          <Label size={9} style={{ display: 'block', marginBottom: 5, fontWeight: 500 }}>Density</Label>
          <Seg value={tweak.density} opts={[['comfortable', 'Comfortable'], ['compact', 'Compact']]}
            onChange={v => setKey('density', v)}/>
        </div>
        <div style={{ marginBottom: 14 }}>
          <Label size={9} style={{ display: 'block', marginBottom: 5, fontWeight: 500 }}>Show recent</Label>
          <Seg value={tweak.showRecent ? 'on' : 'off'} opts={[['on', 'On'], ['off', 'Off']]}
            onChange={v => setKey('showRecent', v === 'on')}/>
        </div>
        <button onClick={() => { setTweak(TWEAK_DEFAULTS); saveTweaks(TWEAK_DEFAULTS); }} style={{
          width: '100%', padding: '6px 10px', background: 'transparent',
          border: `1px solid ${T.borderSoft}`, borderRadius: 6, cursor: 'pointer',
          fontFamily: T.fontMono, fontSize: 9, letterSpacing: 0.15, textTransform: 'uppercase',
          color: T.textSoft, fontWeight: 500,
        }}>Reset to defaults</button>
      </div>
    </>
  );
}

// ── Hub composition ────────────────────────────────────────────────────────
function ThisWeekCapsule({ compact }) {
  return (
    <section style={{
      borderRadius: 16, padding: compact ? '12px 14px' : '14px 16px',
      background: `linear-gradient(180deg, ${T.soilMid} 0%, ${T.soil} 100%)`,
      color: '#f5ede0', position: 'relative', overflow: 'hidden',
      boxShadow: '0 6px 18px rgba(58,37,16,0.18)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, opacity: 0.5, pointerEvents: 'none',
        backgroundImage: `repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 38px)`,
      }}/>
      <div style={{ position: 'relative' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <Label size={9} color="rgba(245,237,224,0.6)">THIS WEEK</Label>
          <Label size={9} color="rgba(245,237,224,0.6)">APR 20 — 26</Label>
        </div>
        <div style={{ display: 'flex', gap: 18, marginTop: 8, alignItems: 'baseline' }}>
          <CapsuleStat n={3} label="sow" color={T.sunBright}/>
          <CapsuleStat n={5} label="transplant" color={T.cedarPale}/>
          <CapsuleStat n={2} label="harvesting" color={T.leafPale}/>
        </div>
        <div style={{
          marginTop: 10, fontFamily: T.fontSerif, fontSize: 14, color: '#f5ede0',
          fontStyle: 'italic', lineHeight: 1.45, paddingRight: 20,
        }}>
          Pull radishes today &mdash; <span style={{ color: T.sunBright }}>they're 28 days in.</span>
        </div>
        <a href="garden-planner-v5.html" style={{
          display: 'inline-flex', alignItems: 'center', gap: 4,
          marginTop: 10, padding: '8px 14px', borderRadius: 999,
          background: T.leafBright, border: 'none', color: '#fff',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 600,
          cursor: 'pointer', minHeight: 36, textDecoration: 'none',
        }}>Open today's plan →</a>
      </div>
    </section>
  );
}
function CapsuleStat({ n, label, color }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', lineHeight: 1 }}>
      <span style={{ fontFamily: T.fontDisp, fontSize: 26, fontWeight: 600, color, letterSpacing: -0.5 }}>{n}</span>
      <span style={{ fontFamily: T.fontMono, fontSize: 9, letterSpacing: 0.15,
        textTransform: 'uppercase', color: 'rgba(245,237,224,0.6)', marginTop: 2 }}>{label}</span>
    </div>
  );
}
function Tile({ title, subtitle, icon, href, compact }) {
  return (
    <a href={href} style={{
      background: T.panel, border: `1px solid ${T.borderSoft}`, borderRadius: 12,
      padding: compact ? '12px 12px 10px' : '14px 14px 12px',
      display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 4,
      cursor: 'pointer', textAlign: 'left', minHeight: 80,
      fontFamily: T.fontSans, color: T.text, textDecoration: 'none',
      transition: 'transform 0.18s ease',
    }}>
      <div style={{
        width: 36, height: 36, borderRadius: 10,
        background: T.leafPale + '55', display: 'flex',
        alignItems: 'center', justifyContent: 'center',
      }}>{icon(24, T.leaf)}</div>
      <div style={{ marginTop: 6 }}>
        <div style={{ fontFamily: T.fontDisp, fontSize: 18, fontWeight: 600, color: T.text, letterSpacing: -0.2 }}>{title}</div>
        {!compact && <div style={{ fontSize: 11.5, color: T.textSoft, lineHeight: 1.35, marginTop: 1 }}>{subtitle}</div>}
      </div>
    </a>
  );
}
function RecentRow({ row, last }) {
  const dot = row.tool === 'doctor' ? T.rust : (row.tool === 'painting' ? T.leaf : T.cedar);
  return (
    <a href={row.href} style={{
      width: '100%', display: 'flex', alignItems: 'center', gap: 10,
      padding: '12px 14px', minHeight: 44, cursor: 'pointer',
      background: 'transparent', borderBottom: last ? 'none' : `1px solid ${T.borderSoft}`,
      textAlign: 'left', fontFamily: T.fontSans, textDecoration: 'none', color: T.text,
    }}>
      <span style={{ width: 8, height: 8, borderRadius: 4, background: dot, flexShrink: 0 }}/>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 13, color: T.text, fontWeight: 500,
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{row.label}</div>
        <Label size={9} color={T.textSoft}>{row.tool.toUpperCase()} · {row.when}</Label>
      </div>
      <span style={{ display: 'inline-flex' }}>{Icons.arrow(14, T.textMuted)}</span>
    </a>
  );
}
function WelcomeCard() {
  return (
    <section style={{
      marginTop: 14, padding: '16px 18px', background: T.panel,
      border: `1px dashed ${T.cedarPale}`, borderRadius: 12,
    }}>
      <Label size={9} color={T.leaf}>NEW HERE</Label>
      <div style={{ fontFamily: T.fontDisp, fontSize: 17, fontWeight: 600, marginTop: 4, lineHeight: 1.25 }}>
        Tap a tile to pick a tool.
      </div>
      <div style={{ fontFamily: T.fontSerif, fontSize: 13, color: T.textSoft, fontStyle: 'italic', marginTop: 4, lineHeight: 1.5 }}>
        Recently-touched fills in as you use the app. The Plan tab is the most common place to start.
      </div>
    </section>
  );
}

function Hub() {
  const [tweak, setTweak] = React.useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [recents] = React.useState(loadRecents);
  const compact = tweak.density === 'compact';

  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
      display: 'flex', flexDirection: 'column', position: 'relative',
    }}>
      <FakeStatusBar/>

      <header style={{ padding: '2px 22px 10px', flexShrink: 0, display: 'flex', flexDirection: 'column', gap: 2 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <Label size={9} color={T.soilMid}>GARDEN OS · W{WEEK_NOW}</Label>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <Label size={9} color={T.soilMid}>ZONE 7a · DAY {DAY_OF_SEASON}</Label>
            <button aria-label="Tweaks" onClick={() => setTweaksOpen(true)} style={{
              width: 26, height: 26, borderRadius: 6, padding: 0,
              background: T.panel, border: `1px solid ${T.borderSoft}`,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            }}>{Icons.gear(12, T.soil)}</button>
          </div>
        </div>
        <div style={{
          fontFamily: T.fontDisp, fontSize: 30, fontWeight: 600,
          letterSpacing: -0.5, color: T.soil, lineHeight: 1.05, marginTop: 2,
        }}>
          {WEEKDAY}, <span style={{ fontStyle: 'italic', color: T.leaf }}>{MONTH_DAY}.</span>
        </div>
        <div style={{ fontFamily: T.fontSerif, fontSize: 13, color: T.textSoft, fontStyle: 'italic' }}>
          Late spring. Soil warm. Last frost five days behind us.
        </div>
      </header>

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 24px' }}>
        <ThisWeekCapsule compact={compact}/>

        <section style={{ marginTop: compact ? 10 : 14 }}>
          <Label size={9} color={T.textSoft} style={{ marginLeft: 4 }}>WHERE TO</Label>
          <div style={{
            marginTop: 6, display: 'grid', gridTemplateColumns: '1fr 1fr',
            gap: compact ? 8 : 10,
          }}>
            <Tile title="Plan"    subtitle="The season at a glance"      icon={Icons.plan}    href="garden-planner-v5.html" compact={compact}/>
            <Tile title="Paint"   subtitle="Place crops in the bed"      icon={Icons.paint}   href="garden-painting.html"    compact={compact}/>
            <Tile title="Doctor"  subtitle="What's wrong with this leaf" icon={Icons.doctor}  href="garden-doctor-v5.html"   compact={compact}/>
            <Tile title="Journal" subtitle="How scoring decides"         icon={Icons.journal} href="how-it-thinks-v5.html"   compact={compact}/>
          </div>
        </section>

        {tweak.showRecent && (recents.length > 0 ? (
          <section style={{ marginTop: compact ? 12 : 16 }}>
            <Label size={9} color={T.textSoft} style={{ marginLeft: 4 }}>RECENTLY TOUCHED</Label>
            <div style={{
              marginTop: 6, background: T.panel, borderRadius: 12,
              border: `1px solid ${T.borderSoft}`, overflow: 'hidden',
            }}>
              {recents.map((r, i) => (
                <RecentRow key={r.tool + i} row={r} last={i === recents.length - 1}/>
              ))}
            </div>
          </section>
        ) : (
          <WelcomeCard/>
        ))}
      </div>

      <TabBar active="hub"/>
      {tweaksOpen && <TweaksPanel tweak={tweak} setTweak={setTweak} onClose={() => setTweaksOpen(false)}/>}
    </div>
  );
}

// Cold-start route (PR #21): if no active bed lives in localStorage, send
// the user to Painting before any Hub UI renders. The flag suppresses the
// ReactDOM render so there's no flash of Hub during the navigation. Fails
// open with a console warning if gos-bed.js failed to load — better to show
// a Hub with empty data than to lock the user in a redirect loop.
let __coldStartRedirecting = false;
if (typeof GosBed === 'undefined' || typeof GosBed.getActive !== 'function') {
  console.warn('Garden OS: GosBed not available — skipping cold-start guard');
} else if (GosBed.getActive() === null) {
  __coldStartRedirecting = true;
  location.replace('garden-painting.html');
}

// gos-bed.js wiring: report saved beds for verification
if (typeof GosBed !== 'undefined') {
  const beds = GosBed.readAll();
  console.log('Garden OS: ' + beds.length + ' bed(s) found');
}

if (!__coldStartRedirecting) {
  ReactDOM.createRoot(document.getElementById('root')).render(<PhoneFrame><Hub/></PhoneFrame>);
}
</script>
</body>
</html>
