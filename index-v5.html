function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

// ── Tweaks panel ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { density: 'comfortable', showRecent: true };
const TWEAK_KEY = 'gos.hub.tweaks';
const RECENTS_KEY = 'gos.hub.recents';

function loadTweaks() {
  try {
    const raw = window.localStorage.getItem(TWEAK_KEY);
    if (!raw) return TWEAK_DEFAULTS;
    return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
  } catch (_) { return TWEAK_DEFAULTS; }
}
function saveTweaks(t) {
  try { window.localStorage.setItem(TWEAK_KEY, JSON.stringify(t)); } catch (_) {}
}
function loadRecents() {
  try {
    const raw = window.localStorage.getItem(RECENTS_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.slice(0, 3) : [];
  } catch (_) { return []; }
}

// ── GosBed-derived hub state ───────────────────────────────────────────────
function loadActiveBedSummary() {
  if (typeof GosBed === 'undefined') return null;
  try {
    const bed = GosBed.getActive();
    if (!bed) return null;
    const currentYear = String(new Date().getFullYear());
    const events = Array.isArray(bed.events) ? bed.events : [];
    const seasonEvents = events.filter(function (e) {
      return e && e.season === currentYear &&
        (e.type === 'mark_done' || e.type === 'harvest');
    });
    const lastEvent = seasonEvents.length
      ? seasonEvents.reduce(function (a, b) {
          return (a.timestamp || '') > (b.timestamp || '') ? a : b;
        }, seasonEvents[0])
      : null;
    return {
      bedId: bed.id,
      bedName: bed.name || bed.id,
      seasonCount: seasonEvents.length,
      lastEvent,
      currentYear,
    };
  } catch (_) { return null; }
}

function relativeDays(timestamp) {
  if (!timestamp) return '';
  try {
    const ms = Date.now() - new Date(timestamp).getTime();
    if (Number.isNaN(ms) || ms < 0) return '';
    const days = Math.floor(ms / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    if (days < 7) return days + 'd ago';
    if (days < 30) return Math.floor(days / 7) + 'w ago';
    return Math.floor(days / 30) + 'mo ago';
  } catch (_) { return ''; }
}

function MoreToolsSheet({ onClose, onOpenDevTools }) {
  const [phase, setPhase] = React.useState('entering');
  const [translateY, setTranslateY] = React.useState(0);
  const dragRef = React.useRef({ startY: 0, dragging: false });

  React.useEffect(() => {
    const id = window.requestAnimationFrame(function () { setPhase('idle'); });
    return function () { window.cancelAnimationFrame(id); };
  }, []);

  function close() {
    setPhase('exiting');
    window.setTimeout(onClose, 200);
  }

  function onPointerDown(e) {
    if (phase !== 'idle') return;
    dragRef.current = { startY: e.clientY, dragging: true };
    if (e.currentTarget.setPointerCapture) {
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    }
    setPhase('dragging');
  }
  function onPointerMove(e) {
    if (!dragRef.current.dragging) return;
    const dy = Math.max(0, e.clientY - dragRef.current.startY);
    setTranslateY(dy);
  }
  function onPointerUp(e) {
    if (!dragRef.current.dragging) return;
    const dy = e.clientY - dragRef.current.startY;
    dragRef.current.dragging = false;
    if (dy > 80) {
      close();
    } else {
      setPhase('idle');
      setTranslateY(0);
    }
  }

  const transform = (phase === 'entering' || phase === 'exiting')
    ? 'translateY(100%)'
    : (phase === 'dragging' ? `translateY(${translateY}px)` : 'translateY(0)');
  const transition = phase === 'dragging' ? 'none' : 'transform 200ms ease';

  return (
    <>
      <div onClick={close} className="gos-fade-in" style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.42)',
        zIndex: 60,
      }}/>
      <div role="dialog" aria-modal="true" aria-label="More tools" style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 61,
        background: T.panel,
        borderTopLeftRadius: 18, borderTopRightRadius: 18,
        boxShadow: '0 -12px 36px rgba(44,27,11,0.18)',
        maxHeight: '80%', display: 'flex', flexDirection: 'column',
        transform, transition, willChange: 'transform',
      }}>
        <div onPointerDown={onPointerDown} onPointerMove={onPointerMove}
             onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
             style={{
               padding: '10px 0 4px', cursor: 'grab',
               touchAction: 'none', flexShrink: 0,
             }}>
          <div style={{
            width: 36, height: 4, borderRadius: 2,
            background: T.border, margin: '0 auto',
          }}/>
        </div>
        <div style={{
          padding: '4px 18px 10px', flexShrink: 0,
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        }}>
          <Disp size={18}>More tools</Disp>
          <button onClick={close} aria-label="Close more tools" style={{
            width: 28, height: 28, borderRadius: 6, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            color: T.textSoft,
          }}>{Icons.close(14, T.textSoft)}</button>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', paddingBottom: 18 }}>
          <MoreToolsRow icon={Icons.build} title="Build Guide"
            subtitle="Pick a bed, list materials" href="garden-cage-build-guide.html"/>
          <MoreToolsRow icon={Icons.ops}   title="Ops Guide"
            subtitle="Weekly garden ops" href="garden-cage-ops-guide.html"/>
          <MoreToolsRow icon={Icons.story} title="How It Thinks"
            subtitle="Scoring logic, plainly" href="how-it-thinks-v5.html"/>
          <MoreToolsRow icon={Icons.story} title="Story Mode"
            subtitle="Play through a season" href="story-mode/"/>
          <MoreToolsRow icon={Icons.code}  title="Dev Tools"
            subtitle="Beds · storage · raw log" onClick={onOpenDevTools} last/>
        </div>

    </>
  );

function exportAllBedsToFile() {
  if (typeof GosBed === 'undefined') return false;
  const beds = GosBed.readAll();
  const journalEntries = typeof GardenJournal !== 'undefined' ? GardenJournal.export() : [];
  const payload = {
    schemaVersion: GosBed.SCHEMA_VERSION || 1,
    journalSchemaVersion: typeof GardenJournal !== 'undefined' ? GardenJournal.SCHEMA_VERSION : 1,
    exportedAt: new Date().toISOString(),
    beds,
    journalEntries,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'garden-os-export-' + today + '.gos.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  window.setTimeout(function () { URL.revokeObjectURL(url); }, 100);
  return true;
}

function SyncBedRow({ bed, meta, defaultWorkerUrl, onChanged, onToast }) {
  const [busy, setBusy] = React.useState(null);
  async function ensureWorkerUrl() {
    if (defaultWorkerUrl) return defaultWorkerUrl;
    const entered = window.prompt(
      'Enter your Cloudflare Worker URL (e.g. https://garden-os-sync.example.workers.dev). ' +
      'Saved as the workspace default; you only set this once.', ''
    );
    if (!entered || !/^https?:\/\//.test(entered)) {
      onToast('Need a valid Worker URL');
      return null;
    }
    GosBed.sync.setDefaultWorkerUrl(entered);
    return entered;
  }
  async function handleEnable() {
    setBusy('enable');
    try {
      const url = await ensureWorkerUrl();
      if (!url) return;
      const res = await GosBed.sync.create(bed.id, url);
      onToast('Sync code created: ' + res.code);
    } catch (e) {
      onToast('Enable failed: ' + (e.message || e));
    } finally {
      setBusy(null);
      onChanged();
    }
  }
  async function handlePush() {
    setBusy('push');
    try { await GosBed.sync.push(bed.id); onToast('Pushed'); }
    catch (e) { onToast('Push failed: ' + (e.message || e)); }
    finally { setBusy(null); onChanged(); }
  }
  async function handlePull() {
    setBusy('pull');
    try {
      const updated = await GosBed.sync.pull(meta.code, meta.workerUrl);
      if (!updated || !updated.id) {
        onToast('Pull returned an empty bed');
      } else {
        GosBed.write(updated);
        try {
          window.dispatchEvent(new CustomEvent('gosBedChanged',
            { detail: { reason: 'sync-pull', id: updated.id } }));
        } catch (_) {}
        onToast('Pulled');
      }
    } catch (e) { onToast('Pull failed: ' + (e.message || e)); }
    finally { setBusy(null); onChanged(); }
  }
  async function handleRevoke() {
    if (!window.confirm('Revoke sync code for "' + (bed.name || bed.id) +
      '"? The shared link will stop working.')) return;
    setBusy('revoke');
    try { await GosBed.sync.revoke(bed.id); onToast('Revoked.'); }
    catch (e) { onToast('Revoke failed: ' + (e.message || e)); }
    finally { setBusy(null); onChanged(); }
  }
  async function copyShareUrl() {
    const url = (meta.workerUrl || '').replace(/\/+$/, '') + '/beds/' + meta.code;
    try {
      await navigator.clipboard.writeText(url);
      onToast('Copied share URL');
    } catch (_) {
      onToast(url);
    }
  }
  const baseBtn = {
    padding: '4px 10px', borderRadius: 6,
    border: `1px solid ${T.borderSoft}`,
    background: T.panel, color: T.text, cursor: 'pointer',
    fontFamily: T.fontMono, fontSize: 10, fontWeight: 600,
    letterSpacing: 0.1, textTransform: 'uppercase', minHeight: 28,
  };
  return (
    <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.borderSoft}` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{
          fontFamily: T.fontDisp, fontSize: 13, fontWeight: 600,
          color: T.text, flex: 1, minWidth: 0,
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        }}>{bed.name || bed.id}</span>
        {meta && meta.code && (
          <span style={{
            fontFamily: T.fontMono, fontSize: 10, fontWeight: 600,
            color: T.leaf, letterSpacing: 0.04,
          }}>{meta.code}</span>
        )}
      </div>
      {!meta || !meta.code ? (
        <div style={{ marginTop: 6 }}>
          <button onClick={handleEnable} disabled={busy === 'enable'}
            style={{ ...baseBtn, color: T.leaf, borderColor: T.leaf,
              opacity: busy ? 0.6 : 1 }}>
            {busy === 'enable' ? 'Enabling…' : 'Enable sync'}
          </button>
        </div>
      ) : (
        <div style={{ marginTop: 6, display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          <button onClick={copyShareUrl} style={baseBtn}>Copy URL</button>
          <button onClick={handlePush} disabled={busy === 'push'}
            style={{ ...baseBtn, opacity: busy ? 0.6 : 1 }}>
            {busy === 'push' ? '…pushing' : 'Push'}
          </button>
          <button onClick={handlePull} disabled={busy === 'pull'}
            style={{ ...baseBtn, opacity: busy ? 0.6 : 1 }}>
            {busy === 'pull' ? '…pulling' : 'Pull'}
          </button>
          <button onClick={handleRevoke} disabled={busy === 'revoke'}
            style={{ ...baseBtn, color: T.rust, borderColor: T.borderSoft,
              opacity: busy ? 0.6 : 1 }}>
            {busy === 'revoke' ? '…revoking' : 'Revoke'}
          </button>
        </div>
      )}
      {meta && meta.lastPushedAt && (
        <div style={{
          marginTop: 4, fontFamily: T.fontMono, fontSize: 9, color: T.textMuted,
          letterSpacing: 0.04,
        }}>last pushed: {new Date(meta.lastPushedAt).toLocaleString()}</div>
      )}
    </div>
  );
}

function JoinSharedBed({ defaultWorkerUrl, onChanged, onToast }) {
  const [code, setCode] = React.useState('');
  const [workerUrl, setWorkerUrl] = React.useState(defaultWorkerUrl || '');
  const [busy, setBusy] = React.useState(false);
  React.useEffect(() => { setWorkerUrl(defaultWorkerUrl || ''); }, [defaultWorkerUrl]);
  async function handleImport() {
    if (!code || !workerUrl) {
      onToast('Code and Worker URL are both required');
      return;
    }
    const trimmedCode = code.trim().toUpperCase();
    const trimmedUrl = workerUrl.trim();
    setBusy(true);
    try {
      let bed;
      try {
        bed = await GosBed.sync.importFromCode(trimmedCode, trimmedUrl);
        onToast('Imported as active bed');
      } catch (e) {
        if (!e || e.code !== 'collision') throw e;
        const overwrite = window.confirm(
          'A local bed already exists with id "' + e.existingBedId + '" (' +
          e.existingBedName + ').\n\n' +
          'OK to overwrite the local bed with the shared copy.\n' +
          'Cancel to keep the local bed and import a separate copy with a new id.'
        );
        bed = await GosBed.sync.importFromCode(trimmedCode, trimmedUrl,
          { onCollision: overwrite ? 'overwrite' : 'rename' });
        onToast(overwrite
          ? 'Overwrote local bed'
          : 'Imported as separate copy: ' + (bed.name || bed.id));
      }
      if (trimmedUrl && trimmedUrl !== defaultWorkerUrl) {
        GosBed.sync.setDefaultWorkerUrl(trimmedUrl);
      }
      try {
        window.dispatchEvent(new CustomEvent('gosBedChanged',
          { detail: { reason: 'sync-import', id: bed.id } }));
      } catch (_) {}
      setCode('');
    } catch (e) {
      onToast('Import failed: ' + (e.message || e));
    } finally {
      setBusy(false);
      onChanged();
    }
  }
  const inputStyle = {
    width: '100%', padding: '8px 10px', borderRadius: 6,
    border: `1px solid ${T.borderSoft}`, background: T.panel,
    fontFamily: T.fontMono, fontSize: 11, color: T.text,
    boxSizing: 'border-box',
  };
  return (
    <div style={{
      padding: '10px 12px', background: T.panel,
      border: `1px solid ${T.borderSoft}`, borderRadius: 8,
    }}>
      <Label size={9} color={T.textSoft} style={{ display: 'block', marginBottom: 6 }}>
        JOIN A SHARED BED
      </Label>
      <input type="text" placeholder="Sync code (e.g. ROSE-K7X2)"
        value={code} onChange={(e) => setCode(e.target.value)}
        style={inputStyle}/>
      <input type="text" placeholder="Worker URL"
        value={workerUrl} onChange={(e) => setWorkerUrl(e.target.value)}
        style={{ ...inputStyle, marginTop: 6 }}/>
      <button onClick={handleImport} disabled={busy}
        style={{
          marginTop: 8, padding: '6px 12px', borderRadius: 6,
          border: 'none', background: T.leafBright, color: '#fff',
          cursor: busy ? 'default' : 'pointer',
          fontFamily: T.fontMono, fontSize: 10, fontWeight: 600,
          letterSpacing: 0.1, textTransform: 'uppercase', minHeight: 32,
          opacity: busy ? 0.6 : 1,
        }}>
        {busy ? '…importing' : 'Import'}
      </button>
    </div>
  );
}

  }

  React.useEffect(() => {
    const id = window.requestAnimationFrame(function () { setPhase('idle'); });
    return function () { window.cancelAnimationFrame(id); };
  }, []);

  React.useEffect(() => {
    return function () {
      if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    };
  }, []);

  function refresh() {
    if (typeof GosBed === 'undefined') return;
    setBeds(GosBed.readAll());
    setUsage(GosBed.estimateStorageUsage());
    const a = GosBed.getActive();
    setActiveId(a ? a.id : null);
    if (GosBed.sync) {
      const next = {};
      GosBed.readAll().forEach(function (b) {
        next[b.id] = GosBed.sync.getCode(b.id);
      });
      setSyncMetaByBed(next);
      setDefaultWorkerUrl(GosBed.sync.getDefaultWorkerUrl() || '');
    }
  }

  function close() {
    setPhase('exiting');
    window.setTimeout(onClose, 180);
  }

  function handleMakeActive(id) {
    if (typeof GosBed === 'undefined') return;
    GosBed.setActive(id);
    refresh();
    try {
      window.dispatchEvent(new CustomEvent('gosBedChanged', { detail: { reason: 'set-active', id } }));
    } catch (_) {}
  }
  function handleConfirmDelete(id) {
    if (typeof GosBed === 'undefined') return;
    GosBed.delete(id);
    setConfirmId(null);
    refresh();
    try {
      window.dispatchEvent(new CustomEvent('gosBedChanged', { detail: { reason: 'delete', id } }));
    } catch (_) {}
  }

  function handleExport() {
    const ok = exportAllBedsToFile();
    setExportNote(ok ? 'Exported.' : 'Export failed.');
    window.setTimeout(function () { setExportNote(''); }, 2500);
  }

  const activeBed = beds.find(function (b) { return b.id === activeId; }) || null;
  const allEvents = activeBed && Array.isArray(activeBed.events) ? activeBed.events : [];
  const currentYear = String(new Date().getFullYear());
  const visibleEvents = showAllSeasons
    ? allEvents
    : allEvents.filter(function (e) { return e && e.season === currentYear; });
  const sortedEvents = visibleEvents.slice().sort(function (a, b) {
    return (b.timestamp || '').localeCompare(a.timestamp || '');
  });

  const usedKb = (usage.usedBytes / 1024).toFixed(1);
  const limitKb = (usage.warningThreshold / 1024).toFixed(0);
  const pct = Math.min(100, Math.round((usage.usedBytes / usage.warningThreshold) * 100));

  const opacity = phase === 'idle' ? 1 : 0;
  return (
    <>
      <div onClick={close} style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.5)',
        zIndex: 70, opacity, transition: 'opacity 180ms ease',
      }}/>
      <div role="dialog" aria-modal="true" aria-label="Dev tools" style={{
        position: 'absolute', inset: 0, zIndex: 71,
        background: T.cream, opacity,
        transition: 'opacity 180ms ease',
        display: 'flex', flexDirection: 'column',
      }}>
        <header style={{
          flexShrink: 0, padding: '14px 18px 10px',
          borderBottom: `1px solid ${T.borderSoft}`, background: T.panel,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <Disp size={18}>Dev Tools</Disp>
          <button onClick={close} aria-label="Close dev tools" style={{
            width: 30, height: 30, borderRadius: 6, padding: 0,
            background: 'transparent', border: `1px solid ${T.borderSoft}`,
            cursor: 'pointer', display: 'inline-flex',
            alignItems: 'center', justifyContent: 'center', color: T.textSoft,
          }}>{Icons.close(14, T.textSoft)}</button>
        </header>

        <div style={{ flex: 1, overflowY: 'auto', padding: '12px 14px 24px' }}>
          {/* Beds */}
          <section style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <Label size={9} color={T.textSoft}>BEDS · {beds.length}</Label>
              <button onClick={handleExport} style={{
                padding: '4px 8px', borderRadius: 6,
                border: `1px solid ${T.borderSoft}`,
                background: T.panel, color: T.leaf, cursor: 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 4,
                fontFamily: T.fontMono, fontSize: 9, fontWeight: 600,
                letterSpacing: 0.12, textTransform: 'uppercase',
              }}>{Icons.download(11, T.leaf)} Export all</button>
            </div>
            {exportNote && (
              <div style={{
                fontFamily: T.fontMono, fontSize: 10, color: T.leaf,
                marginBottom: 6, padding: '4px 8px',
                background: T.leafWash, borderRadius: 4,
              }}>{exportNote}</div>
            )}
            {beds.length === 0 ? (
              <div style={{
                padding: '14px 12px', background: T.panel,
                border: `1px dashed ${T.borderSoft}`, borderRadius: 8,
                fontFamily: T.fontSerif, fontSize: 12, color: T.textSoft, fontStyle: 'italic',
              }}>No beds yet. Create one in Paint.</div>
            ) : (
              <div style={{
                background: T.panel, borderRadius: 8,
                border: `1px solid ${T.borderSoft}`, overflow: 'hidden',
              }}>
                {beds.map(function (b) {
                  return (
                    <DevToolsBedRow key={b.id} bed={b}
                      isActive={b.id === activeId}
                      onMakeActive={function () { handleMakeActive(b.id); }}
                      onDelete={function () { setConfirmId(b.id); }}
                      confirming={confirmId === b.id}
                      onConfirm={function () { handleConfirmDelete(b.id); }}
                      onCancelConfirm={function () { setConfirmId(null); }}/>
                  );
                })}
              </div>
            )}
          </section>

          {/* Storage */}
          <section style={{ marginBottom: 14 }}>
            <Label size={9} color={T.textSoft} style={{ display: 'block', marginBottom: 6 }}>STORAGE</Label>
            <div style={{
              padding: '12px', background: T.panel,
              borderRadius: 8, border: `1px solid ${T.borderSoft}`,
            }}>
              <div style={{
                display: 'flex', justifyContent: 'space-between',
                fontFamily: T.fontMono, fontSize: 11, color: T.textSoft, marginBottom: 6,
              }}>
                <span>{usedKb} KB used</span>
                <span>of ~{limitKb} KB</span>
              </div>
              <div style={{
                width: '100%', height: 6, borderRadius: 3,
                background: T.cedarWash, overflow: 'hidden',
              }}>
                <div style={{
                  width: pct + '%', height: '100%',
                  background: usage.isOverThreshold ? T.rust : T.leaf,
                  transition: 'width 200ms ease',
                }}/>
              </div>
              {usage.isOverThreshold && (
                <div style={{
                  fontFamily: T.fontSans, fontSize: 11, color: T.rust,
                  marginTop: 6, fontWeight: 500,
                }}>Over threshold. Consider exporting + clearing old beds.</div>
              )}
            </div>
          </section>

          {/* Raw log */}
          <section>
            <div style={{
              display: 'flex', justifyContent: 'space-between',
              alignItems: 'center', marginBottom: 6,
            }}>
              <Label size={9} color={T.textSoft}>
                RAW LOG{activeBed ? ' · ' + (activeBed.name || activeBed.id) : ''}
              </Label>
              <label style={{
                display: 'inline-flex', alignItems: 'center', gap: 5,
                fontFamily: T.fontMono, fontSize: 10, color: T.textSoft,
                cursor: 'pointer',
              }}>
                <input type="checkbox" checked={showAllSeasons}
                  onChange={function (e) { setShowAllSeasons(e.target.checked); }}
                  style={{ margin: 0 }}/>
                Show all seasons
              </label>
            </div>
            <div style={{
              background: T.panel, borderRadius: 8,
              border: `1px solid ${T.borderSoft}`, overflow: 'hidden',
            }}>
              {sortedEvents.length === 0 ? (
                <div style={{
                  padding: '14px 12px',
                  fontFamily: T.fontSerif, fontSize: 12, color: T.textSoft, fontStyle: 'italic',
                }}>
                  {activeBed
                    ? (showAllSeasons ? 'No events on this bed yet.' : 'No events this season.')
                    : 'No active bed.'}
                </div>
              ) : (
                <div style={{ fontFamily: T.fontMono, fontSize: 10.5 }}>
                  {sortedEvents.map(function (ev, i) {
                    const dt = ev.timestamp ? new Date(ev.timestamp) : null;
                    const dateStr = dt
                      ? dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase()
                      : '—';
                    const cropName = ev.cropSnapshot ? ev.cropSnapshot.cropName : '?';
                    const qty = ev.quantity != null && ev.unit
                      ? ` · ${ev.quantity} ${ev.unit}`
                      : '';
                    return (
                      <div key={i} style={{
                        padding: '6px 12px',
                        borderBottom: i === sortedEvents.length - 1
                          ? 'none' : `1px solid ${T.borderSoft}`,
                        color: T.textMid,
                      }}>
                        <span style={{ color: T.soilMid }}>{dateStr}</span>
                        {' · '}
                        <span style={{ color: ev.type === 'harvest' ? T.leaf : T.cedar, fontWeight: 600 }}>
                          {(ev.type || '').toUpperCase()}
                        </span>
                        {' · '}
                        <span style={{ color: T.text }}>{cropName}</span>
                        {ev.cell ? <> · <span>{ev.cell}</span></> : null}
                        {qty}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </section>

          {/* Sync & Share — cross-device sync via Cloudflare Worker + KV */}
          <section style={{ marginTop: 14 }}>
            <Label size={9} color={T.textSoft} style={{ display: 'block', marginBottom: 6 }}>
              SYNC &amp; SHARE
            </Label>
            {beds.length === 0 ? (
              <div style={{
                padding: '12px', background: T.panel,
                borderRadius: 8, border: `1px dashed ${T.borderSoft}`,
                fontFamily: T.fontSerif, fontSize: 12, color: T.textSoft,
                fontStyle: 'italic',
              }}>No beds to sync yet.</div>
            ) : (
              <div style={{
                background: T.panel, borderRadius: 8,
                border: `1px solid ${T.borderSoft}`, overflow: 'hidden',
              }}>
                {beds.map(function (b) {
                  return (
                    <SyncBedRow key={b.id} bed={b}
                      meta={syncMetaByBed[b.id]}
                      defaultWorkerUrl={defaultWorkerUrl}
                      onChanged={refresh}
                      onToast={showToast}/>
                  );
                })}
              </div>
            )}
            <div style={{ marginTop: 12 }}>
              <JoinSharedBed defaultWorkerUrl={defaultWorkerUrl}
                onChanged={refresh} onToast={showToast}/>
            </div>
          </section>
        </div>
        {toast && (
          <div role="status" style={{
            position: 'absolute', left: 18, right: 18, bottom: 18, zIndex: 80,
            padding: '8px 12px', background: T.soil, color: '#f5ede0',
            borderRadius: 8, fontFamily: T.fontMono, fontSize: 11,
            letterSpacing: 0.04, textAlign: 'center',
            boxShadow: '0 6px 16px rgba(44,27,11,0.28)',
          }}>{toast}</div>
        )}
      </div>
    </>
  );
}

function Hub() {
  const [tweak, setTweak] = React.useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [recents] = React.useState(loadRecents);
  const [bedSummary, setBedSummary] = React.useState(loadActiveBedSummary);
  const [moreOpen, setMoreOpen] = React.useState(false);
  const [devOpen, setDevOpen] = React.useState(false);
  const compact = tweak.density === 'compact';

  React.useEffect(() => {
    function refresh() { setBedSummary(loadActiveBedSummary()); }
    function onStorage(e) {
      if (!e.key) { refresh(); return; }
      if (e.key.indexOf('gos.bed.') === 0 || e.key === 'gos.activeBed') refresh();
    }
    function onFocus() { refresh(); }
    window.addEventListener('storage', onStorage);
    window.addEventListener('gosBedChanged', refresh);
    window.addEventListener('focus', onFocus);
    return function () {
      window.removeEventListener('storage', onStorage);
      window.removeEventListener('gosBedChanged', refresh);
      window.removeEventListener('focus', onFocus);
    };
  }, []);

  function openDevTools() {
    setMoreOpen(false);
    setDevOpen(true);
  }

  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
      display: 'flex', flexDirection: 'column', position: 'relative',
    }}>
      <FakeStatusBar/>

      <header style={{ padding: '2px 22px 10px', flexShrink: 0, display: 'flex', flexDirection: 'column', gap: 2 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <Label size={9} color={T.soilMid}>GARDEN OS · W{WEEK_NOW}</Label>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <Label size={9} color={T.soilMid}>ZONE 7a · DAY {DAY_OF_SEASON}</Label>
            <button aria-label="Tweaks" onClick={() => setTweaksOpen(true)} style={{
              width: 26, height: 26, borderRadius: 6, padding: 0,
              background: T.panel, border: `1px solid ${T.borderSoft}`,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            }}>{Icons.gear(12, T.soil)}</button>
          </div>
        </div>
        <div style={{
          fontFamily: T.fontDisp, fontSize: 30, fontWeight: 600,
          letterSpacing: -0.5, color: T.soil, lineHeight: 1.05, marginTop: 2,
        }}>
          {WEEKDAY}, <span style={{ fontStyle: 'italic', color: T.leaf }}>{MONTH_DAY}.</span>
        </div>
        <div style={{ fontFamily: T.fontSerif, fontSize: 13, color: T.textSoft, fontStyle: 'italic' }}>
          Late spring. Soil warm. Last frost five days behind us.
        </div>
      </header>

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 24px' }}>
        <ThisWeekCapsule compact={compact}/>

        <SeasonLogTile summary={bedSummary} compact={compact}/>

        <section style={{ marginTop: compact ? 10 : 14 }}>
          <Label size={9} color={T.textSoft} style={{ marginLeft: 4 }}>WHERE TO</Label>
          <div style={{
            marginTop: 6, display: 'grid', gridTemplateColumns: '1fr 1fr',
            gap: compact ? 8 : 10,
          }}>
            <Tile title="Plan"    subtitle="The season at a glance"      icon={Icons.plan}    href="garden-planner-v5.html" compact={compact}/>
            <Tile title="Paint"   subtitle="Place crops in the bed"      icon={Icons.paint}   href="garden-painting.html"    compact={compact}/>
            <Tile title="Doctor"  subtitle="What's wrong with this leaf" icon={Icons.doctor}  href="garden-doctor-v5.html"   compact={compact}/>
            <Tile title="Journal" subtitle="Garden memory and system inbox" icon={Icons.journal} href="journal.html" compact={compact}/>
          </div>
        </section>

        <button onClick={() => setMoreOpen(true)} style={{
          marginTop: compact ? 10 : 12, width: '100%',
          padding: '12px 14px', borderRadius: 12,
          background: T.panel, border: `1px solid ${T.borderSoft}`,
          display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer',
          fontFamily: T.fontSans, color: T.text, textAlign: 'left', minHeight: 48,
        }}>
          <span style={{
            width: 28, height: 28, borderRadius: 8,
            background: T.cedarWash, display: 'inline-flex',
            alignItems: 'center', justifyContent: 'center',
          }}>{Icons.code(16, T.soil)}</span>
          <span style={{ flex: 1 }}>
            <span style={{
              display: 'block', fontFamily: T.fontDisp, fontSize: 14,
              fontWeight: 600, color: T.text, letterSpacing: -0.1,
            }}>More tools</span>
            <span style={{ display: 'block', fontSize: 11, color: T.textSoft, lineHeight: 1.3, marginTop: 1 }}>
              Build, Ops, Story Mode, Dev
            </span>
          </span>
          <span style={{ display: 'inline-flex' }}>{Icons.arrow(13, T.textMuted)}</span>
        </button>

        {tweak.showRecent && (recents.length > 0 ? (
          <section style={{ marginTop: compact ? 12 : 16 }}>
            <Label size={9} color={T.textSoft} style={{ marginLeft: 4 }}>RECENTLY TOUCHED</Label>
            <div style={{
              marginTop: 6, background: T.panel, borderRadius: 12,
              border: `1px solid ${T.borderSoft}`, overflow: 'hidden',
            }}>
              {recents.map((r, i) => (
                <RecentRow key={r.tool + i} row={r} last={i === recents.length - 1}/>
              ))}
            </div>
          </section>
        ) : (
          <WelcomeCard/>
        ))}
      </div>

      <TabBar active="hub"/>
      {tweaksOpen && <TweaksPanel tweak={tweak} setTweak={setTweak} onClose={() => setTweaksOpen(false)}/>}
      {moreOpen && <MoreToolsSheet onClose={() => setMoreOpen(false)} onOpenDevTools={openDevTools}/>}
      {devOpen && <DevToolsOverlay onClose={() => setDevOpen(false)}/>}
    </div>
  );
}

// Cold-start route (PR #21): if no active bed lives in localStorage, send
// the user to Painting before any Hub UI renders. The flag suppresses the
// ReactDOM render so there's no flash of Hub during the navigation. Fails
// open with a console warning if gos-bed.js failed to load — better to show
// a Hub with empty data than to lock the user in a redirect loop.
let __coldStartRedirecting = false;
if (typeof GosBed === 'undefined' || typeof GosBed.getActive !== 'function') {
  console.warn('Garden OS: GosBed not available — skipping cold-start guard');
} else if (GosBed.getActive() === null) {
  __coldStartRedirecting = true;
  location.replace('garden-painting.html');
}

// gos-bed.js wiring: report saved beds for verification
if (typeof GosBed !== 'undefined') {
  const beds = GosBed.readAll();
  console.log('Garden OS: ' + beds.length + ' bed(s) found');
  const _summary = loadActiveBedSummary();
  if (_summary) {
    console.log('Garden OS: ' + _summary.seasonCount + ' events logged this season');
  }
}

if (!__coldStartRedirecting) {
  ReactDOM.createRoot(document.getElementById('root')).render(<PhoneFrame><Hub/></PhoneFrame>);
}
</script>
</body>
</html>
