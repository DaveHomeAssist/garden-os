// ── Suitability adapter (delegates to GosSuitability) ──────────────────────
// Painting's internal bed shape is {cols, rows, sun, painted: [{r,c,crop}]}.
// GosSuitability operates on the canonical GosBed shape (painted entries with
// {cell:"rRcC", cropId, ...} and bed-level wallSide / sunHoursNumeric / etc).
// This adapter bridges them so the UI keeps its existing function signatures
// while the realism model is computed centrally.

function paintingBedToGos(bed) {
  if (!bed) return null;
  const sunInternal = bed.sun || 'full';
  const sunCanonical = sunInternal === 'part' ? 'partial' : sunInternal;
  return {
    shape: bed.cols + 'x' + bed.rows,
    sun: sunCanonical,
    wallSide: bed.wallSide,                          // optional, may be undefined
    sunHoursNumeric: bed.sunHoursNumeric,            // optional
    painted: (bed.painted || []).map(p => ({
      cell: 'r' + p.r + 'c' + p.c,
      cropId: p.crop,
    })),
  };
}

function paintingGetCrop(cropId) {
  const c = CROPS[cropId];
  if (!c) return null;
  return {
    sun: c.sun,
    family: c.family,
    sowWeek: c.sowWeek,
    transplantWeek: c.transplantWeek,
    harvestStart: c.harvestStart,
    harvestEnd: c.harvestEnd,
  };
}

function currentIsoWeekSafe() {
  if (typeof GosBed !== 'undefined' && typeof GosBed.currentIsoWeek === 'function') {
    return GosBed.currentIsoWeek();
  }
  return null;
}

// Pure scoring kernel kept stable for callers (recsForCell, computeBedScore):
// given a bed, a cell coord, and a candidate crop id, returns 0–10. When
// GosSuitability is unavailable (e.g., it failed to load), return a neutral
// midpoint so the UI keeps rendering rather than crashing.
function scoreCropCell(bed, r, c, cropId) {
  if (!bed || !cropId) return 5;
  if (typeof GosSuitability === 'undefined') return 5;
  const gosBed = paintingBedToGos(bed);
  if (!gosBed) return 5;
  // Build a synthetic painted entry for this candidate at (r,c). Replace any
  // existing entry at the same cell so the candidate is what the scorer sees.
  const cellStr = 'r' + r + 'c' + c;
  const synthPainted = (gosBed.painted || []).filter(p => p.cell !== cellStr);
  synthPainted.push({ cell: cellStr, cropId: cropId });
  const synth = Object.assign({}, gosBed, { painted: synthPainted });
  const result = GosSuitability.scoreCell({
    bed: synth,
    cellEntry: { cell: cellStr, cropId: cropId },
    getCrop: paintingGetCrop,
    currentWeek: currentIsoWeekSafe(),
  });
  if (!result) return 5;
  return Math.max(0, Math.min(10, result.total));
}

function recsForCell(bed, r, c) {
  return Object.keys(CROPS)
    .map(k => ({ crop: k, score: scoreCropCell(bed, r, c, k) }))
    .sort((a, b) => b.score - a.score);
}

function isMobileViewport() {
  return typeof window !== 'undefined' &&

}

function getCellScoreDetail(bed, painted, cell) {
  if (!bed || !cell || !cell.crop || typeof GosSuitability === 'undefined') return null;
  const scoreBed = Object.assign({}, bed, { painted: painted || [] });
  const gosBed = paintingBedToGos(scoreBed);
  if (!gosBed) return null;
  const cellStr = 'r' + cell.r + 'c' + cell.c;
  return GosSuitability.scoreCell({
    bed: gosBed,
    cellEntry: { cell: cellStr, cropId: cell.crop },
    getCrop: paintingGetCrop,
    currentWeek: currentIsoWeekSafe(),
  });
}

function cellLocationLabel(cell) {
  if (!cell) return '';
  return cell.bedLocation || cell.label || ('Row ' + (cell.r + 1));
}

function cellDisplayName(cell) {
  const crop = cell && CROPS[cell.crop];
  return (cell && (cell.displayName || cell.cropName)) || (crop && crop.name) || 'Empty cell';
}

function cropPaletteLabel(cropId) {
  const crop = CROPS[cropId];
  return (crop && (crop.label || crop.name)) || cropId || 'Crop';
}

function cellVarietyLabel(cell) {
  return (cell && cell.varietyName) || '';
}

function cellDisplayWithVariety(cell) {
  const name = cellDisplayName(cell);
  const variety = cellVarietyLabel(cell);
  return variety ? name + ' - ' + variety : name;
}

function cropVisualForPlanting(crop, planting) {
  if (!crop) return null;
  const text = [
    planting && planting.displayName,
    planting && planting.cropName,
    planting && planting.varietyName,
  ].filter(Boolean).join(' ');
  const isRedLettuce = crop.name === 'Lettuce' && /red|marvel/i.test(text);
  return isRedLettuce ? Object.assign({}, crop, { color: RED_LETTUCE_COLOR }) : crop;
}

function cellDoctorHref(bed, cell) {
  const params = new URLSearchParams();
  if (bed && bed.id) params.set('bed', bed.id);
  if (cell) {
    params.set('cell', 'r' + cell.r + 'c' + cell.c);
    if (cell.crop) params.set('crop', cell.crop);
    if (cell.varietyName) params.set('variety', cell.varietyName);
  }
  return 'garden-doctor-v5.html?' + params.toString();
}

function eventMatchesCell(event, cell) {
  if (!event || !cell) return false;
  const cellStr = 'r' + cell.r + 'c' + cell.c;
  if (event.cell === cellStr || event.cellId === cellStr) return true;
  const snap = event.cropSnapshot || (event.payload && event.payload.planting);
  return !!(snap && (snap.cell === cellStr || snap.cropId === cell.crop));
}

function journalEntriesForCell(bed, cell) {
  const events = bed && Array.isArray(bed.events) ? bed.events : [];
  return events.filter(event => eventMatchesCell(event, cell)).slice(-3).reverse();
}

function neighborRelationsForCell(bedPainted, cell) {
  const crop = cell && CROPS[cell.crop];
  if (!crop) return [];
  const companions = crop.companions || [];
  const conflicts = crop.conflicts || [];
  return (bedPainted || []).filter(other => other && other !== cell &&
    Math.abs(other.r - cell.r) + Math.abs(other.c - cell.c) === 1
  ).map(other => {
    const relation = companions.includes(other.crop) ? 'Companion' :
      (conflicts.includes(other.crop) ? 'Conflict' : null);
    return relation ? { relation, cell: other } : null;
  }).filter(Boolean);
}

// Aggregate the bed's score from all occupied cells. Returns:
//   { score: 0-100 number | null, weakestCells: ["r0c2", ...] }
function computeBedScore(bed) {
  if (!bed) return { score: null, weakestCells: [] };
  if (typeof GosSuitability === 'undefined') {
    return { score: null, weakestCells: [] };
  }
  const gosBed = paintingBedToGos(bed);
  if (!gosBed) return { score: null, weakestCells: [] };
  const result = GosSuitability.scoreBed({
    bed: gosBed,
    getCrop: paintingGetCrop,
    currentWeek: currentIsoWeekSafe(),
  });
  return {
    score: result.score,
    weakestCells: result.weakestCells || [],
  };
}

// ── gos-bed.js wiring helpers ───────────────────────────────────────────────
// Convert the canonical GosBed record into the internal format the existing
// Painting components expect (cols/rows ints, 2D shape grid, painted as
// {r,c,crop} entries).
function gosBedToInternal(gosBed) {
  if (!gosBed) return null;
  const dims = (gosBed.dimensions && gosBed.dimensions.cols && gosBed.dimensions.rows)
    ? { cols: Number(gosBed.dimensions.cols), rows: Number(gosBed.dimensions.rows) }
    : (typeof GosBed !== 'undefined' && GosBed.parseShape(gosBed.shape))
    || { cols: 4, rows: 8 };
  const cols = dims.cols, rows = dims.rows;
  const sunInternal = gosBed.sun === 'partial' ? 'part' : gosBed.sun;
  return {
    id: gosBed.id,
    name: gosBed.name || gosBed.id,
    cols, rows,
    location: sunInternal === 'part' ? 'Part shade' : (sunInternal === 'shade' ? 'Shade' : 'Full sun'),
    sun: sunInternal,
    // bedContext fields — pass through so suitability can use real site data.
    zone: gosBed.zone,
    wallSide: gosBed.wallSide,
    sunHoursNumeric: gosBed.sunHoursNumeric,
    water: gosBed.water,
    orientation: gosBed.orientation,
    type: gosBed.type,
    source: gosBed.source,
    loadedAt: gosBed.loadedAt,
    momGarden: gosBed.momGarden === true,
    comment: gosBed.comment,
    events: Array.isArray(gosBed.events) ? gosBed.events : [],
    rowLabels: gosBed.type === 'grow_bags'
      ? ['Bags']
      : Array.from({ length: rows }, (_, i) => 'Row ' + (i + 1)),
    shape: Array.from({ length: rows }, () => Array.from({ length: cols }, () => 1)),
    painted: (gosBed.painted || []).map(p => {
      const cell = GosBed.parseCell(p.cell);
      if (!cell) return null;
      if (cell.r >= rows || cell.c >= cols) return null;
      return {
        r: cell.r,
        c: cell.c,
        crop: p.cropId,
        id: p.id,
        displayName: p.displayName || p.cropName,
        varietyName: p.varietyName,
        status: p.status,
        bedLocation: p.bedLocation,
        placementConfidence: p.placementConfidence,
        placementNote: p.placementNote,
        label: p.label || (gosBed.type === 'grow_bags' ? 'Bag ' + (cell.c + 1) : null),
        notes: p.notes,
      };
    }).filter(Boolean),
  };
}

// Serialize internal painted state plus active-bed metadata into the canonical
// GosBed schema for write-back. Preserves plantedAt/plantedWeek for cells whose
// cropId hasn't changed since the last save; stamps now for newly-painted or
// changed cells. Carries forward existing bedContext fields untouched.
function internalToGosBed(activeBed, internalPaintedArr) {
  const prev = (typeof GosBed !== 'undefined') ? GosBed.read(activeBed.id) : null;
  const prevByCellCrop = new Map();
  if (prev && Array.isArray(prev.painted)) {
    prev.painted.forEach(p => {
      if (p && p.cell && p.cropId) prevByCellCrop.set(p.cell + '::' + p.cropId, p);
    });
  }
  const nowIso = (typeof GosBed !== 'undefined') ? GosBed.currentIsoDate() : new Date().toISOString();
  const nowWeek = (typeof GosBed !== 'undefined') ? GosBed.currentIsoWeek() : null;

  const out = {
    id: activeBed.id,
    name: activeBed.name,
    shape: activeBed.cols + 'x' + activeBed.rows,
    sun: activeBed.sun === 'part' ? 'partial' : (activeBed.sun || 'full'),
    painted: (internalPaintedArr || []).map(p => {
      const c = CROPS[p.crop];
      const cellStr = GosBed.formatCell(p.r, p.c);
      const prior = prevByCellCrop.get(cellStr + '::' + p.crop);
      const entry = {
        cell: cellStr,
        cropId: p.crop,
        cropName: (p.displayName || (c && c.name)) || p.crop,
        cropIcon: (c && c.mono) || '',
        cropColor: (c && c.color) || '#888',
      };
      if (prior) {
        ['id','displayName','varietyName','status','bedLocation','sourceBedName',
         'placementConfidence','placementNote','label','plantedOnStart','plantedOnEnd',
         'season','notes'].forEach(k => {
          if (prior[k] !== undefined) entry[k] = prior[k];
        });
      }
      if (prior && prior.plantedAt) {
        entry.plantedAt = prior.plantedAt;
        if (typeof prior.plantedWeek === 'number') entry.plantedWeek = prior.plantedWeek;
      } else {
        entry.plantedAt = nowIso;
        if (nowWeek != null) entry.plantedWeek = nowWeek;
      }
      return entry;
    })
  };
  out.dimensions = { rows: activeBed.rows, cols: activeBed.cols };
  if (activeBed.type) out.type = activeBed.type;
  if (activeBed.source) out.source = activeBed.source;
  if (activeBed.loadedAt) out.loadedAt = activeBed.loadedAt;
  if (activeBed.momGarden === true) out.momGarden = true;
  if (activeBed.comment) out.comment = activeBed.comment;
  out.events = Array.isArray(activeBed.events)
    ? activeBed.events
    : (prev && Array.isArray(prev.events) ? prev.events : []);

  // bedContext fields: prefer the live activeBed value (user just edited it
  // on the Beds screen. Fall back to prev so autosave doesn't drop fields the user
  // hasn't touched this session.
  function ctx(field, validator) {
    if (validator(activeBed[field])) return activeBed[field];
    if (prev && validator(prev[field])) return prev[field];
    return undefined;
  }
  const isStr = v => typeof v === 'string' && v.length > 0;
  const isNum = v => typeof v === 'number' && isFinite(v);
  const zone        = ctx('zone',            isStr);
  const wallSide    = ctx('wallSide',        isStr);
  const sunHoursN   = ctx('sunHoursNumeric', isNum);
  const water       = ctx('water',           isStr);
  const orientation = ctx('orientation',     isStr);
  if (zone        !== undefined) out.zone            = zone;
  if (wallSide    !== undefined) out.wallSide        = wallSide;
  if (sunHoursN   !== undefined) out.sunHoursNumeric = sunHoursN;
  if (water       !== undefined) out.water           = water;
  if (orientation !== undefined) out.orientation     = orientation;
  return out;
}

function loadActiveBedAsInternal() {
  if (typeof GosBed === 'undefined') return null;
  return gosBedToInternal(GosBed.getActive());
}

function loadAllBedsAsInternal() {
  if (typeof GosBed === 'undefined' || !GosBed.readAll) return [];
  return GosBed.readAll().map(gosBedToInternal).filter(Boolean);
}

function paintedMapFromBeds(beds) {
  const out = {};
  (beds || []).forEach(bed => {
    if (bed && bed.id) out[bed.id] = Array.isArray(bed.painted) ? bed.painted : [];
  });
  return out;
}

async function loadMomGardenData(overwrite) {
  if (typeof GosBed === 'undefined' || !GosBed.mom) {
    throw new Error('Mom Garden loader is unavailable.');
  }
  const res = await fetch('data/mom-garden-data.json', { cache: 'no-store' });
  if (!res.ok) throw new Error('Could not load Mom Garden data.');
  const data = await res.json();
  return GosBed.mom.loadFromData(data, { overwrite: !!overwrite });
}

async function resetMomGardenAndReload() {
  const ok = window.confirm('Reset to Mom Garden? This replaces current Mom beds with 3 beds and 13 plantings.');
  if (!ok) return;
  await loadMomGardenData(true);
  window.location.href = 'garden-painting.html';
}

// First-run stub. Creates a default 4×8 bed via the pending-then-commit flow
// so the data primitive is exercised end to end. Full creator UI is next task.
// ── Bed creator (build-order item #2) ──────────────────────────────────────
const SIZE_PRESETS = ['2x4', '2x6', '4x4', '4x6', '4x8', '4x12'];

function slugifyName(input) {
  return String(input || '')
    .toLowerCase()
    .trim()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '')
    .replace(/-+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function isMidSeasonNow() {
  const m = new Date().getMonth(); // 0 = Jan; May=4..Sep=8
  return m >= 4 && m <= 8;
}

function readPendingRaw() {
  try {
    const raw = window.localStorage.getItem('gos.bed.pending');
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

function BedCreator({ hasInitialBeds, onComplete, onCancel }) {
  const initialPending = React.useMemo(readPendingRaw, []);
  const [showResumeBanner, setShowResumeBanner] = React.useState(initialPending !== null);
  const [step, setStep] = React.useState(1);
  const [name, setName] = React.useState('');
  const [shape, setShape] = React.useState('4x8');
  const [customW, setCustomW] = React.useState(3);
  const [customL, setCustomL] = React.useState(7);
  const [sun, setSun] = React.useState('full');
  const [error, setError] = React.useState('');
  const nameInputRef = React.useRef(null);
  const isMidSeason = React.useMemo(isMidSeasonNow, []);
  const existingBedIds = React.useMemo(() =>
    (typeof GosBed !== 'undefined' ? GosBed.readAll().map(b => b.id) : []), []);

  React.useEffect(() => {
    if (step === 1 && nameInputRef.current && !showResumeBanner) {
      nameInputRef.current.focus();
    }
  }, [step, showResumeBanner]);

  const applyShapeToState = (shapeStr) => {
    if (!shapeStr) return;
    if (SIZE_PRESETS.indexOf(shapeStr) >= 0) {
      setShape(shapeStr);
    } else {
      const dims = (typeof GosBed !== 'undefined') ? GosBed.parseShape(shapeStr) : null;
      if (dims) {
        setShape('custom');
        setCustomW(dims.cols);
        setCustomL(dims.rows);
      }
    }
  };

  const handleResume = () => {
    if (!initialPending) return;
    if (initialPending.name) setName(initialPending.name);
    if (initialPending.shape) applyShapeToState(initialPending.shape);
    if (initialPending.sun) setSun(initialPending.sun);
    setShowResumeBanner(false);
    setError('');
    setStep(2);
  };

  const handleStartOver = () => {
    if (typeof GosBed !== 'undefined') GosBed.discardPending();
    setShowResumeBanner(false);
    setName('');
    setShape('4x8');
    setSun('full');
    setError('');
  };

  const handleStep1Next = () => {
    const trimmed = name.trim();
    if (!trimmed) { setError('Please enter a name.'); return; }
    const id = slugifyName(trimmed);
    if (!id) { setError('Please use letters or numbers in the name.'); return; }

      return;

    setError('');
    try {
      GosBed.writePending({ id, name: trimmed });

    setStep(2);

  const handleStep2Next = () => {

    setStep(3);

    setError('');
    try {
      const pending = readPendingRaw() || {};
      GosBed.writePending(Object.assign({}, pending, { sun, painted: [] }));
      const committed = GosBed.commitPending();
      if (!committed) { setError('Could not save bed. Try again.'); return; }
      GosBed.setActive(committed.id);
      onComplete(committed);

                </div>

            {isMidSeason && !showResumeBanner && (
              <div style={{

              aria-label="Bed name"

                border: `1px solid ${error ? T.rust : T.borderSoft}`,

                  background: 'transparent', color: T.textSoft,

              <button type="button" onClick={handleStep1Next} style={{

                background: T.leafBright, color: '#fff', border: 'none',

          <div>
            <div style={{

            <div className="gos-creator-grid" style={{
              display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8,

              {SIZE_PRESETS.map(sz => {
                const dims = sz.split('x').map(Number);
                const aspect = dims[0] / dims[1];
                const visW = aspect >= 1 ? 44 : Math.max(20, Math.round(44 * aspect));
                const visH = aspect >= 1 ? Math.max(20, Math.round(44 / aspect)) : 44;

            <div style={{

                    padding: '12px 14px', borderRadius: 10,
                    background: sel ? T.panel : T.cream,
                    border: `1.5px solid ${sel ? T.leafBright : T.borderSoft}`,
                    cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12,
                    textAlign: 'left', minHeight: 60,
                    boxShadow: sel ? '0 2px 6px rgba(78,140,60,0.18)' : 'none',

                    <div style={{

              <div style={{ marginTop: 8, color: T.rust, fontFamily: T.fontSans, fontSize: 12 }}>{error}</div>
            )}

            <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
              <button type="button" onClick={() => { setError(''); setStep(2); }} style={{
                flex: 1, minHeight: 44, padding: '10px 12px', borderRadius: 10,
                background: 'transparent', color: T.textSoft,

                fontFamily: T.fontSans, fontSize: 14, fontWeight: 500, cursor: 'pointer',

// ── Bed-wide score badge (build-order item #3) ─────────────────────────────
// Persistent floating badge that shows an aggregate score for the active bed.
// Tap toggles a weakest-cell highlight pass on the canvas.
//
// Reads bed state via the getCurrentBed prop (which knows the live painted
// state). Falls back to GosBed.getActive() when an event arrives without a
// payload. Two custom window events feed it:
//   - gosBedChanged       (fired by Painting.handleCreatorComplete)
//   - gosPaintedChanged   (fired by Painting whenever painted[] mutates)
// Two custom window events come out of it:
//   - gosHighlightCells   { detail: { cells: ["r0c2", ...] } }
const SCORE_TIER_COLORS = { green: '#4caf50', amber: '#f5a623', red: '#e53935', gray: '#9e9e9e' };
function tierFor(score) {
  if (score === null || score === undefined) return 'gray';
  if (score >= 90) return 'green';
  if (score >= 70) return 'amber';
  return 'red';
}

function ScoreBadge({ getCurrentBed }) {
  const [score, setScore] = React.useState(null);
  const [weakestCells, setWeakestCells] = React.useState([]);
  const [highlightMode, setHighlightMode] = React.useState(false);
  const [showTooltip, setShowTooltip] = React.useState(false);
  const tooltipTimerRef = React.useRef(null);
  const highlightModeRef = React.useRef(highlightMode);
  React.useEffect(() => { highlightModeRef.current = highlightMode; }, [highlightMode]);

  const recompute = React.useCallback((bedSource) => {
    const bed = bedSource || (getCurrentBed && getCurrentBed()) ||
                ((typeof GosBed !== 'undefined') ? GosBed.getActive() : null);
    const result = computeBedScore(bed);
    setScore(result.score);
    setWeakestCells(result.weakestCells);
    return result;
  }, [getCurrentBed]);

  // Initial compute on mount.
  React.useEffect(() => { recompute(); }, [recompute]);

  // Listen for bed-changed and painted-changed events.
  React.useEffect(() => {
    const onBedChanged = (e) => {
      const result = recompute(e && e.detail && e.detail.bed);
      if (highlightModeRef.current) {
        try {
          window.dispatchEvent(new CustomEvent('gosHighlightCells',
            { detail: { cells: result.weakestCells } }));
        } catch (_) {}
      }
    };
    const onPaintedChanged = (e) => {
      const bedFromDetail = e && e.detail && e.detail.bed;
      const result = recompute(bedFromDetail);
      if (highlightModeRef.current) {
        try {
          window.dispatchEvent(new CustomEvent('gosHighlightCells',
            { detail: { cells: result.weakestCells } }));
        } catch (_) {}
      }
    };
    window.addEventListener('gosBedChanged', onBedChanged);
    window.addEventListener('gosPaintedChanged', onPaintedChanged);
    return () => {
      window.removeEventListener('gosBedChanged', onBedChanged);
      window.removeEventListener('gosPaintedChanged', onPaintedChanged);
    };
  }, [recompute]);

  React.useEffect(() => {
    return () => { if (tooltipTimerRef.current) clearTimeout(tooltipTimerRef.current); };
  }, []);

  const handleClick = () => {
    if (score === null) {
      setShowTooltip(true);
      if (tooltipTimerRef.current) clearTimeout(tooltipTimerRef.current);
      tooltipTimerRef.current = setTimeout(() => setShowTooltip(false), 2400);
      return;
    }
    const next = !highlightMode;
    setHighlightMode(next);
    try {
      window.dispatchEvent(new CustomEvent('gosHighlightCells',
        { detail: { cells: next ? weakestCells : [] } }));
    } catch (_) {}
  };

  const handleDismiss = () => {
    setHighlightMode(false);
    try {
      window.dispatchEvent(new CustomEvent('gosHighlightCells', { detail: { cells: [] } }));
    } catch (_) {}
  };

  const tier = tierFor(score);
  const bg = SCORE_TIER_COLORS[tier];

  return (
    <>
      <button type="button" onClick={handleClick} aria-pressed={highlightMode}
        aria-label={score === null ? 'Bed score: no crops yet' : 'Bed score ' + score + ' of 100'}
        style={{
          height: 30, minHeight: 30, padding: '0 9px',
          borderRadius: 999, background: bg, color: '#fff',
          border: highlightMode ? `2px solid ${T.soil}` : '2px solid transparent',
          cursor: 'pointer',
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 5,
          fontFamily: T.fontDisp,
          boxShadow: '0 2px 8px rgba(44,27,11,0.16), 0 0 0 1px rgba(0,0,0,0.05)',
          transition: 'transform 0.18s, border-color 0.18s',
        }}>
        <span style={{ fontSize: 15, fontWeight: 600, lineHeight: 1, letterSpacing: 0 }}>
          {score === null ? '—' : score}
        </span>
        <span style={{
          fontFamily: T.fontMono, fontSize: 10, fontWeight: 500,
          letterSpacing: 0.08, opacity: 0.88, textTransform: 'uppercase',
        }}>bed score</span>
      </button>

      {showTooltip && (
        <div role="status" style={{
          position: 'absolute', top: 38, right: 0, zIndex: 50, width: 180,
          background: T.panel, border: `1px solid ${T.borderSoft}`,
          borderRadius: 10, padding: '8px 12px',
          fontFamily: T.fontSans, fontSize: 12, color: T.text,
          boxShadow: '0 6px 14px rgba(44,27,11,0.18)',
        }}>
          Place some crops first.
        </div>
      )}

      {highlightMode && weakestCells.length > 0 && (
        <div role="status" style={{
          position: 'absolute', top: 38, right: 0, zIndex: 50, width: 240,
          background: T.panel, border: `1px solid ${SCORE_TIER_COLORS.amber}`,
          borderRadius: 10, padding: '8px 8px 8px 12px',
          display: 'flex', alignItems: 'center', gap: 8,
          boxShadow: '0 6px 14px rgba(44,27,11,0.18)',
        }}>
          <span style={{ fontFamily: T.fontSans, fontSize: 11.5, color: T.text, lineHeight: 1.35, flex: 1 }}>
            <b>{weakestCells.length}</b> cell{weakestCells.length === 1 ? '' : 's'} dragging your score down. Tap a highlighted cell to see why.
          </span>
          <button type="button" onClick={handleDismiss} aria-label="Dismiss highlight" style={{
            width: 28, height: 28, minWidth: 28, minHeight: 28,
            borderRadius: 6, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
            color: T.textSoft, flexShrink: 0,
          }}>{Icons.close(12, T.textSoft)}</button>
        </div>
      )}
    </>
  );
}

// ── Main painting flow (Direction 1: Brush) ─────────────────────────────────
function Painting({ tweak, onOpenTweaks }) {
  const [activeBed, setActiveBed] = React.useState(loadActiveBedAsInternal);
  const [activeBedId, setActiveBedId] = React.useState(activeBed ? activeBed.id : '');
  const [allBeds, setAllBeds] = React.useState(() => {
    const beds = loadAllBedsAsInternal();
    return beds.length ? beds : (activeBed ? [activeBed] : []);
  });
  const [tool, setTool] = React.useState('paint');
  const [brush, setBrush] = React.useState('bas');
  const [painted, setPainted] = React.useState(() => {
    const beds = allBeds.length ? allBeds : (activeBed ? [activeBed] : []);
    return paintedMapFromBeds(beds);
  });
  const [history, setHistory] = React.useState([]);
  const [selected, setSelected] = React.useState(null);
  const [creatorOpen, setCreatorOpen] = React.useState(activeBed === null);
  const [ghostVisible, setGhostVisible] = React.useState(false);
  const [siteOpen, setSiteOpen] = React.useState(false);
  const [cellSheet, setCellSheet] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const restoreFocusRef = React.useRef(null);

  // Apply user edits from the Site panel: merge into activeBed and let the
  // existing autosave effect write through to GosBed. The internalToGosBed
  // serializer prefers activeBed values for bedContext fields.
  const handleSiteChange = React.useCallback((nextBed) => {
    setActiveBed(nextBed);
  }, []);
  // True when the bed has any non-default site context — drives the small
  // green dot on the Site button so the user can tell at a glance.
  const hasSiteContext = !!(activeBed && (
    activeBed.zone || activeBed.wallSide ||
    activeBed.sunHoursNumeric != null ||
    activeBed.water || activeBed.orientation
  ));

  // Claim the session lock once per tab on mount.
  React.useEffect(() => {
    if (typeof GosBed !== 'undefined') GosBed.initSessionLock();
  }, []);

  // Debounced autosave: serialize current painted state to GosBed.
  React.useEffect(() => {
    if (!activeBed || typeof GosBed === 'undefined') return;
    const list = painted[activeBed.id];
    if (!list) return;
    const t = setTimeout(() => {
      try {
        GosBed.write(internalToGosBed(activeBed, list));
      } catch (e) {
        console.warn('GosBed.write failed:', e.message);
        try { alert(e.message); } catch (_) {}
      }
    }, 500);
    return () => clearTimeout(t);
  }, [painted, activeBed]);

  // Synchronously dispatch gosPaintedChanged on every painted-state mutation
  // so ScoreBadge can recompute against the live bed without waiting for the
  // 500ms autosave to flush. Detail carries a synthetic bed snapshot so any
  // listener can score from the live state.
  React.useEffect(() => {
    if (!activeBed) return;
    const list = painted[activeBed.id];
    if (!list) return;
    try {
      const liveBed = Object.assign({}, activeBed, { painted: list });
      window.dispatchEvent(new CustomEvent('gosPaintedChanged',
        { detail: { id: activeBed.id, bed: liveBed } }));
    } catch (_) {}
  }, [painted, activeBed]);

  // Cell highlight handler: toggle .gos-cell-weak on cells matching the
  // payload from gosHighlightCells. Empty array clears all. Existing
  // BedCell elements expose data-cell="r-c"; weakest cells arrive in
  // "rRcC" form (matching the GosBed schema), so we translate at the
  // boundary and leave BedCell untouched.
  React.useEffect(() => {
    const handler = (e) => {
      const cells = (e && e.detail && Array.isArray(e.detail.cells))
        ? e.detail.cells : [];
      const targets = new Set();
      cells.forEach(s => {
        const m = String(s).match(/^r(\d+)c(\d+)$/);
        if (m) targets.add(m[1] + '-' + m[2]);
      });
      const all = document.querySelectorAll('[data-cell]');
      all.forEach(el => {
        const dc = el.getAttribute('data-cell');
        if (targets.has(dc)) el.classList.add('gos-cell-weak');
        else el.classList.remove('gos-cell-weak');
      });
    };
    window.addEventListener('gosHighlightCells', handler);
    return () => window.removeEventListener('gosHighlightCells', handler);
  }, []);

  const handleCreatorComplete = () => {
    const fresh = loadActiveBedAsInternal();
    if (!fresh) return;
    const beds = loadAllBedsAsInternal();
    setAllBeds(beds.length ? beds : [fresh]);
    setActiveBed(fresh);
    setActiveBedId(fresh.id);
    setPainted(prev => Object.assign({}, paintedMapFromBeds(beds.length ? beds : [fresh]), prev, { [fresh.id]: fresh.painted }));
    setCreatorOpen(false);
    setTimeout(() => setGhostVisible(true), 300);
    // Notify ScoreBadge (and any other listeners) that the active bed changed.
    try {
      window.dispatchEvent(new CustomEvent('gosBedChanged',
        { detail: { id: fresh.id, bed: fresh } }));
    } catch (_) {}
  };

  const handleCreatorCancel = () => {
    setCreatorOpen(false);
  };

  const handleAddBedClick = () => {
    if (typeof GosBed !== 'undefined') GosBed.discardPending();
    setCreatorOpen(true);
  };

  const refreshFromActiveBed = React.useCallback(() => {
    const fresh = loadActiveBedAsInternal();
    const beds = loadAllBedsAsInternal();
    setAllBeds(beds.length ? beds : (fresh ? [fresh] : []));
    setActiveBed(fresh);
    setActiveBedId(fresh ? fresh.id : '');
    setPainted(paintedMapFromBeds(beds.length ? beds : (fresh ? [fresh] : [])));
    setSelected(null);
    return fresh;
  }, []);

  const handlePickBed = React.useCallback((id) => {
    if (!id) return;
    let next = allBeds.find(bed => bed && bed.id === id);
    if (!next && typeof GosBed !== 'undefined' && GosBed.read) {
      next = gosBedToInternal(GosBed.read(id));
    }
    if (!next) return;
    if (typeof GosBed !== 'undefined' && GosBed.setActive) GosBed.setActive(id);
    setActiveBed(next);
    setActiveBedId(next.id);
    setPainted(prev => Object.assign({}, prev, { [next.id]: next.painted || [] }));
    setSelected(null);
  }, [allBeds]);

  const handleLoadMomGarden = async (overwrite) => {
    const shouldOverwrite = !!overwrite;
    if (shouldOverwrite) {
      const ok = window.confirm('Reset to Mom Garden? This replaces current Mom beds with 3 beds and 13 plantings.');
      if (!ok) return;
    }
    try {
      await loadMomGardenData(shouldOverwrite);
      const fresh = refreshFromActiveBed();
      setCreatorOpen(false);
      if (fresh) {
        try { window.dispatchEvent(new CustomEvent('gosBedChanged', { detail: { id: fresh.id, bed: fresh } })); } catch (_) {}
      }
    } catch (e) {
      console.warn('Mom Garden load failed:', e.message);
      try { alert(e.message || 'Mom Garden load failed'); } catch (_) {}
    }
  };

  // First-run shell: no active bed yet. Render minimal chrome with the
  // BedCreator overlay covering the empty canvas area.
  if (!activeBed) {
    return (
      <div style={{
        width: '100%', height: '100%', background: T.cream,
        fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
        display: 'flex', flexDirection: 'column', position: 'relative',
      }}>
        <FakeStatusBar/>
        <div style={{
          flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 24,
        }}>
          <div style={{
            fontFamily: T.fontSerif, fontSize: 14, color: T.textSoft,
            fontStyle: 'italic', textAlign: 'center', maxWidth: 240, lineHeight: 1.5,
          }}>
            Garden OS needs one bed to begin. Set yours up and we'll take it from there.
          </div>
          <button type="button" onClick={() => handleLoadMomGarden(false)} style={{
            position: 'absolute', bottom: 94,
            padding: '10px 14px', borderRadius: 999,
            background: T.leafBright, color: '#fff',
            border: 'none', fontFamily: T.fontSans, fontSize: 13, fontWeight: 700,
            cursor: 'pointer',
          }}>Load Mom Garden</button>
        </div>
        <TabBar active="beds"/>
        <BedCreator hasInitialBeds={false} onComplete={handleCreatorComplete} onCancel={handleCreatorCancel}/>
      </div>
    );
  }

  const beds = allBeds.length ? allBeds : [activeBed];
  const bed = activeBed;
  const bedPainted = painted[activeBedId] || [];
  const totalCells = bed.shape.flat().reduce((s, x) => s + x, 0);
  const filled = bedPainted.length;
  const cellSize = bed.cols > 6 ? 34 : (bed.cols > 4 ? 44 : 56);
  const ghostCrop = tweak.ghostRecs && tool === 'paint' ? brush : null;

  const pushHistory = () => {
    setHistory(h => [...h.slice(-19), JSON.parse(JSON.stringify(painted))]);
  };
  const undo = () => {
    setHistory(h => {
      if (h.length === 0) return h;
      const prev = h[h.length - 1];
      setPainted(prev);
      return h.slice(0, -1);
    });
  };

  const closeCellSheet = () => {
    setCellSheet(null);
    setTimeout(() => {
      if (restoreFocusRef.current && typeof restoreFocusRef.current.focus === 'function') {
        restoreFocusRef.current.focus();
      }
      restoreFocusRef.current = null;
    }, 0);
  };

  const showEraseToast = (cell) => {
    const crop = CROPS[cell.crop];
    setToast({ cropName: cellDisplayName(cell) || (crop && crop.name) || 'crop', r: cell.r, c: cell.c });
    setTimeout(() => setToast(null), 5000);
  };

  const eraseCell = (cell, showToast) => {
    if (!cell) return;
    pushHistory();
    setPainted(prev => {
      const list = [...(prev[activeBedId] || [])];
      const idx = list.findIndex(p => p.r === cell.r && p.c === cell.c);
      if (idx >= 0) list.splice(idx, 1);
      return { ...prev, [activeBedId]: list };
    });
    if (showToast) showEraseToast(cell);
    closeCellSheet();
  };

  const replaceCellCrop = (cell, cropId) => {
    if (!cell || !cropId) return;
    pushHistory();
    setPainted(prev => {
      const list = [...(prev[activeBedId] || [])];
      const idx = list.findIndex(p => p.r === cell.r && p.c === cell.c);
      const next = { r: cell.r, c: cell.c, crop: cropId };
      if (idx >= 0) list[idx] = next;
      else list.push(next);
      return { ...prev, [activeBedId]: list };
    });
    setCellSheet(null);
  };

  const logHarvestForCell = (cell, harvest) => {
    if (!cell || !activeBed) return;
    const event = {
      id: 'h' + Date.now(),
      type: 'harvest',
      timestamp: new Date().toISOString(),
      cell: 'r' + cell.r + 'c' + cell.c,
      quantity: harvest.quantity,
      unit: harvest.unit,
      notes: harvest.notes,
      cropSnapshot: {
        cropId: cell.crop,
        cropName: cellDisplayName(cell),
        varietyName: cell.varietyName || null,
        cell: 'r' + cell.r + 'c' + cell.c,
      },
    };
    const nextBed = Object.assign({}, activeBed, {
      events: (activeBed.events || []).concat(event),
    });
    setActiveBed(nextBed);
    setAllBeds(prev => prev.map(b => b.id === nextBed.id ? nextBed : b));
    if (typeof GosBed !== 'undefined') {
      try {
        GosBed.write(internalToGosBed(nextBed, painted[activeBedId] || []));
      } catch (e) {
        console.warn('GosBed.write harvest failed:', e.message);
      }
    }
  };

  const paintCell = (r, c, triggerEl) => {
    const inShape = bed.shape[r] && bed.shape[r][c];
    if (!inShape) return;
    if (ghostVisible) setGhostVisible(false);
    setSelected({ r, c });
    const list = painted[activeBedId] || [];
    const existing = list.find(p => p.r === r && p.c === c);
    if (isMobileViewport()) {
      restoreFocusRef.current = triggerEl || null;
      if (tool === 'inspect') {
        setCellSheet({ r, c, mode: 'details' });
        return;
      }
      if (tool === 'paint' && existing) {
        setCellSheet({ r, c, mode: 'actions' });
        return;
      }
      if (tool === 'erase') {
        if (existing) eraseCell(existing, true);
        return;
      }
    }
    if (tool === 'inspect') return;
    pushHistory();
    setPainted(prev => {
      const list = [...(prev[activeBedId] || [])];
      const idx = list.findIndex(p => p.r === r && p.c === c);
      if (tool === 'erase') {
        if (idx >= 0) list.splice(idx, 1);
      } else if (tool === 'paint') {
        if (idx >= 0) list[idx] = { r, c, crop: brush };
        else list.push({ r, c, crop: brush });
      }
      return { ...prev, [activeBedId]: list };
    });
  };

  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
      display: 'flex', flexDirection: 'column', position: 'relative',
    }}>
      <FakeStatusBar/>

      <header style={{ padding: '4px 18px 8px', flexShrink: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <Disp size={24}>Beds</Disp>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <Label size={9} color={T.textMuted}>BRUSH MODE · {filled}/{totalCells}</Label>
            <button type="button" aria-label={hasSiteContext ? 'Site context (set)' : 'Site context (not set)'}
              onClick={() => setSiteOpen(true)} style={{
              width: 26, height: 26, borderRadius: 6, padding: 0,
              background: T.panel, border: `1px solid ${T.borderSoft}`,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              cursor: 'pointer', marginLeft: 4, position: 'relative',
            }}>
              {Icons.site(12, T.soil)}
              {hasSiteContext && (
                <span aria-hidden="true" style={{
                  position: 'absolute', top: 2, right: 2,
                  width: 5, height: 5, borderRadius: '50%',
                  background: T.leafBright,
                }}/>
              )}
            </button>
            <button type="button" aria-label="Tweaks" onClick={onOpenTweaks} style={{
              width: 26, height: 26, borderRadius: 6, padding: 0,
              background: T.panel, border: `1px solid ${T.borderSoft}`,
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              cursor: 'pointer', marginLeft: 4,
            }}>{Icons.gear(12, T.soil)}</button>
          </div>
        </div>
      </header>

      <BedSwitcher beds={beds} painted={painted} activeId={activeBedId} onPick={handlePickBed}
        onAdd={handleAddBedClick}/>

      <div style={{ display: 'flex', gap: 6, padding: '8px 14px 4px', flexShrink: 0 }}>
        <ToolBtn label="Paint"   active={tool === 'paint'}   onClick={() => setTool('paint')}   icon={Icons.paint(13, 'currentColor')}/>
        <ToolBtn label="Erase"   active={tool === 'erase'}   onClick={() => setTool('erase')}   icon={Icons.erase(13, 'currentColor')}/>
        <ToolBtn label="Details" active={tool === 'inspect'} onClick={() => setTool('inspect')} icon={Icons.inspect(13, 'currentColor')}/>
        <div style={{ flex: 1 }}/>
        <ToolBtn label="Undo" muted onClick={undo} ariaLabel="Undo last action" icon={Icons.undo(13, 'currentColor')}/>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 0 10px' }}>
        <div style={{
          margin: '0 14px', padding: '14px 10px 16px', background: T.panel,
          border: `1px solid ${T.borderSoft}`, borderRadius: 12,
          boxShadow: '0 1px 3px rgba(44,27,11,0.05)',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            marginBottom: 8, padding: '0 6px', gap: 10,
          }}>
            <Disp size={16}>{bed.name}</Disp>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
              <ScoreBadge getCurrentBed={() => Object.assign({}, activeBed, { painted: painted[activeBedId] || [] })}/>
              <Label size={9} color={T.textMuted}>{bed.location.toUpperCase()}</Label>
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'center' }}>
            <BedGrid bed={bed} painted={bedPainted}
              selected={selected}
              onCellTap={paintCell}
              ghostCrop={ghostCrop}
              cellSize={cellSize}
              mode={tool}/>
          </div>
          <div style={{
            marginTop: 12, padding: '8px 10px', background: T.cream,
            border: `1px solid ${T.borderSoft}`, borderRadius: 8, minHeight: 52,
          }}>
            <InspectBox bed={bed} bedPainted={bedPainted}
              selected={selected} tool={tool} brush={brush}
              setBrush={setBrush} setTool={setTool} paintCell={paintCell}/>
          </div>
        </div>
      </div>

      {tool !== 'inspect' && (
        <div style={{
          flexShrink: 0, background: T.panel, borderTop: `1px solid ${T.borderSoft}`,
          padding: '10px 14px',
        }}>
          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6,
          }}>
            <Label size={10} color={T.soilMid}>CROP · tap to select</Label>
          </div>
          <div style={{ display: 'flex', gap: 8, overflowX: 'auto', WebkitOverflowScrolling: 'touch', paddingBottom: 2 }}>
            {Object.keys(CROPS).map(k => {
              const active = brush === k;
              return (
                <button type="button" key={k} onClick={() => setBrush(k)} aria-pressed={active} style={{
                  flex: '0 0 auto', padding: 4,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                  border: 'none', background: 'transparent', cursor: 'pointer',
                }}>
                  <div style={{
                    padding: 2, borderRadius: 10,
                    border: active ? `2px solid ${T.soil}` : '2px solid transparent',
                  }}>
                    <CropChip crop={k} size={36}/>
                  </div>
                  <span style={{
                    fontFamily: T.fontSans, fontSize: 9.5,
                    color: active ? T.text : T.textSoft,
                    fontWeight: active ? 500 : 400,
                  }}>{cropPaletteLabel(k)}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <TabBar active="beds"/>

      {ghostVisible && <GhostHint onDismiss={() => setGhostVisible(false)}/>}
      {toast && <CellToast toast={toast} onUndo={undo} onDismiss={() => setToast(null)}/>}
      {cellSheet && (
        <CellBottomSheet
          sheet={cellSheet}
          bed={Object.assign({}, bed, { events: activeBed.events || [] })}
          bedPainted={bedPainted}
          brush={brush}
          onClose={closeCellSheet}
          onDetails={() => setCellSheet(s => s && Object.assign({}, s, { mode: 'details' }))}
          onReplace={replaceCellCrop}
          onErase={(cell) => eraseCell(cell, true)}
          onHarvest={logHarvestForCell}
          onSetBrush={setBrush}/>
      )}
      {creatorOpen && <BedCreator hasInitialBeds={true} onComplete={handleCreatorComplete} onCancel={handleCreatorCancel}/>}
      {siteOpen && <SitePanel bed={activeBed} onChange={handleSiteChange} onClose={() => setSiteOpen(false)}/>}
    </div>
  );
}

// ── Inspect or brush-info readout under the bed ─────────────────────────────
function InspectBox({ bed, bedPainted, selected, tool, brush, setBrush, setTool, paintCell }) {
  if (selected && tool === 'inspect') {
    const cell = bedPainted.find(p => p.r === selected.r && p.c === selected.c);
    if (cell) {
      const cr = CROPS[cell.crop];
      const variety = cellVarietyLabel(cell);
      return (
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <CropChip crop={cell.crop} size={20} visualColor={(cropVisualForPlanting(cr, cell) || {}).color}/>
            <Disp size={14}>{cellDisplayName(cell)}</Disp>
            {variety && (
              <Label size={9} color={T.leaf} style={{
                minWidth: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
              }}>{variety}</Label>
            )}
            <Label size={9} color={T.textMuted} style={{ marginLeft: 'auto' }}>
              R{selected.r + 1} · C{selected.c + 1}
            </Label>
          </div>
          <Body size={11} color={T.textSoft} style={{ marginTop: 4, display: 'block' }}>
            {cropPaletteLabel(cell.crop)} - {cr.family} - {cr.sun} sun - {cr.daysToMaturity}d to maturity
          </Body>
        </div>
      );
    }
    const recs = recsForCell({ ...bed, painted: bedPainted }, selected.r, selected.c).slice(0, 3);
    return (
      <div>
        <Label size={9} color={T.textMuted}>EMPTY · R{selected.r + 1}·C{selected.c + 1} · TOP FITS</Label>
        <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
          {recs.map(r => (
            <button type="button" key={r.crop} onClick={() => {
              setBrush(r.crop);
              setTool('paint');
              paintCell(selected.r, selected.c);
            }} style={{
              flex: 1, padding: '5px 8px', border: `1px solid ${T.borderSoft}`,
              borderRadius: 6, background: T.panel, display: 'flex',
              alignItems: 'center', gap: 6, cursor: 'pointer',
            }}>
              <CropChip crop={r.crop} size={16}/>
              <div style={{ textAlign: 'left', flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: 11, fontWeight: 500, color: T.text,
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                }}>{cropPaletteLabel(r.crop)}</div>
                <div style={{ fontFamily: T.fontMono, fontSize: 9, color: T.leaf }}>{r.score.toFixed(1)}</div>
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <CropChip crop={brush} size={22}/>
      <div>
        <div style={{ fontFamily: T.fontSans, fontSize: 13, fontWeight: 500, color: T.text }}>
          {tool === 'paint' && `Painting ${cropPaletteLabel(brush).toLowerCase()}`}
          {tool === 'erase' && 'Erasing cells'}
          {tool === 'inspect' && 'Tap any cell for details'}
        </div>
        <Label size={9} color={T.textMuted} style={{ display: 'block', marginTop: 1 }}>
          {tool === 'paint' && 'TAP A CELL TO PLACE'}
          {tool === 'erase' && 'TAP A CELL TO CLEAR'}
          {tool === 'inspect' && 'DETAILS · READ ONLY'}
        </Label>
      </div>
    </div>
  );
}

// ── Root ────────────────────────────────────────────────────────────────────
function App() {
  const [tweak, setTweak] = React.useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  return (
    <PhoneFrame>
      <Painting tweak={tweak} onOpenTweaks={() => setTweaksOpen(true)}/>
      {tweaksOpen && <TweaksPanel tweak={tweak} setTweak={setTweak}
        onResetMomGarden={() => resetMomGardenAndReload().catch(e => alert(e.message || 'Mom Garden reset failed'))}
        onClose={() => setTweaksOpen(false)}/>}
    </PhoneFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
