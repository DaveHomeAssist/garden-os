<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1e110a" />
  <title>Garden OS - Story Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; touch-action: none; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #1e110a;
      color: #f7f2ea;
      font-size: clamp(14px, 2.5vw, 16px);
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #viewport {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    #viewport canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Vignette overlay on viewport edges */
    .vignette-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(30,17,10,0.45) 100%);
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(30,17,10,0.85) 0%, transparent 100%);
      pointer-events: none;
    }
    #hud > * { pointer-events: auto; }
    .hud-left, .hud-right { display: flex; align-items: center; gap: 8px; }
    .hud-pill {
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 2vw, 11px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(30,17,10,0.7);
      border: 1px solid rgba(232,200,74,0.2);
      color: #e8c84a;
      white-space: nowrap;
    }
    .hud-pill.chapter { color: #f7f2ea; border-color: rgba(247,242,234,0.15); }
    .hud-score {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(16px, 3.5vw, 18px);
      color: #e8c84a;
    }

    /* Phase progress dots */
    #phase-dots {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 6px;
      align-items: center;
      pointer-events: none;
    }
    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(247,242,234,0.12);
      border: 1px solid rgba(247,242,234,0.15);
      transition: all 0.3s ease;
    }
    .phase-dot--active {
      background: #e8c84a;
      border-color: #e8c84a;
      box-shadow: 0 0 6px rgba(232,200,74,0.5);
      transform: scale(1.3);
    }
    .phase-dot--done {
      background: rgba(232,200,74,0.4);
      border-color: rgba(232,200,74,0.3);
    }

    #panel-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
    }
    .panel-sheet {
      background: rgba(30,17,10,0.95);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(232,200,74,0.15);
      border-radius: 16px 16px 0 0;
      max-height: 85vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      padding: 0 16px 24px;
    }
    .panel-sheet.is-open { transform: translateY(0); }
    .panel-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(247,242,234,0.2);
      margin: 10px auto 16px;
    }
    #overlay-container {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    #overlay-container > * { pointer-events: auto; }

    /* Chapter intro with fade-in animation */
    .chapter-intro {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(30,17,10,0.92);
      padding: 32px 24px;
      text-align: center;
    }
    .chapter-intro h2 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(24px, 6vw, 42px);
      color: #e8c84a;
      margin-bottom: 8px;
    }
    .chapter-intro .chapter-num {
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247,242,234,0.4);
      margin-bottom: 12px;
    }
    .chapter-intro p {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 3vw, 16px);
      line-height: 1.7;
      color: rgba(247,242,234,0.75);
      max-width: 480px;
    }
    .chapter-intro .tap-hint {
      margin-top: 32px;
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 2vw, 11px);
      color: rgba(247,242,234,0.25);
      letter-spacing: 0.1em;
    }
    .start-choice-actions {
      display:flex;
      gap:16px;
      margin-top:28px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .start-choice-btn {
      font-family:'DM Sans',sans-serif;
      font-size:15px;
      padding:12px 28px;
      border-radius:8px;
      cursor:pointer;
      font-weight:500;
      border:none;
    }
    .start-choice-btn--primary {
      background:#e8c84a;
      color:#1e110a;
    }
    .start-choice-btn--ghost {
      background:rgba(247,242,234,0.1);
      color:#f7f2ea;
      border:1px solid rgba(247,242,234,0.2);
    }

    /* Fade-in/out keyframes for chapter intro */
    @keyframes fadeInIntro {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOutIntro {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-12px); }
    }

    /* Floating Action Button */
    #fab-advance {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 25;
      width: auto;
      min-width: 56px;
      height: 56px;
      border-radius: 28px;
      background: #e8c84a;
      color: #1e110a;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 0 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8) translateY(20px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
    }
    #fab-advance.is-visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    #fab-advance:active {
      transform: scale(0.95) translateY(0);
    }

    /* Toast notification */
    #toast-container {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .toast-notification {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #f7f2ea;
      background: rgba(30,17,10,0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(232,200,74,0.2);
      border-radius: 12px;
      padding: 10px 20px;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast-notification.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 768px) {
      #panel-container {
        top: 0;
        left: auto;
        right: 0;
        width: 380px;
        bottom: 0;
      }
      .panel-sheet {
        border-radius: 0;
        border-top: none;
        border-left: 1px solid rgba(232,200,74,0.15);
        max-height: 100%;
        height: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport"></div>
    <div class="vignette-overlay"></div>
    <div id="hud">
      <div class="hud-left">
        <span class="hud-pill chapter" id="hud-chapter">Chapter 1</span>
        <span class="hud-pill" id="hud-phase">Planning</span>
      </div>
      <div class="hud-right">
        <span class="hud-pill" id="hud-crops">0 / 32</span>
        <span class="hud-score" id="hud-score">--</span>
      </div>
    </div>
    <div id="phase-dots"></div>
    <div id="panel-container"></div>
    <div id="overlay-container"></div>
    <div id="cutscene-layer" aria-hidden="true">
      <div id="dialogue-root"></div>
    </div>
    <button id="fab-advance">Next</button>
    <div id="toast-container"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
