<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1e110a" />
  <title>Garden OS - Story Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #1e110a;
      color: #f7f2ea;
      font-size: clamp(14px, 2.5vw, 16px);
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #viewport {
      position: absolute;
      inset: 0;
      z-index: 0;
      touch-action: none;
    }
    #viewport canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Vignette overlay on viewport edges — stronger at bottom for FAB contrast */
    .vignette-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 55%, rgba(30,17,10,0.45) 100%),
        linear-gradient(to top, rgba(30,17,10,0.38) 0%, transparent 28%);
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(30,17,10,0.88) 0%, rgba(30,17,10,0.4) 70%, transparent 100%);
      pointer-events: none;
    }
    #hud > * { pointer-events: auto; }

    .hud-left, .hud-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hud-pause-btn {
      background: rgba(247,242,234,0.06);
      border: 1px solid rgba(247,242,234,0.1);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: rgba(247,242,234,0.45);
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .hud-pause-btn:hover {
      border-color: rgba(232,200,74,0.3);
      color: rgba(247,242,234,0.7);
    }

    .hud-pill {
      font-family: 'DM Mono', monospace;
      font-size: clamp(9px, 1.8vw, 11px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(30,17,10,0.65);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(232,200,74,0.18);
      color: #e8c84a;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }
    .hud-pill.chapter {
      color: #f7f2ea;
      border-color: rgba(247,242,234,0.12);
      font-weight: 500;
    }
    .hud-action-btn {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(232,200,74,0.3);
      background: rgba(232,200,74,0.18);
      color: #f7f2ea;
      font-family: 'DM Mono', monospace;
      font-size: clamp(9px, 1.8vw, 11px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
    }
    .hud-action-btn.is-visible {
      display: inline-flex;
    }
    .hud-action-btn:hover {
      background: rgba(232,200,74,0.28);
      border-color: rgba(232,200,74,0.48);
    }
    .hud-action-btn:active {
      transform: scale(0.96);
    }
    .hud-action-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .hud-pill.season-icon {
      font-size: 14px;
      padding: 4px 8px;
      border: none;
      background: none;
    }
    .hud-pill.tokens {
      color: #8ba8b5;
      border-color: rgba(139,168,181,0.2);
    }
    .hud-pill.tokens .token-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8ba8b5;
      margin-right: 2px;
    }
    .hud-pill.tokens .token-dot.spent {
      background: rgba(139,168,181,0.2);
    }

    .hud-score {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(16px, 3.5vw, 20px);
      color: #e8c84a;
      min-width: 28px;
      text-align: right;
      text-shadow: 0 1px 4px rgba(0,0,0,0.55);
      transition: color 0.3s ease, transform 0.3s ease;
    }
    .hud-score.is-harvest-glow {
      color: #f4dfa1;
      transform: scale(1.18);
    }
    .hud-score-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(232,200,74,0.35);
      text-align: right;
      line-height: 1;
      margin-bottom: 1px;
    }
    .hud-score-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* Phase progress dots */
    #phase-dots {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 5px;
      align-items: center;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #phase-dots.is-cutscene {
      opacity: 0;
    }
    .phase-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(247,242,234,0.1);
      border: 1px solid rgba(247,242,234,0.12);
      transition: all 0.3s ease;
    }
    .phase-dot--active {
      background: #e8c84a;
      border-color: #e8c84a;
      box-shadow: 0 0 8px rgba(232,200,74,0.4);
      transform: scale(1.35);
    }
    .phase-dot--done {
      background: rgba(232,200,74,0.35);
      border-color: rgba(232,200,74,0.25);
    }

    #phase-helper {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      max-width: min(560px, calc(100vw - 28px));
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(30,17,10,0.78);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(232,200,74,0.16);
      color: rgba(247,242,234,0.78);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.35;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #phase-helper.is-visible {
      opacity: 1;
    }

    #panel-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
    }
    .panel-sheet {
      background: #1e110a;
      border-top: 1px solid rgba(232,200,74,0.15);
      border-radius: 16px 16px 0 0;
      max-height: 50vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
      padding: 0 16px calc(24px + env(safe-area-inset-bottom, 0px));
      will-change: transform;
    }
    .panel-sheet.is-open { transform: translateY(0); }
    .panel-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(247,242,234,0.2);
      margin: 10px auto 16px;
    }
    #overlay-container {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
    }
    #overlay-container > * { pointer-events: auto; }

    /* Chapter intro with fade-in animation */
    .chapter-intro {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(30,17,10,0.92);
      padding: 32px 24px;
      text-align: center;
    }
    .chapter-intro h2 {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(24px, 6vw, 42px);
      color: #e8c84a;
      margin-bottom: 8px;
    }
    .chapter-intro .chapter-num {
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247,242,234,0.4);
      margin-bottom: 12px;
    }
    .chapter-intro p {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 3vw, 16px);
      line-height: 1.85;
      color: rgba(247,242,234,0.75);
      max-width: min(540px, 65ch);
    }
    .chapter-intro .tap-hint {
      margin-top: 32px;
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 2vw, 11px);
      color: rgba(247,242,234,0.25);
      letter-spacing: 0.1em;
    }
    .start-choice-actions {
      display:flex;
      gap:16px;
      margin-top:28px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .start-choice-btn {
      font-family:'DM Sans',sans-serif;
      font-size:15px;
      padding:12px 28px;
      border-radius:8px;
      cursor:pointer;
      font-weight:500;
      border:none;
    }
    .start-choice-btn--primary {
      background:#e8c84a;
      color:#1e110a;
    }
    .start-choice-btn--ghost {
      background:rgba(247,242,234,0.1);
      color:#f7f2ea;
      border:1px solid rgba(247,242,234,0.2);
    }

    /* Fade-in/out keyframes for chapter intro */
    @keyframes fadeInIntro {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOutIntro {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-12px); }
    }

    /* Floating Action Button */
    #fab-backpack {
      position: absolute;
      bottom: 24px;
      left: 24px;
      z-index: 25;
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: rgba(30,17,10,0.82);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(232,200,74,0.2);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #fab-backpack:hover {
      border-color: rgba(232,200,74,0.4);
    }
    #fab-backpack:active {
      transform: scale(0.95);
    }
    #fab-backpack.is-open {
      background: rgba(232,200,74,0.15);
      border-color: #e8c84a;
    }
    #fab-backpack.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.8);
    }

    #fab-plant {
      position: absolute;
      bottom: 92px;
      left: 24px;
      z-index: 25;
      min-width: 92px;
      height: 48px;
      border-radius: 24px;
      background: rgba(232,200,74,0.16);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(232,200,74,0.35);
      color: #f7f2ea;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 0 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.28);
      transition: transform 0.15s, border-color 0.15s, background 0.15s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }
    #fab-plant.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    #fab-plant:hover {
      border-color: rgba(232,200,74,0.55);
    }
    #fab-plant:active {
      transform: scale(0.96);
    }

    #fab-bug {
      position: absolute;
      top: 12px;
      right: 16px;
      z-index: 25;
      width: 44px;
      height: 44px;
      border-radius: 22px;
      background: rgba(30,17,10,0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(139,168,181,0.2);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #fab-bug:hover { border-color: rgba(139,168,181,0.4); }
    #fab-bug:active { transform: scale(0.92); }

    .bug-report-panel {
      position: absolute;
      top: 64px;
      right: 16px;
      z-index: 26;
      width: min(340px, calc(100vw - 32px));
      background: rgba(30,17,10,0.94);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(139,168,181,0.15);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(-8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .bug-report-panel.is-open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .bug-report-panel h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #f7f2ea;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bug-report-panel .bug-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(247,242,234,0.3);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .bug-report-panel textarea {
      width: 100%;
      min-height: 100px;
      background: rgba(247,242,234,0.05);
      border: 1px solid rgba(247,242,234,0.1);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #f7f2ea;
      resize: vertical;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .bug-report-panel textarea:focus {
      border-color: rgba(139,168,181,0.4);
      outline: none;
    }
    .bug-report-panel textarea::placeholder {
      color: rgba(247,242,234,0.25);
    }
    .bug-report-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .bug-report-actions button {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      border: none;
    }
    .bug-btn-send {
      background: #8ba8b5;
      color: #1e110a;
    }
    .bug-btn-cancel {
      background: rgba(247,242,234,0.08);
      color: rgba(247,242,234,0.6);
      border: 1px solid rgba(247,242,234,0.1) !important;
    }
    .bug-report-panel .bug-meta {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: rgba(247,242,234,0.2);
      margin-top: 8px;
      line-height: 1.4;
    }

    #fab-advance {
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 25;
      width: auto;
      min-width: 56px;
      height: 56px;
      border-radius: 28px;
      background: #e8c84a;
      color: #1e110a;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 0 20px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8) translateY(20px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      -webkit-tap-highlight-color: transparent;
    }
    #fab-advance.is-visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    #fab-advance:active {
      transform: scale(0.95) translateY(0);
    }

    /* Toast notification */
    #toast-container {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .toast-notification {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #f7f2ea;
      background: rgba(30,17,10,0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(232,200,74,0.2);
      border-left: 3px solid #e8c84a;
      border-radius: 12px;
      padding: 10px 20px;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .toast-notification.toast--success {
      border-left-color: #5aab6b;
    }
    .toast-notification.toast--error {
      border-left-color: #d44a2a;
    }
    .toast-notification.toast--info {
      border-left-color: #e8c84a;
    }
    .toast-notification.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Pause / Main Menu */
    .pause-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: rgba(30,17,10,0.88);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .pause-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .pause-title {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(24px, 5vw, 36px);
      color: #e8c84a;
      margin-bottom: 4px;
    }
    .pause-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(247,242,234,0.3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .pause-menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(280px, 80vw);
    }
    .pause-menu button {
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(247,242,234,0.1);
      background: rgba(247,242,234,0.06);
      color: #f7f2ea;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pause-menu button:hover {
      background: rgba(247,242,234,0.1);
      border-color: rgba(232,200,74,0.3);
    }
    .pause-menu button .pm-icon {
      font-size: 20px;
      width: 28px;
      text-align: center;
    }
    .pause-menu .pm-danger {
      color: rgba(212,74,42,0.8);
      border-color: rgba(212,74,42,0.15);
    }
    .pause-menu .pm-danger:hover {
      background: rgba(212,74,42,0.08);
      border-color: rgba(212,74,42,0.3);
    }
    .pause-hint {
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(247,242,234,0.15);
      letter-spacing: 0.08em;
    }

    @media (min-width: 768px) {
      #panel-container {
        top: 0;
        left: auto;
        right: 0;
        width: 380px;
        bottom: 0;
      }
      .panel-sheet {
        border-radius: 0;
        border-top: none;
        border-left: 1px solid rgba(232,200,74,0.15);
        max-height: 100%;
        height: 100%;
      }
    }

    @media (max-width: 640px) {
      #hud {
        padding: 10px 10px 0;
      }

      .hud-left, .hud-right {
        gap: 4px;
      }

      .hud-pause-btn {
        width: 40px;
        height: 40px;
        border-radius: 10px;
      }

      .hud-pill {
        padding: 6px 9px;
        font-size: 10px;
      }

      #phase-dots {
        top: 56px;
      }

      #phase-helper {
        top: 82px;
        font-size: 12px;
        padding: 8px 12px;
      }

      .panel-sheet {
        max-height: min(64vh, 560px);
        border-radius: 18px 18px 0 0;
        padding: 0 14px calc(26px + env(safe-area-inset-bottom, 0px));
      }

      #fab-backpack {
        left: 14px;
        bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        width: 58px;
        height: 58px;
        border-radius: 29px;
      }

      #fab-plant {
        left: 14px;
        bottom: calc(84px + env(safe-area-inset-bottom, 0px));
        min-width: 108px;
        height: 52px;
        border-radius: 26px;
        font-size: 15px;
        padding: 0 18px;
      }

      #fab-advance {
        right: 14px;
        bottom: calc(16px + env(safe-area-inset-bottom, 0px));
        min-width: 74px;
        height: 58px;
        border-radius: 29px;
        font-size: 16px;
      }

      #fab-bug {
        top: auto;
        right: 14px;
        bottom: calc(86px + env(safe-area-inset-bottom, 0px));
        width: 46px;
        height: 46px;
        border-radius: 23px;
      }

      .bug-report-panel {
        top: auto;
        right: 10px;
        bottom: calc(148px + env(safe-area-inset-bottom, 0px));
        width: min(360px, calc(100vw - 20px));
        max-height: 48vh;
        overflow-y: auto;
      }

      #toast-container {
        bottom: calc(154px + env(safe-area-inset-bottom, 0px));
        width: calc(100vw - 28px);
      }

      .toast-notification {
        white-space: normal;
        width: 100%;
        text-align: center;
      }

      .pause-menu {
        width: min(320px, calc(100vw - 28px));
      }

      .pause-menu button {
        min-height: 54px;
      }
    }

    @media (max-width: 420px) {
      .hud-pill#hud-crops {
        display: none;
      }

      .hud-score {
        font-size: 18px;
      }

      .chapter-intro {
        padding: 28px 18px;
      }

      .start-choice-btn {
        width: 100%;
      }

      .bug-report-actions {
        flex-direction: column-reverse;
      }

      .bug-report-actions button {
        width: 100%;
        min-height: 44px;
      }
    }

    /* FAB pulse animation — one cycle on appearance */
    @keyframes fabPulse {
      0%   { box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 0 0 rgba(232,200,74,0.35); }
      50%  { box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 0 8px rgba(232,200,74,0); }
      100% { box-shadow: 0 4px 16px rgba(0,0,0,0.35), 0 0 0 0 rgba(232,200,74,0); }
    }
    #fab-backpack.is-entering,
    #fab-advance.is-entering,
    #fab-plant.is-entering {
      animation: fabPulse 0.6s ease-out 1;
    }

    /* Screen shake for negative events */
    @keyframes screenShake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-2px); }
      40%      { transform: translateX(2px); }
      60%      { transform: translateX(-2px); }
      80%      { transform: translateX(1px); }
    }
    #app.is-shaking {
      animation: screenShake 0.2s ease-out;
    }

    /* General polish — cursor, tap highlight, will-change */
    button, [role="button"], .palette-item, .intervention-btn, .start-choice-btn, .palette-dismiss {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .panel-sheet, .pause-overlay, .chapter-intro, .toast-notification, #fab-advance, #fab-backpack, #fab-plant {
      will-change: transform;
    }

    /* ── Title Screen ── */
    .title-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #1e110a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 36px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .title-screen.is-exiting {
      opacity: 0;
      transform: scale(1.03);
      pointer-events: none;
    }
    .title-logo {
      text-align: center;
    }
    .title-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: clamp(10px, 2vw, 12px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(247,242,234,0.3);
      margin-bottom: 6px;
    }
    .title-name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: clamp(36px, 8vw, 64px);
      color: #e8c84a;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .title-tagline {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-size: clamp(13px, 2.5vw, 16px);
      color: rgba(247,242,234,0.45);
      max-width: 36ch;
      margin: 0 auto;
    }

    .save-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: min(720px, calc(100vw - 48px));
    }
    .save-slot-card {
      background: rgba(247,242,234,0.04);
      border: 1px solid rgba(247,242,234,0.08);
      border-radius: 12px;
      padding: 18px 16px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .save-slot-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .save-slot-card--empty {
      justify-content: center;
      align-items: center;
      border-style: dashed;
    }
    .save-slot-card--occupied {
      border-left: 3px solid #5aab6b;
    }
    .save-slot-card--occupied.progress-mid {
      border-left-color: #e8c84a;
    }
    .save-slot-card--occupied.progress-low {
      border-left-color: #d44a2a;
    }
    .save-slot-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(247,242,234,0.25);
      margin-bottom: 8px;
    }
    .save-slot-chapter {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 20px;
      color: #e8c84a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .save-slot-chapter .season-emoji {
      font-size: 16px;
    }
    .save-slot-meta {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: rgba(247,242,234,0.4);
      margin-top: 4px;
      line-height: 1.5;
    }
    .save-slot-sparkline {
      display: flex;
      gap: 3px;
      align-items: center;
      margin-top: 8px;
    }
    .sparkline-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(247,242,234,0.15);
    }
    .sparkline-dot--a { background: #5aab6b; }
    .sparkline-dot--b { background: #8ba8b5; }
    .sparkline-dot--c { background: #e8c84a; }
    .sparkline-dot--d { background: #dda855; }
    .sparkline-dot--f { background: #d44a2a; }
    .save-slot-empty-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: rgba(247,242,234,0.25);
      margin-bottom: 12px;
    }
    .save-slot-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .save-slot-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .save-slot-btn:active { transform: scale(0.96); }
    .save-slot-btn--primary {
      background: #e8c84a;
      color: #1e110a;
      flex: 1;
    }
    .save-slot-btn--primary:hover { background: #f0d45c; }
    .save-slot-btn--danger {
      background: rgba(212,74,42,0.12);
      color: rgba(212,74,42,0.8);
      border: 1px solid rgba(212,74,42,0.2);
    }
    .save-slot-btn--danger:hover { background: rgba(212,74,42,0.2); }

    .title-footer {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .title-version {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(247,242,234,0.15);
    }
    .title-modes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mode-card {
      background: rgba(247,242,234,0.04);
      border: 1px solid rgba(247,242,234,0.08);
      border-radius: 10px;
      padding: 10px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: rgba(247,242,234,0.5);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      transition: border-color 0.15s;
    }
    .mode-card--active {
      border-color: rgba(232,200,74,0.3);
      color: #e8c84a;
    }
    .mode-card--locked {
      opacity: 0.4;
    }
    .mode-card .mode-icon {
      font-size: 16px;
    }
    .mode-card .mode-lock {
      font-size: 11px;
      color: rgba(247,242,234,0.2);
    }
    .mode-card .mode-soon {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(247,242,234,0.2);
    }

    @media (max-width: 640px) {
      .save-slots {
        grid-template-columns: 1fr;
        gap: 10px;
        width: min(360px, calc(100vw - 32px));
      }
      .save-slot-card {
        min-height: 120px;
        padding: 14px;
      }
      .title-modes {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title-screen" class="title-screen">
      <div class="title-logo">
        <div class="title-eyebrow">Mom's Backyard</div>
        <h1 class="title-name">Garden OS</h1>
        <div class="title-tagline">A 12-chapter story about soil, seasons, and sauce.</div>
      </div>
      <div class="save-slots" id="save-slots">
        <!-- 3 save slot cards rendered by JS -->
      </div>
      <div class="title-footer">
        <div class="title-version">v0.1 &middot; Story Mode</div>
        <div class="title-modes" id="title-modes">
          <!-- Game mode buttons rendered by JS -->
        </div>
      </div>
    </div>
    <div id="viewport"></div>
    <div class="vignette-overlay"></div>
    <div id="hud">
      <div class="hud-left">
        <button id="hud-pause" class="hud-pause-btn" aria-label="Pause menu">☰</button>
        <span class="hud-pill season-icon" id="hud-season-icon">🌱</span>
        <span class="hud-pill chapter" id="hud-chapter">Chapter 1</span>
        <span class="hud-pill" id="hud-phase">Planning</span>
        <button id="hud-action" class="hud-action-btn" type="button">Commit Plan</button>
        <span class="hud-pill tokens" id="hud-tokens" style="display:none;">
          <span class="token-dot"></span>
          <span class="token-dot"></span>
          <span class="token-dot"></span>
        </span>
      </div>
      <div class="hud-right">
        <span class="hud-pill" id="hud-crops">0 / 32</span>
        <div class="hud-score-wrap">
          <div class="hud-score-label">Score</div>
          <span class="hud-score" id="hud-score">--</span>
        </div>
      </div>
    </div>
    <div id="phase-dots"></div>
    <div id="phase-helper" aria-live="polite"></div>
    <div id="panel-container"></div>
    <div id="overlay-container"></div>
    <div id="cutscene-layer" aria-hidden="true">
      <div id="dialogue-root"></div>
    </div>
    <div class="pause-overlay" id="pause-menu">
      <div class="pause-title">Garden OS</div>
      <div class="pause-subtitle" id="pause-status">Chapter 1 · Planning</div>
      <div class="pause-menu">
        <button id="pause-resume"><span class="pm-icon">▶</span> Resume</button>
        <button id="pause-journal"><span class="pm-icon">📖</span> Season Journal</button>
        <button id="pause-bugs"><span class="pm-icon">🦗</span> View Bug Reports</button>
        <button id="pause-restart" class="pm-danger"><span class="pm-icon">↺</span> Restart Chapter</button>
        <button id="pause-new" class="pm-danger"><span class="pm-icon">🗑</span> New Campaign</button>
      </div>
      <div class="pause-hint">ESC to close</div>
    </div>
    <button id="fab-bug" aria-label="Report a bug">🦗</button>
    <div class="bug-report-panel" id="bug-panel">
      <h3>🦗 Report a Bug</h3>
      <div class="bug-subtitle">Saved locally on this device for later review</div>
      <textarea id="bug-text" placeholder="What happened? What did you expect? Tell us everything..."></textarea>
      <div class="bug-report-actions">
        <button class="bug-btn-cancel" id="bug-cancel">Cancel</button>
        <button class="bug-btn-send" id="bug-send">Save Report</button>
      </div>
      <div class="bug-meta" id="bug-meta"></div>
    </div>
    <button id="fab-plant" aria-label="Open planting menu"><span aria-hidden="true">🌱</span><span>Plant</span></button>
    <button id="fab-backpack" aria-label="Open crop backpack">🎒</button>
    <button id="fab-advance">Next</button>
    <div id="toast-container"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
