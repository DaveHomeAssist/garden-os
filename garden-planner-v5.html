function buildCalendar(year, cropsMap, frostWeeks) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const weeks = [];
  const lastWeek = isoWeeksInYear(year);
  for (let w = 1; w <= lastWeek; w++) {
    const d = new Date(year, 0, 1 + (w - 1) * 7);
    const month = d.getMonth();
    const sow = [], transplant = [], harvestActive = [];
    Object.entries(cropsMap).forEach(([key, crop]) => {
      if (crop.sowWeek === w) sow.push(key);
      if (crop.transplantWeek === w) transplant.push(key);
      if (w >= crop.harvestStart && w <= crop.harvestEnd) harvestActive.push(key);
    });
    weeks.push({
      week: w,
      month: months[month],
      frost: frostWeeks && w === frostWeeks.last ? 'last' : (frostWeeks && w === frostWeeks.first ? 'first' : null),
      sow, transplant, harvestActive,
    });
  }
  return weeks;
}

function pickWeeklyHeadline(bed, events, today, calendar, frostWeeks) {
  const planted = Array.isArray(bed) ? bed.filter(x => x && x.crop) : [];
  if (!planted.length) return 'Your bed is empty. Open Beds to plant your first crop.';
  const season = today.seasonYear;
  const week = today.week;
  const seen = new Set();
  const cropIds = planted.map(x => x.crop).filter(id => {
    if (seen.has(id)) return false;
    seen.add(id);
    return true;
  });
  for (const cropId of cropIds) {
    const crop = getCrop(cropId);
    if (!crop) continue;
    if (week >= crop.harvestStart && week <= crop.harvestEnd && !findDoneEventThisSeason(events, cropId, season)) {
      return `Pick the ${crop.name} now (window closes W${crop.harvestEnd}).`;
    }
  }
  const frostIn = frostCountdown(frostWeeks, week);
  if (frostIn != null && frostIn <= 7) {
    const tender = cropIds.map(id => getCrop(id)).find(c => c && c.tender);
    const protectedThisSeason = Array.isArray(events) && events.some(e => e && e.season === season && isProtectedCropEvent(e));
    if (tender && !protectedThisSeason) return `Frost in ${frostIn} days. Cover the ${tender.family} bed.`;
  }

    if (crop && crop.boltRisk && week >= crop.harvestStart && week <= crop.harvestEnd) {

  const ref = React.useRef(null);
  const previous = React.useRef(null);

    previous.current = document.activeElement;
    const node = ref.current;
    const focusable = node
      ? node.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')
      : null;
    setTimeout(() => (focusable || node)?.focus?.(), 0);
    const onKeyDown = (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        onClose && onClose();
        return;
      }
      if (e.key !== 'Tab' || !ref.current) return;
      const items = Array.from(ref.current.querySelectorAll('button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'))
        .filter(el => el.offsetParent !== null || el === document.activeElement);
      if (!items.length) return;
      const first = items[0];
      const last = items[items.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
      }
    };
    document.addEventListener('keydown', onKeyDown);
    return () => {
      document.removeEventListener('keydown', onKeyDown);

                {f.frost === 'last' ? 'LAST' : 'FIRST'}

            </div>
          </div>
        );

      <div style={{
        position: 'absolute', top: 22 + (today - wStart) * pxPerWeek,
        left: 0, right: -4, height: 0, zIndex: 10,

        <div style={{
          position: 'absolute', left: 0, top: -7,
          background: T.leaf, color: '#fff', padding: '1px 5px',
          borderRadius: 3, fontFamily: T.fontMono, fontSize: 9,
          fontWeight: 600, letterSpacing: 0.12,
        }}>NOW</div>
      </div>
    </div>
  );
}
function TodayLine({ today, wStart, pxPerWeek }) {
  return (
    <div style={{
      position: 'absolute', top: 22 + (today - wStart) * pxPerWeek,
      left: -2, right: 0, height: 2, zIndex: 6,
      background: T.leaf,
      boxShadow: '0 0 0 1px rgba(255,253,249,0.8), 0 4px 10px rgba(58,107,42,0.3)',
      pointerEvents: 'none',
    }}>
      <div style={{
        position: 'absolute', right: -3, top: -3,
        width: 0, height: 0,
        borderLeft: `6px solid ${T.leaf}`,
        borderTop: '4px solid transparent',
        borderBottom: '4px solid transparent',
      }}/>
    </div>

}
function CropLane({ cropKey, today, wStart, pxPerWeek, onPick, dim, done, actualPlantedWeeks = [] }) {
  const c = getCrop(cropKey);
  if (!c) return null;
  const sowTop  = 22 + (c.sowWeek - wStart) * pxPerWeek;
  const growTop = 22 + ((c.transplantWeek || c.sowWeek) - wStart) * pxPerWeek;
  const harvTop = 22 + (c.harvestStart - wStart) * pxPerWeek;
  const harvBot = 22 + (c.harvestEnd   - wStart) * pxPerWeek;
  const sowH  = growTop - sowTop;
  const growH = harvTop - growTop;
  const harvH = harvBot - harvTop;
  const effectiveOpacity = done ? 0.6 : (dim ? 0.35 : 1);
  // De-dupe actual planting weeks so multiple cells of the same crop sown in
  // the same ISO week render as one marker.
  const uniqueActual = Array.from(new Set(actualPlantedWeeks.filter(w =>
    typeof w === 'number' && w >= wStart && w <= (wStart + 36)
  )));
  return (
    <div onClick={onPick} role="button"
      aria-label={`${c.name}${done ? ' (marked done)' : ''}${uniqueActual.length ? ' (planted W' + uniqueActual.join(', W') + ')' : ''}`}
      tabIndex={0}
      onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onPick && onPick(); } }}
      style={{
        flex: 1, minWidth: 20, position: 'relative', cursor: 'pointer',
        opacity: effectiveOpacity, transition: 'opacity 0.2s',
      }}>
      {sowH > 0 && (
        <div style={{
          position: 'absolute', left: '50%', top: sowTop,
          transform: 'translateX(-50%)',
          width: 2, height: sowH,
          borderLeft: `2px dotted ${c.color}`,
        }}/>
      )}
      {growH > 0 && (
        <div style={{
          position: 'absolute', left: 2, right: 2, top: growTop,
          height: growH, background: c.color + '22',
          border: `1px solid ${c.color}44`, borderRadius: 3,
        }}/>
      )}
      {harvH > 0 && (
        <div style={{
          position: 'absolute', left: 2, right: 2, top: harvTop,
          height: harvH, background: c.color, borderRadius: 3,
          boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.25)',
        }}/>
      )}
      <div style={{
        position: 'absolute', left: '50%', bottom: -2,
        transform: 'translateX(-50%)',
      }}>
        <CropChip crop={cropKey} size={16}/>
      </div>
      {today >= c.sowWeek && today <= c.harvestEnd && (
        <div style={{
          position: 'absolute', left: '50%', top: 22 + (today - wStart) * pxPerWeek,
          transform: 'translate(-50%, -50%)',
          width: 8, height: 8, borderRadius: '50%',
          background: T.cream, border: `2px solid ${T.leaf}`, zIndex: 7,
        }}/>
      )}
      {/* Realism: filled markers at the actual planting weeks recorded on the
          bed. Distinct from the catalog "today" hollow dot above so the user
          can tell ideal vs actual at a glance. */}
      {uniqueActual.map(w => (
        <div key={'planted-' + w} aria-hidden="true" style={{
          position: 'absolute', left: '50%',
          top: 22 + (w - wStart) * pxPerWeek - 3,
          transform: 'translateX(-50%)',
          width: 7, height: 7,
          background: c.color,
          border: '1.5px solid #fff',
          borderRadius: '50%',
          boxShadow: '0 0 0 1px rgba(44,27,11,0.35)',
          zIndex: 6,
        }}/>
      ))}
      {done && (
        <div aria-hidden="true" style={{
          position: 'absolute', top: 26, left: '50%',
          transform: 'translateX(-50%)',
          width: 14, height: 14, borderRadius: '50%',
          background: T.leafBright,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          zIndex: 8,
          boxShadow: '0 1px 2px rgba(44,27,11,0.25)',
        }}>{Icons.check(9, '#fff')}</div>
      )}
    </div>
  );
}

// ── In-ground strip — the bed reduced to a 4×8 ribbon ───────────────────────
function InGroundStrip({ bed, dimensions, onPickCrop }) {
  const total = bed.length;
  const rows = dimensions.rows;
  const cols = dimensions.cols;
  const bedByCell = React.useMemo(() => {
    const map = new Map();
    bed.forEach(x => map.set(x.r + ':' + x.c, x));
    return map;
  }, [bed]);
  return (
    <div style={{
      margin: '8px 14px', padding: '8px 12px 10px',
      background: T.panel, borderRadius: 12,
      border: `1px solid ${T.borderSoft}`,
      boxShadow: '0 1px 3px rgba(44,27,11,0.05)',
    }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
        marginBottom: 6,
      }}>
        <Label size={10} color={T.soilMid}>IN GROUND · {rows}×{cols} BED</Label>
        <div style={{ fontFamily: T.fontMono, fontSize: 10, color: T.textSoft }}>
          <b style={{ color: T.text, fontWeight: 600 }}>{total}</b>/{rows * cols} cells
        </div>
      </div>
      <div style={{
        overflowX: 'auto',
      }}>
      <div style={{
        display: 'grid',
        gridTemplateColumns: `12px repeat(${cols}, minmax(18px, 1fr))`,
        gridTemplateRows: `repeat(${rows}, 18px)`,
        gap: 2,
        minWidth: Math.max(0, cols * 22 + 12),
      }}>
        {Array.from({ length: rows }).map((_, r) => (
          <React.Fragment key={'row' + r}>
            <div style={{
              gridRow: r + 1, gridColumn: 1,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: T.fontMono, fontSize: 8, color: T.textMuted, fontWeight: 500,
            }}>{r + 1}</div>
            {Array.from({ length: cols }).map((_, c) => {
              const cell = bedByCell.get(r + ':' + c);
              const crop = cell && (getCrop(cell.crop) || unknownCrop(cell.crop));
              return (
                <button type="button" key={r + '-' + c}
                  onClick={() => cell && onPickCrop(cell.crop)}
                  aria-label={cell ? `${crop.name} at row ${r + 1}, column ${c + 1}` : `Empty row ${r + 1}, column ${c + 1}`}
                  style={{
                    background: crop ? crop.color + '55' : T.cedarWash,
                    border: `1px solid ${crop ? crop.color + 'aa' : T.borderSoft}`,
                    borderRadius: 2, cursor: crop ? 'pointer' : 'default',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontFamily: T.fontMono, fontSize: 7, color: T.soil, fontWeight: 600,
                    padding: 0,
                  }}>{crop && crop.mono}</button>
              );
            })}
          </React.Fragment>
        ))}
      </div>
      </div>
    </div>
  );
}

// ── Crop detail bottom sheet ────────────────────────────────────────────────
function nextMoveFor(c, stage, today) {
  if (stage === 'upcoming')   return `Start seeds indoors in week ${c.sowWeek}. Still ${c.sowWeek - today} weeks out.`;
  if (stage === 'sowing')     return c.transplantWeek ? `Move out to bed around week ${c.transplantWeek}.` : `Direct sown. Watch for germination in 7 to 14 days.`;
  if (stage === 'growing')    return `Keep watered. Harvest opens week ${c.harvestStart}.`;
  if (stage === 'harvesting') return `Harvest window open through week ${c.harvestEnd}. Don't let it bolt.`;
  return `Season closed. Clean bed and rotate to a different family.`;
}
function CropLife({ c, today }) {
  const wStart = c.sowWeek, wEnd = c.harvestEnd;
  const total = wEnd - wStart;
  const pct = w => ((w - wStart) / total) * 100;
  const growAt = (c.transplantWeek || c.sowWeek);
  return (
    <div>
      <div style={{ position: 'relative', height: 18, marginBottom: 4 }}>
        <div style={{
          position: 'absolute', left: pct(c.sowWeek) + '%', right: (100 - pct(growAt)) + '%',
          top: 5, height: 8, background: c.color + '33',
          borderLeft: `2px dotted ${c.color}`, borderRight: `1px solid ${c.color}55`,
        }}/>
        <div style={{
          position: 'absolute', left: pct(growAt) + '%', right: (100 - pct(c.harvestStart)) + '%',
          top: 3, height: 12, background: c.color + '44',
          border: `1px solid ${c.color}`, borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute', left: pct(c.harvestStart) + '%', right: (100 - pct(c.harvestEnd)) + '%',
          top: 3, height: 12, background: c.color, borderRadius: 2,
        }}/>
        {today >= wStart && today <= wEnd && (
          <div style={{
            position: 'absolute', left: pct(today) + '%', top: -2, bottom: -2, width: 2,
            background: T.leaf, borderRadius: 1,
            boxShadow: '0 0 0 1px rgba(255,255,255,0.7)',
          }}/>
        )}
      </div>
      <div style={{
        display: 'flex', justifyContent: 'space-between',
        fontFamily: T.fontMono, fontSize: 9, color: T.textSoft, letterSpacing: 0.1,
      }}>
        <span>W{c.sowWeek} SOW</span>
        <span>W{growAt} GROW</span>
        <span>W{c.harvestStart}-{c.harvestEnd} HARVEST</span>
      </div>
    </div>
  );
}
function formatEventDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch (_) { return ''; }
}

function CropSheet({ cropKey, today, bed, events, season, gosBed, isFixture,
                    isPreview = false, weekOffset = 0,
                    onClose, onMarkDone, onHarvest, onUndoDone, onRemove,
                    onMarkCellDone, onHarvestCell, onUndoCellDone }) {
  const c = getCrop(cropKey) || unknownCrop(cropKey);
  const cells = bed.filter(x => x.crop === cropKey);
  const primaryCell = cells[0] || null;
  const inBed = cells.length > 0;
  const doneEvent = findDoneEventThisSeason(events, cropKey, season);

  // Earliest real planting date for this crop in the active bed. Cells flagged
  // isScheduled fall back to the catalog and don't count as actual plantings.
  const realCells = cells.filter(x => !x.isScheduled && x.plantedAt);
  const earliestPlantedAt = realCells.length
    ? realCells.reduce((acc, x) => (acc == null || x.plantedAt < acc ? x.plantedAt : acc), null)
    : null;
  const earliestPlantedWeek = realCells.length
    ? realCells.reduce((acc, x) => (acc == null || x.plantedWeek < acc ? x.plantedWeek : acc), null)
    : null;
  const [showHarvestForm, setShowHarvestForm] = React.useState(false);
  const [qty, setQty] = React.useState('');
  const [unit, setUnit] = React.useState('');
  const [notes, setNotes] = React.useState('');
  const dialogRef = useFocusTrap(true, onClose);

  // If the user opens the harvest form then scrubs the season position into
  // preview mode, snap the form closed so the next render falls into the
  // preview banner branch instead of capturing input that can't be saved.
  React.useEffect(() => {
    if (isPreview && showHarvestForm) setShowHarvestForm(false);
  }, [isPreview, showHarvestForm]);

  // Stage prefers a recorded done event; otherwise falls back to schedule.
  const stage = (() => {
    if (doneEvent) return 'done';
    if (today < c.sowWeek) return 'upcoming';
    if (today < (c.transplantWeek || c.harvestStart)) return 'sowing';
    if (today < c.harvestStart) return 'growing';
    if (today <= c.harvestEnd) return 'harvesting';
    return 'done';
  })();
  const stageLabel = { upcoming: 'NOT YET', sowing: 'SOWING', growing: 'GROWING', harvesting: 'HARVEST WINDOW', done: 'DONE' }[stage];
  const stageColor = { upcoming: T.textMuted, sowing: T.leaf, growing: T.sun, harvesting: T.rust, done: T.leafBright }[stage];
  const weeksIn = Math.max(0, today - c.sowWeek);
  const weeksToHarv = Math.max(0, c.harvestStart - today);
  const doctorHref = (() => {
    const params = new URLSearchParams();
    if (gosBed && gosBed.id) params.set('bed', gosBed.id);
    if (primaryCell) {
      params.set('cell', `r${primaryCell.r}c${primaryCell.c}`);
      if (primaryCell.varietyName) params.set('variety', primaryCell.varietyName);
    }
    params.set('crop', cropKey);
    return `garden-doctor-v5.html?${params.toString()}`;
  })();

  const submitHarvest = () => {
    onHarvest(cropKey, {
      quantity: qty.trim() ? Number(qty) : null,
      unit: unit || null,
      notes: notes.trim() || null,
    });
    onClose();
  };
  const skipHarvestQty = () => {
    onHarvest(cropKey, {});
    onClose();
  };

  return (
    <>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.55)', zIndex: 40,
      }}/>
      <div ref={dialogRef} role="dialog" aria-modal="true" aria-label={`${c.name} details`} tabIndex="-1" style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 41,
        background: T.cream, borderRadius: '20px 20px 0 0',
        padding: '10px 20px 24px', maxHeight: '82%',
        boxShadow: '0 -8px 40px rgba(44,27,11,0.3)',
        display: 'flex', flexDirection: 'column', overflowY: 'auto',
      }}>
        <div style={{ width: 40, height: 4, background: T.border, borderRadius: 2, margin: '0 auto 12px' }}/>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
          <CropChip crop={cropKey} size={44}/>
          <div style={{ flex: 1 }}>
            <Disp size={22}>{c.name}</Disp>
            <div style={{ marginTop: 2 }}>
              <Label size={10} color={T.textMuted}>{c.family.toUpperCase()} · {c.daysToMaturity} DAYS · {c.sun.toUpperCase()} SUN</Label>
            </div>
            {earliestPlantedAt && (
              <Label size={10} color={T.leaf} style={{ display: 'block', marginTop: 3, fontWeight: 600 }}>
                PLANTED {formatEventDate(earliestPlantedAt)}{earliestPlantedWeek != null ? ` · W${earliestPlantedWeek}` : ''}
              </Label>

          <div style={{
            background: stageColor, color: '#fff',
            padding: '4px 10px', borderRadius: 999,
            fontFamily: T.fontMono, fontSize: 10, fontWeight: 600, letterSpacing: 0.15,

          borderRadius: 10, border: `1px solid ${T.borderSoft}`,
          padding: '10px 12px',

        <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
          <Stat label="IN BED" value={cells.length} unit={cells.length === 1 ? 'cell' : 'cells'}/>

            value={stage === 'growing' ? weeksToHarv : weeksIn}
            unit="weeks"/>
          <Stat label="ROW"
            value={cells.length ? [...new Set(cells.map(x => x.r + 1))].join('+') : '—'}
            unit={cells.length ? 'of 4' : ''}/>
        </div>

        <div style={{
          background: T.sunPale, borderLeft: `3px solid ${T.sun}`,
          padding: '10px 14px', borderRadius: '0 8px 8px 0',
        }}>
          <Label size={9} color={T.rustLight} style={{ fontWeight: 600 }}>NEXT MOVE</Label>
          <div style={{
            marginTop: 2, fontFamily: T.fontSerif, fontSize: 14,
            color: T.text, lineHeight: 1.35, fontStyle: 'italic',

        <a href={doctorHref} style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          marginTop: 10, minHeight: 38, padding: '8px 12px', borderRadius: 10,
          background: T.panel, border: `1px solid ${T.borderSoft}`,
          color: T.leaf, textDecoration: 'none',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 700,
        }}>Ask Doctor</a>

        {/* Mark-done flow (build-order item #4) */}
        {showHarvestForm ? (
          <div style={{
            marginTop: 14, padding: '12px 14px', background: T.panel,
            border: `1px solid ${T.borderSoft}`, borderRadius: 10,
          }}>
            <Label size={9} color={T.leafBright}>HARVEST</Label>
            <div style={{ fontFamily: T.fontDisp, fontSize: 16, fontWeight: 600, marginTop: 2 }}>

            </div>

              <input type="number" value={qty} onChange={e => setQty(e.target.value)}

                aria-label="Quantity"/>
              <select value={unit} onChange={e => setUnit(e.target.value)}
                style={{ minHeight: 44, padding: '8px 10px', borderRadius: 8,
                  border: `1px solid ${T.borderSoft}`, background: T.cream,

                <option value="lbs">lbs</option>
                <option value="oz">oz</option>
                <option value="pieces">pieces</option>
                <option value="bunches">bunches</option>
              </select>
            </div>
            <input type="text" value={notes} onChange={e => setNotes(e.target.value)}
              placeholder="Any notes? (optional)"
              style={{ marginTop: 8, width: '100%', minHeight: 44, padding: '8px 10px', borderRadius: 8,
                border: `1px solid ${T.borderSoft}`, background: T.cream,
                fontFamily: T.fontSans, fontSize: 14, boxSizing: 'border-box' }}
              aria-label="Notes"/>
            <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
              <ActionBtn primary onClick={submitHarvest}>Save harvest</ActionBtn>
              <ActionBtn onClick={skipHarvestQty}>Skip quantity</ActionBtn>
            </div>
          </div>
        ) : doneEvent ? (
          <div style={{
            marginTop: 14, padding: '12px 14px', background: T.leafPale + '55',
            border: `1px solid ${T.leafPale}`, borderRadius: 10,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{
              width: 28, height: 28, borderRadius: '50%', background: T.leafBright, color: '#fff',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
            }}>{Icons.check(16, '#fff')}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: T.fontSans, fontSize: 13, fontWeight: 500, color: T.text }}>
                Marked {doneEvent.type === 'harvest' ? 'harvested' : 'done'} {formatEventDate(doneEvent.timestamp)}.
              </div>
              {doneEvent.type === 'harvest' && (doneEvent.quantity || doneEvent.notes) && (
                <Label size={9} color={T.textSoft} style={{ display: 'block', marginTop: 2 }}>
                  {doneEvent.quantity != null ? `${doneEvent.quantity}${doneEvent.unit ? ' ' + doneEvent.unit : ''}` : ''}
                  {doneEvent.quantity != null && doneEvent.notes ? ' · ' : ''}
                  {doneEvent.notes || ''}
                </Label>
              )}
            </div>
            {!isPreview && (
              <ActionBtn onClick={() => { onUndoDone(cropKey); onClose(); }}>Undo</ActionBtn>
            )}
          </div>
        ) : isPreview ? (
          // Preview mode: the user has scrubbed the season position. Care
          // actions write wall-clock-now timestamps regardless of the scrub,
          // which would silently corrupt the garden log. Show a notice
          // instead and hide the action buttons.
          <div role="status" style={{
            marginTop: 14, padding: '12px 14px', background: T.sunPale,
            border: `1px solid ${T.sunBright}`, borderRadius: 10,
            display: 'flex', alignItems: 'flex-start', gap: 10,
          }}>
            <div style={{
              width: 22, height: 22, borderRadius: '50%', background: T.sun,
              color: '#fff', display: 'inline-flex',
              alignItems: 'center', justifyContent: 'center',
              fontFamily: T.fontDisp, fontSize: 13, fontWeight: 700, flexShrink: 0,
            }}>i</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: T.fontSans, fontSize: 13, fontWeight: 500, color: T.text, lineHeight: 1.35 }}>
                Previewing W{today} ({weekOffset > 0 ? '+' : ''}{weekOffset}w from today).
              </div>
              <Label size={9} color={T.textSoft} style={{ display: 'block', marginTop: 3 }}>
                Reset Season position in Tweaks to log care actions.
              </Label>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', gap: 8, marginTop: 14, flexWrap: 'wrap' }}>
            <ActionBtn primary onClick={() => { onMarkDone(cropKey); onClose(); }}>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                {Icons.check(13, '#fff')} Done today
              </span>
            </ActionBtn>
            <ActionBtn onClick={() => setShowHarvestForm(true)}>
              Harvested: log yield
            </ActionBtn>
            {inBed && !isFixture && (
              <ActionBtn onClick={onRemove}>Remove (in Beds)</ActionBtn>
            )}
          </div>
        )}

        {/* Per-cell garden log strip — only render for real beds with more
            than one cell of this crop, where precise per-cell logging is
            actually useful. Single-cell crops collapse to the crop-level
            controls above. */}
        {!isFixture && cells.length > 1 && onMarkCellDone && (
          <PerCellLogStrip
            cells={cells} cropKey={cropKey} events={events} season={season}
            isPreview={isPreview}
            onMarkCellDone={onMarkCellDone}
            onHarvestCell={onHarvestCell}
            onUndoCellDone={onUndoCellDone}/>
        )}

        {gosBed && Array.isArray(gosBed.events) && gosBed.events.some(e => e && e.cropSnapshot && e.cropSnapshot.cropId === cropKey) && (
          <div style={{
            marginTop: 10, fontFamily: T.fontMono, fontSize: 9,
            color: T.textMuted, letterSpacing: 0.1,
          }}>
            HISTORY · {gosBed.events.filter(e => e && e.cropSnapshot && e.cropSnapshot.cropId === cropKey).length} EVENT{gosBed.events.filter(e => e && e.cropSnapshot && e.cropSnapshot.cropId === cropKey).length === 1 ? '' : 'S'}
          </div>
        )}
      </div>
    </>
  );
}

// Per-cell garden log strip. Each chip shows the cell coord and opens a small
// action sheet with Mark done, Log harvest, and Undo.
function PerCellLogStrip({ cells, cropKey, events, season, isPreview,
                          onMarkCellDone, onHarvestCell, onUndoCellDone }) {
  // Order cells row-major (top-left first).
  const ordered = cells.slice().sort((a, b) => a.r === b.r ? a.c - b.c : a.r - b.r);
  const [actionCell, setActionCell] = React.useState(null);
  // doneCells: cellStr -> 'mark_done' | 'harvest' for this crop + season.
  // One backward sweep, most-recent-wins (we walk newest first and set on
  // first hit only). Replaces a per-cell linear scan inside the chip render.
  const doneCells = React.useMemo(() => {
    const map = new Map();
    if (!Array.isArray(events)) return map;
    for (let i = events.length - 1; i >= 0; i--) {
      const e = events[i];
      if (!e || e.season !== season) continue;
      if (DONE_TYPES.indexOf(e.type) < 0) continue;
      if (!e.cell || eventCropId(e) !== cropKey) continue;
      if (!map.has(e.cell)) map.set(e.cell, e.type);
    }
    return map;
  }, [events, season, cropKey]);
  return (
    <div style={{
      marginTop: 14, padding: '10px 12px',
      background: T.panel, border: `1px solid ${T.borderSoft}`, borderRadius: 10,
    }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        marginBottom: 6,
      }}>
        <Label size={9} color={T.textSoft}>PER-CELL LOG · {ordered.length} CELLS</Label>
        <Label size={8} color={T.textMuted} style={{ fontStyle: 'italic' }}>tap for actions</Label>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {ordered.map(c => {
          const cellStr = 'r' + c.r + 'c' + c.c;
          const state = doneCells.get(cellStr) || null; // 'mark_done' | 'harvest' | null
          const bg = state === 'harvest' ? T.sunBright
                   : state === 'mark_done' ? T.leafBright
                   : T.cedarWash;
          const fg = state ? '#fff' : T.text;
          const handleClick = (e) => {
            if (isPreview) return;
            if (e && (e.altKey || e.shiftKey || e.metaKey)) {
              if (state) {
                onUndoCellDone(cellStr, cropKey);
              } else {
                onHarvestCell(cropKey, cellStr, {});
              }
              return;
            }
            setActionCell({ cellStr, state });
          };
          return (
            <button type="button" key={cellStr} onClick={handleClick}
              disabled={isPreview}
              aria-label={`${cellStr} ${state ? state.replace('_', ' ') : 'unmarked'} actions`}
              style={{
                padding: '4px 8px', borderRadius: 6,
                border: `1px solid ${state ? bg : T.borderSoft}`,
                background: bg, color: fg,
                cursor: isPreview ? 'not-allowed' : 'pointer',
                fontFamily: T.fontMono, fontSize: 10, fontWeight: 600,
                letterSpacing: 0.05,
                opacity: isPreview ? 0.55 : 1,
                display: 'inline-flex', alignItems: 'center', gap: 4,
                minHeight: 28,
              }}>
              <span>{cellStr}</span>
              {state === 'mark_done' && Icons.check(9, '#fff')}
              {state === 'harvest' && (
                <span aria-hidden="true" style={{
                  fontFamily: T.fontMono, fontSize: 9, fontWeight: 700,
                  letterSpacing: 0,
                }}>H</span>
              )}
            </button>
          );
        })}
      </div>
      {actionCell && (
        <div role="dialog" aria-modal="false" aria-label={`${actionCell.cellStr} actions`} style={{
          marginTop: 10, padding: '10px 12px', borderRadius: 8,
          background: T.cedarWash, border: `1px solid ${T.borderSoft}`,
          display: 'flex', gap: 8, flexWrap: 'wrap',
        }}>
          <ActionBtn primary onClick={() => { onMarkCellDone(cropKey, actionCell.cellStr); setActionCell(null); }}>Mark done</ActionBtn>
          <ActionBtn onClick={() => { onHarvestCell(cropKey, actionCell.cellStr, {}); setActionCell(null); }}>Log harvest</ActionBtn>
          <ActionBtn onClick={() => { onUndoCellDone(actionCell.cellStr, cropKey); setActionCell(null); }}>Undo</ActionBtn>
          <ActionBtn onClick={() => setActionCell(null)}>Cancel</ActionBtn>
        </div>
      )}
    </div>
  );
}

function ActionBtn({ children, onClick, primary }) {
  return (
    <button type="button" onClick={onClick} style={{
      flex: '1 1 auto', minWidth: 120, padding: '10px 14px',
      borderRadius: 8, cursor: 'pointer',
      fontFamily: T.fontSans, fontSize: 13, fontWeight: 500,
      background: primary ? T.leaf : 'transparent',
      color: primary ? '#fff' : T.textMid,
      border: `1px solid ${primary ? T.leaf : T.borderSoft}`,
    }}>{children}</button>
  );
}

// ── Main planner composition ────────────────────────────────────────────────
function Planner({ tweak, bed, events, gosBed, allBeds, isFixture, season,
                  now, calendar, frostWeeks, dimensions, catalogWarning,
                  onOpenTweaks, onAdd, onRecord, onRemove,
                  onPickBed,
                  onMarkDone, onHarvest, onUndoDone,
                  onMarkCellDone, onHarvestCell, onUndoCellDone }) {
  const density = tweak.density || 'comfortable';
  const showEnded = tweak.showEnded !== false;
  const weekOffset = tweak.weekOffset || 0;
  const today = Math.max(1, Math.min(isoWeeksInYear(Number(now.seasonYear)), now.week + weekOffset));
  const [picked, setPicked] = React.useState(null);
  const [fixtureBannerDismissed, setFixtureBannerDismissed] = React.useState(false);

  const wStart = 1, wEnd = isoWeeksInYear(Number(now.seasonYear));
  const weekCount = wEnd - wStart + 1;
  const timelineH = density === 'compact' ? 440 : 520;
  const pxPerWeek = timelineH / weekCount;

  // Source the timeline crop list from what's actually planted in the bed.
  // Fixture mode falls back to the full catalog so the demo stays alive.
  const cropsInBed = React.useMemo(() => {
    const seen = new Set();
    bed.forEach(c => { if (c && c.crop) seen.add(c.crop); });
    return Array.from(seen);
  }, [bed]);

  const sourceCrops = isFixture ? Object.keys(CROPS) : cropsInBed;
  const crops = sourceCrops
    .filter(k => getCrop(k))
    .filter(k => showEnded || getCrop(k).harvestEnd >= today)
    .sort((a, b) => {
      const fa = getCrop(a).family, fb = getCrop(b).family;
      if (fa !== fb) return fa.localeCompare(fb);
      return getCrop(a).sowWeek - getCrop(b).sowWeek;
    });
  const unknownCrops = sourceCrops.filter(k => !getCrop(k));
  const families = [...new Set(crops.map(k => getCrop(k).family))];
  const thisWeek = calendar.find(w => w.week === today) || null;
  const offSeason = today < ACTIVE_GROWING_WINDOW.start || today > ACTIVE_GROWING_WINDOW.end;
  const headline = pickWeeklyHeadline(bed, events, { ...now, week: today }, calendar, frostWeeks);
  React.useEffect(() => {
    if (typeof GardenJournal === 'undefined') return;
    if (isFixture) return;
    const hasLocation = !!(gosBed && ((gosBed.location && gosBed.location.trim()) || (gosBed.zone && gosBed.zone.trim())));
    GardenJournal.generateSystemAnnouncements({
      bedId: gosBed && gosBed.id ? gosBed.id : '',
      bedName: gosBed && gosBed.name ? gosBed.name : '',
      hasLocation,
      now: { week: today, seasonYear: now.seasonYear },
      frostDays: frostCountdown(frostWeeks, today),
      unknownCropIds: unknownCrops,
      crops: crops.map(k => {
        const crop = getCrop(k);
        return crop ? { cropId: k, ...crop } : null;
      }).filter(Boolean),
    });
  }, [
    gosBed && gosBed.id,
    gosBed && gosBed.location,
    gosBed && gosBed.zone,
    today,
    now.seasonYear,
    frostWeeks && frostWeeks.first,
    unknownCrops.join(','),
    crops.join(','),
    isFixture,
  ]);

  // Map of cropId → array of actual planting ISO weeks pulled from the bed.
  // Cells flagged isScheduled (i.e. catalog fallback, no real plantedAt on
  // disk) are excluded so the markers only render genuine gardener data.
  const cropToActualWeeks = React.useMemo(() => {
    const map = {};
    bed.forEach(c => {
      if (!c || !c.crop || c.isScheduled) return;
      if (typeof c.plantedWeek !== 'number') return;
      if (!map[c.crop]) map[c.crop] = [];
      map[c.crop].push(c.plantedWeek);
    });
    return map;
  }, [bed]);

  // Set of crop ids whose *whole crop* has been marked done or harvested this
  // season. Cell-scoped events stay local to their cells — marking r0c0 done
  // does not dim the entire crop lane in the timeline. Mirrors the gate in
  // findDoneEventThisSeason so legacy unscoped events still count as crop-level.
  const doneCrops = React.useMemo(() => {
    const set = new Set();
    if (!Array.isArray(events)) return set;
    events.forEach(e => {
      if (!e || e.season !== season) return;
      if (DONE_TYPES.indexOf(e.type) < 0) return;
      if (e.scope && e.scope !== 'crop') return;
      const id = eventCropId(e);
      if (id) set.add(id);
    });
    return set;
  }, [events, season]);

  const isBedEmpty = !isFixture && cropsInBed.length === 0;
  const showFixtureBanner = isFixture && !fixtureBannerDismissed;
  const isPreview = weekOffset !== 0;

  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
      display: 'flex', flexDirection: 'column', position: 'relative',
      paddingTop: 'env(safe-area-inset-top)', paddingBottom: 'env(safe-area-inset-bottom)',
    }}>
      <FakeStatusBar/>

      {showFixtureBanner && (
        <div role="status" style={{
          margin: '0 14px 6px', padding: '8px 12px', borderRadius: 10,
          background: T.sunPale, border: `1px solid ${T.sunBright}`,
          display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0,
        }}>
          <span style={{
            fontFamily: T.fontSans, fontSize: 12, color: T.text, lineHeight: 1.4, flex: 1,
          }}>
            Showing example data. <a href="garden-painting.html" style={{ color: T.leaf, fontWeight: 600 }}>Set up your bed in Beds</a> to see your real plan.
          </span>
          <button type="button" aria-label="Dismiss banner" onClick={() => setFixtureBannerDismissed(true)} style={{
            width: 28, height: 28, minWidth: 28, minHeight: 28, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: T.textSoft, fontSize: 18, lineHeight: 1, flexShrink: 0,
          }}>×</button>
        </div>
      )}

      <header style={{
        padding: '2px 20px 10px', flexShrink: 0,
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      }}>
        <div>
          <div style={{
            fontFamily: T.fontDisp, fontSize: 28, fontWeight: 600,
            letterSpacing: -0.5, lineHeight: 1,
          }}>
            {gosBed && gosBed.name
              ? <span>{gosBed.name}<span style={{ color: T.leaf, fontStyle: 'italic', fontWeight: 500 }}> / </span></span>
              : <span>Season<span style={{ color: T.leaf, fontStyle: 'italic', fontWeight: 500 }}> / </span></span>}
            <span style={{ fontWeight: 400, color: T.textMid, fontSize: 22 }}>{offSeason ? 'OFF SEASON' : `W${today}`}</span>
          </div>
          <div style={{ marginTop: 3, display: 'flex', gap: 8 }}>
            <Label size={10} color={T.textSoft}>{now.label.toUpperCase()}</Label>
            <Label size={10} color={T.textMuted}>·</Label>
            <Label size={10} color={T.textSoft}>{locationLabel(gosBed).toUpperCase()}</Label>
            <Label size={10} color={T.textMuted}>·</Label>
            <Label size={10} color={T.textSoft}>DAY {now.dayOfSeason}</Label>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button type="button" aria-label="Tweaks" onClick={onOpenTweaks} style={{
            width: 32, height: 32, borderRadius: 8,
            background: T.panel, border: `1px solid ${T.borderSoft}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', padding: 0,
          }}>{Icons.gear(14, T.soil)}</button>
          <button type="button"
            aria-label={isPreview ? 'Reset season position to add crops' : 'Open Beds to add crops'}
            disabled={isPreview}
            title={isPreview ? 'Reset season position to add crops' : 'Open Beds to add crops'}
            onClick={onAdd} style={{
            width: 32, height: 32, borderRadius: 8,
            background: T.panel, border: `1px solid ${T.borderSoft}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: isPreview ? 'not-allowed' : 'pointer', padding: 0,
            opacity: isPreview ? 0.45 : 1,
          }}>{Icons.plus(14, T.soil)}</button>
        </div>
      </header>

      <BedPicker beds={allBeds} activeId={gosBed && gosBed.id} onPick={onPickBed}/>

      <ThisWeekStrip thisWeek={thisWeek} headline={headline} gosBed={gosBed}
        frostWeeks={frostWeeks} today={{ ...now, week: today }} offSeason={offSeason}/>

      {catalogWarning && (
        <div role="status" style={{
          margin: '8px 14px 0', padding: '8px 12px', borderRadius: 10,
          background: T.sunPale, border: `1px solid ${T.sunBright}`,
          fontFamily: T.fontSans, fontSize: 12, color: T.text,
          display: 'flex', justifyContent: 'space-between', gap: 8,
        }}>
          <span>{catalogWarning}</span>
          <button type="button" onClick={() => window.location.reload()} style={{
            border: `1px solid ${T.borderSoft}`, background: T.panel, borderRadius: 6,
            fontFamily: T.fontMono, fontSize: 9, textTransform: 'uppercase', cursor: 'pointer',
          }}>Refresh catalog</button>
        </div>
      )}

      {isBedEmpty && (
        <div role="status" style={{
          margin: '8px 14px 0', padding: '10px 12px', borderRadius: 10,
          background: T.cedarWash, border: `1px dashed ${T.cedar}`,
          display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0,
        }}>
          <span style={{ fontFamily: T.fontSans, fontSize: 12, color: T.text, lineHeight: 1.45, flex: 1 }}>
            Your bed has no crops yet.
          </span>
          <a href="garden-painting.html" style={{
            padding: '8px 12px', borderRadius: 999, minHeight: 36,
            display: 'inline-flex', alignItems: 'center',
            background: T.leafBright, color: '#fff', textDecoration: 'none',
            fontFamily: T.fontSans, fontSize: 12, fontWeight: 600,
          }}>Open Beds →</a>
        </div>
      )}

      {unknownCrops.length > 0 && (
        <div role="status" style={{
          margin: '8px 14px 0', padding: '10px 12px', borderRadius: 10,
          background: T.cedarWash, border: `1px solid ${T.borderSoft}`,
          fontFamily: T.fontSans, fontSize: 12, color: T.text,
        }}>
          {unknownCrops.map(id => `Unknown crop (${id})`).join(', ')} still appears in your bed. Refresh the catalog when online.
        </div>
      )}

      <section style={{
        flex: 1, margin: '10px 14px 0', background: T.panel,
        borderRadius: 14, border: `1px solid ${T.borderSoft}`,
        overflow: 'hidden', display: 'flex', flexDirection: 'column',
        boxShadow: '0 1px 3px rgba(44,27,11,0.06)',
      }}>
        <div style={{
          padding: '10px 14px 8px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          borderBottom: `1px solid ${T.borderSoft}`,
        }}>
          <Label size={10} color={T.soilMid}>THE SEASON · W1 → W{wEnd}</Label>
          <div style={{ display: 'flex', gap: 10 }}>
            <KeyDot label="SOW"  color={T.leafPale} border={T.leaf}/>
            <KeyDot label="GROW" color={T.sunPale}  border={T.sun}/>
            <KeyDot label="PICK" color={T.rust}     border={T.rust} solid/>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
          <div style={{ position: 'relative', padding: '10px 4px 14px', display: 'flex', alignItems: 'stretch' }}>
            <TimeAxis wStart={wStart} wEnd={wEnd} pxPerWeek={pxPerWeek} today={today} timelineH={timelineH} calendar={calendar}/>
            <div style={{ flex: 1, position: 'relative', marginLeft: 4 }}>
              <TodayLine today={today} wStart={wStart} pxPerWeek={pxPerWeek}/>
              <div style={{ display: 'flex', gap: 2, height: timelineH + 22 }}>
                {families.map(fam => {
                  const cropsInFam = crops.filter(k => getCrop(k).family === fam);
                  return (
                    <div key={fam} style={{ display: 'flex', flexDirection: 'column', flex: cropsInFam.length, minWidth: cropsInFam.length * 22 }}>
                      <div style={{
                        height: 22, display: 'flex', alignItems: 'center',
                        justifyContent: 'center', borderBottom: `1px solid ${T.borderSoft}`,
                        background: T.cedarWash,
                      }}>
                        <Label size={8} color={T.soilMid} style={{ fontWeight: 600 }}>
                          {fam.toUpperCase()}
                        </Label>
                      </div>
                      <div style={{ flex: 1, display: 'flex', gap: 0 }}>
                        {cropsInFam.map(k => (
                          <CropLane key={k} cropKey={k} today={today}
                            wStart={wStart} pxPerWeek={pxPerWeek}
                            onPick={() => setPicked(k)}
                            actualPlantedWeeks={cropToActualWeeks[k] || []}
                            dim={getCrop(k).harvestEnd < today}
                            done={doneCrops.has(k)}/>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </section>

      <InGroundStrip bed={bed} dimensions={dimensions} onPickCrop={setPicked}/>
      <TabBar active="planner"/>

      {picked && (
        <CropSheet cropKey={picked} today={today} bed={bed} events={events}
          season={season} gosBed={gosBed} isFixture={isFixture}
          isPreview={isPreview} weekOffset={weekOffset}
          onMarkDone={onMarkDone}
          onHarvest={onHarvest}
          onUndoDone={onUndoDone}
          onMarkCellDone={onMarkCellDone}
          onHarvestCell={onHarvestCell}
          onUndoCellDone={onUndoCellDone}
          onRemove={onRemove}
          onClose={() => setPicked(null)}/>
      )}
    </div>
  );
}

// ── Tweaks panel ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { density: 'comfortable', showEnded: true, weekOffset: 0 };
const TWEAK_STORAGE_KEY = 'gos.planner-v5.tweaks';

function loadTweaks() {
  try {
    const raw = window.localStorage.getItem(TWEAK_STORAGE_KEY);
    if (!raw) return TWEAK_DEFAULTS;
    return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
  } catch (_) {
    return TWEAK_DEFAULTS;
  }
}
function saveTweaks(t) {
  try { window.localStorage.setItem(TWEAK_STORAGE_KEY, JSON.stringify(t)); } catch (_) {}
}

function Seg({ value, opts, onChange }) {
  return (
    <div style={{ display: 'flex', background: T.cedarWash, borderRadius: 6, padding: 2, gap: 2 }}>
      {opts.map(([val, lab]) => (
        <button type="button" key={val} onClick={() => onChange(val)} style={{
          flex: 1, padding: '5px 8px', borderRadius: 4, border: 'none',
          background: value === val ? T.panel : 'transparent',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 500,
          color: value === val ? T.text : T.textSoft,
          boxShadow: value === val ? '0 1px 2px rgba(44,27,11,0.1)' : 'none',
          cursor: 'pointer',
        }}>{lab}</button>
      ))}
    </div>
  );
}

function TweakRow({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <Label size={9} color={T.textSoft} style={{ display: 'block', marginBottom: 5, fontWeight: 500 }}>
        {label}
      </Label>
      {children}
    </div>
  );
}

function TweaksPanel({ tweak, setTweak, onClose, now }) {
  const dialogRef = useFocusTrap(true, onClose);
  const setKey = (k, v) => {
    const next = { ...tweak, [k]: v };
    setTweak(next);
    saveTweaks(next);
  };
  return (
    <>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.42)', zIndex: 50,
      }}/>
      <div ref={dialogRef} role="dialog" aria-modal="true" aria-label="Tweaks" tabIndex="-1" style={{
        position: 'absolute', top: 60, right: 12, zIndex: 51,
        width: 264, maxWidth: 'calc(100% - 24px)',
        background: T.panel, borderRadius: 12,
        border: `1px solid ${T.border}`,
        boxShadow: '0 16px 48px rgba(44,27,11,0.28), 0 2px 6px rgba(44,27,11,0.12)',
        padding: '14px 16px 16px',
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          marginBottom: 12,
        }}>
          <Disp size={17}>Tweaks</Disp>
          <button type="button" onClick={onClose} aria-label="Close tweaks" style={{
            width: 24, height: 24, borderRadius: 6, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: T.textSoft,
          }}>{Icons.close(12, T.textSoft)}</button>
        </div>
        <TweakRow label="Density">
          <Seg value={tweak.density}
            opts={[['comfortable', 'Comfortable'], ['compact', 'Compact']]}
            onChange={v => setKey('density', v)}/>
        </TweakRow>
        <TweakRow label="Finished crops">
          <Seg value={tweak.showEnded ? 'true' : 'false'}
            opts={[['true', 'Show'], ['false', 'Hide']]}
            onChange={v => setKey('showEnded', v === 'true')}/>
        </TweakRow>
        <TweakRow label="Season position">
          <input type="range" min="-10" max="20" step="1" value={tweak.weekOffset}
            onChange={e => setKey('weekOffset', +e.target.value)}
            style={{ width: '100%', accentColor: T.leaf }}
            aria-label="Season position offset in weeks"/>
          <div style={{
            fontFamily: T.fontMono, fontSize: 9, color: T.textSoft,
            letterSpacing: 0.1, marginTop: 4,
          }}>
            {tweak.weekOffset === 0
              ? `Today · W${now.week}`
              : `W${Math.max(1, Math.min(isoWeeksInYear(Number(now.seasonYear)), now.week + tweak.weekOffset))} · ${tweak.weekOffset > 0 ? '+' : ''}${tweak.weekOffset}w`}
          </div>
        </TweakRow>
        <button type="button" onClick={() => { setTweak(TWEAK_DEFAULTS); saveTweaks(TWEAK_DEFAULTS); }} style={{
          width: '100%', padding: '6px 10px',
          background: 'transparent', border: `1px solid ${T.borderSoft}`,
          borderRadius: 6, cursor: 'pointer',
          fontFamily: T.fontMono, fontSize: 9,
          letterSpacing: 0.15, textTransform: 'uppercase',
          color: T.textSoft, fontWeight: 500,
        }}>Reset to defaults</button>
      </div>
    </>
  );
}

function Toast({ toast, onDismiss }) {
  if (!toast) return null;
  const bg = toast.type === 'error' ? T.bad : toast.type === 'success' ? T.leaf : T.soil;
  return (
    <div role={toast.type === 'error' ? 'alert' : 'status'} style={{
      position: 'absolute', left: 16, right: 16,
      bottom: 'calc(78px + env(safe-area-inset-bottom))',
      zIndex: 80, background: bg, color: '#fff',
      borderRadius: 10, padding: '10px 12px',
      boxShadow: '0 10px 30px rgba(44,27,11,0.28)',
      display: 'flex', alignItems: 'center', gap: 10,
      fontFamily: T.fontSans, fontSize: 13,
    }}>
      <span style={{ flex: 1, lineHeight: 1.35 }}>{toast.message}</span>
      {toast.action && (
        <button type="button" onClick={toast.action.onClick} style={{
          border: '1px solid rgba(255,255,255,0.5)', background: 'transparent',
          color: '#fff', borderRadius: 6, padding: '6px 8px',
          fontFamily: T.fontMono, fontSize: 9, textTransform: 'uppercase',
          cursor: 'pointer',
        }}>{toast.action.label}</button>
      )}
      <button type="button" onClick={onDismiss} aria-label="Dismiss notification" style={{
        width: 26, height: 26, borderRadius: 6, border: 'none',
        background: 'rgba(255,255,255,0.14)', color: '#fff',
        cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>{Icons.close(12, '#fff')}</button>
    </div>
  );
}

// ── Root ────────────────────────────────────────────────────────────────────
function App() {
  const now = useNow();
  const [tweak, setTweak] = React.useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [active, setActive] = React.useState(() => loadActiveContext(now));
  const [catalogWarning, setCatalogWarning] = React.useState('');
  const [catalogVersion, setCatalogVersion] = React.useState(0);
  const { toast, showToast, dismissToast, lastAction, setLastAction } = useToast();
  const refresh = React.useCallback(() => setActive(loadActiveContext(now)), [now]);

  React.useEffect(() => {
    let cancelled = false;
    const cached = readCachedCatalog();
    if (cached) {
      CROPS = cached;
      setCatalogVersion(v => v + 1);
    }
    fetch('specs/CROP_SCORING_DATA.json', { cache: 'no-cache' })
      .then(res => res.ok ? res.json() : Promise.reject(new Error('Catalog fetch failed')))
      .then(json => {
        if (cancelled) return;
        const normalized = normalizeCatalogPayload(json);
        if (!normalized) throw new Error('Invalid catalog');
        CROPS = normalized;
        cacheCatalog(normalized);
        setCatalogWarning('');
        setCatalogVersion(v => v + 1);
      })
      .catch(() => {
        if (cancelled) return;
        if (!cached) {
          CROPS = { ...FALLBACK_CROPS };
          setCatalogWarning('Using minimal fallback catalog.');
          setCatalogVersion(v => v + 1);
        }
      });
    return () => { cancelled = true; };
  }, []);

  React.useEffect(() => {
    refresh();
  }, [now.week, now.seasonYear, catalogVersion, refresh]);

  // Refresh when a bed is created or switched (item #1/#2 dispatch path).
  React.useEffect(() => {
    const handler = () => refresh();
    window.addEventListener('gosBedChanged', handler);
    return () => window.removeEventListener('gosBedChanged', handler);
  }, [refresh]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.key && e.key.startsWith('gos.')) {
        refresh();
        setLastAction('Planner refreshed from another window.');
      }
    };
    window.addEventListener('storage', handler);
    return () => window.removeEventListener('storage', handler);
  }, [refresh, setLastAction]);

  const { bed, events, gosBed, allBeds, isFixture, revision, dimensions } = active;
  const frostWeeks = getFrostWeeks(gosBed);
  const calendar = React.useMemo(() => buildCalendar(Number(now.seasonYear), CROPS, frostWeeks), [now.seasonYear, catalogVersion, frostWeeks && frostWeeks.last, frostWeeks && frostWeeks.first]);

  // Bed-content edits live in the Beds screen now. Both the fixture and
  // the real-bed paths route the user there to keep one canonical writer.
  const goToBeds = () => {
    try { window.location.href = 'garden-painting.html'; } catch (_) {}
  };

  const handleMarkDone = (cropKey) => {
    if (!gosBed) { goToBeds(); return; }
    const ev = makeDoneEvent('mark_done', gosBed, cropKey, null, null, now, 'crop');
    const res = appendEventToActiveBed(ev, revision);
    if (!res.ok) { refresh(); showToast({ type: 'error', message: classifyWriteError(res) }); return; }
    refresh();
    showToast({ type: 'success', message: 'Saved.' });
  };

  const handleHarvest = (cropKey, opts) => {
    if (!gosBed) { goToBeds(); return; }
    const ev = makeDoneEvent('harvest', gosBed, cropKey, null, opts || {}, now, 'crop');
    const res = appendEventToActiveBed(ev, revision);
    if (!res.ok) { refresh(); showToast({ type: 'error', message: classifyWriteError(res) }); return; }
    let journalWarning = false;
    if (typeof GardenJournal !== 'undefined') {
      try {
        GardenJournal.fromPlannerHarvest(ev, {
          bedId: gosBed.id,
          bedName: gosBed.name || gosBed.id,
          crop: getCrop(cropKey) || unknownCrop(cropKey),
          cropId: cropKey,
          cells: bed.filter(x => x.crop === cropKey).map(x => 'r' + x.r + 'c' + x.c),
          seasonYear: now.seasonYear,
        });
      } catch (_) {
        journalWarning = true;
      }
    }
    refresh();
    showToast({ type: journalWarning ? 'error' : 'success', message: journalWarning ? 'Harvest saved, but Journal entry could not be added.' : 'Harvest saved.' });
  };

  const handleUndoDone = (cropKey) => {
    if (!gosBed) return;
    const res = removeMostRecentDoneEvent(cropKey, now.seasonYear, revision);
    if (!res.ok) { refresh(); showToast({ type: 'error', message: classifyWriteError(res) }); return; }
    refresh();
    showToast({ type: 'success', message: 'Undo saved.' });
  };

  // Per-cell variants — writes/removes events targeting a specific cell so
  // the gardener can log "this row of lettuce is done" without claiming the
  // whole crop is finished.
  const handleMarkCellDone = (cropKey, cellStr) => {
    if (!gosBed || !cellStr) { goToBeds(); return; }
    const ev = makeDoneEvent('mark_done', gosBed, cropKey, cellStr, null, now, 'cell');
    const res = appendEventToActiveBed(ev, revision);
    if (!res.ok) { refresh(); showToast({ type: 'error', message: classifyWriteError(res) }); return; }
    refresh();
    showToast({ type: 'success', message: 'Cell saved.' });
  };
  const handleHarvestCell = (cropKey, cellStr, opts) => {
    if (!gosBed || !cellStr) { goToBeds(); return; }
    const ev = makeDoneEvent('harvest', gosBed, cropKey, cellStr, opts || {}, now, 'cell');
    const res = appendEventToActiveBed(ev, revision);
    if (!res.ok) { refresh(); showToast({ type: 'error', message: classifyWriteError(res) }); return; }
    let journalWarning = false;
    if (typeof GardenJournal !== 'undefined') {
      try {
        GardenJournal.fromPlannerHarvest(ev, {
          bedId: gosBed.id,
          bedName: gosBed.name || gosBed.id,
          crop: getCrop(cropKey) || unknownCrop(cropKey),
          cropId: cropKey,
          cells: [cellStr],
          seasonYear: now.seasonYear,
        });
      } catch (_) {
        journalWarning = true;
      }
    }
    refresh();
    showToast({ type: journalWarning ? 'error' : 'success', message: journalWarning ? 'Harvest saved, but Journal entry could not be added.' : 'Harvest saved.' });
  };
  const handleUndoCellDone = (cellStr, cropKey) => {
    if (!gosBed || !cellStr) return;
    const res = removeMostRecentDoneEventForCell(cellStr, cropKey, now.seasonYear, revision);
    if (!res.ok) { refresh(); showToast({ type: 'error', message: classifyWriteError(res) }); return; }
    refresh();
    showToast({ type: 'success', message: 'Undo saved.' });
  };
  const handlePickBed = (id) => {
    if (typeof GosBed === 'undefined') return;
    GosBed.setActive(id);
    refresh();
  };

  return (
    <PhoneFrame>
      <Planner
        tweak={tweak}
        bed={bed} events={events} gosBed={gosBed} allBeds={allBeds} isFixture={isFixture}
        season={now.seasonYear}
        now={now}
        calendar={calendar}
        frostWeeks={frostWeeks}
        dimensions={dimensions}
        catalogWarning={catalogWarning}
        onOpenTweaks={() => setTweaksOpen(true)}
        onPickBed={handlePickBed}
        onAdd={goToBeds}
        onRemove={goToBeds}
        onRecord={(cropKey, type) => {
          // Legacy bridge: callers still passing 'harvested' get routed to
          // mark_done so the new schema is the only writer.
          if (type === 'harvested') handleHarvest(cropKey, {});
          else handleMarkDone(cropKey);
        }}
        onMarkDone={handleMarkDone}
        onHarvest={handleHarvest}
        onUndoDone={handleUndoDone}
        onMarkCellDone={handleMarkCellDone}
        onHarvestCell={handleHarvestCell}
        onUndoCellDone={handleUndoCellDone}/>
      {tweaksOpen && <TweaksPanel tweak={tweak} setTweak={setTweak} now={now} onClose={() => setTweaksOpen(false)}/>}
      <div role="status" aria-live="polite" className="sr-only">{lastAction}</div>
      <Toast toast={toast} onDismiss={dismissToast}/>
    </PhoneFrame>
  );
}

// gos-bed.js wiring: report active bed for verification (no rendering change)
if (typeof GosBed !== 'undefined') {
  const _activeBed = GosBed.getActive();
  if (_activeBed) {
    console.log('Active bed loaded: ' + _activeBed.name);
  } else {
    console.log('No bed found — using fixture data');
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function (e) {
    console.warn('SW registration failed:', e);
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
