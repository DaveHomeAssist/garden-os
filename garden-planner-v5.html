// ── Fixture data — mirrors src/data.jsx in the design bundle ────────────────
// 12 representative crops, one 4×8 bed, week 17 (late April) Zone 7a Philly.
// Production wiring to v4 localStorage + scoring engine is a follow-up.
const CROPS = {
  tom: { name:'Tomato',   mono:'To', color:'#c8412a', family:'Nightshade', sowWeek: 8, transplantWeek:16, harvestStart:26, harvestEnd:38, daysToMaturity:75, sun:'full' },

  head_lettuce: { name:'Lettuce', mono:'Le', color:'#6aab4a', family:'Leafy', sowWeek:10, transplantWeek:null, harvestStart:16, harvestEnd:24, daysToMaturity:55, sun:'part' },
  rad: { name:'Radish',   mono:'Ra', color:'#b84a1a', family:'Root',       sowWeek:10, transplantWeek:null, harvestStart:14, harvestEnd:18, daysToMaturity:28, sun:'full' },
  car: { name:'Carrot',   mono:'Ca', color:'#d4651a', family:'Root',       sowWeek:12, transplantWeek:null, harvestStart:22, harvestEnd:30, daysToMaturity:70, sun:'full' },
  carrot: { name:'Carrot', mono:'Ca', color:'#d4651a', family:'Root',       sowWeek:12, transplantWeek:null, harvestStart:22, harvestEnd:30, daysToMaturity:70, sun:'full' },
  pep: { name:'Pepper',   mono:'Pe', color:'#c45a18', family:'Nightshade', sowWeek: 8, transplantWeek:18, harvestStart:30, harvestEnd:40, daysToMaturity:80, sun:'full' },
  cuc: { name:'Cucumber', mono:'Cu', color:'#3a6b2a', family:'Cucurbit',   sowWeek:16, transplantWeek:null, harvestStart:26, harvestEnd:36, daysToMaturity:55, sun:'full' },
  kal: { name:'Kale',     mono:'Ka', color:'#2f7a3d', family:'Brassica',   sowWeek:10, transplantWeek:null, harvestStart:22, harvestEnd:48, daysToMaturity:55, sun:'part' },
  kale: { name:'Kale',     mono:'Ka', color:'#2f7a3d', family:'Brassica',   sowWeek:10, transplantWeek:null, harvestStart:22, harvestEnd:48, daysToMaturity:55, sun:'part' },
  oni: { name:'Onion',    mono:'On', color:'#b07d55', family:'Allium',     sowWeek: 6, transplantWeek:12, harvestStart:32, harvestEnd:36, daysToMaturity:110, sun:'full' },
  spi: { name:'Spinach',  mono:'Sp', color:'#3a6b2a', family:'Leafy',      sowWeek: 8, transplantWeek:null, harvestStart:14, harvestEnd:20, daysToMaturity:40, sun:'part' },
  chv: { name:'Chives',   mono:'Ch', color:'#6aab4a', family:'Allium',     sowWeek: 8, transplantWeek:null, harvestStart:18, harvestEnd:48, daysToMaturity:80, sun:'full' },
  mar: { name:'Marigold', mono:'Ma', color:'#e8c84a', family:'Flower',     sowWeek:14, transplantWeek:18, harvestStart:22, harvestEnd:44, daysToMaturity:50, sun:'full' },
  peas: { name:'Peas', mono:'Ps', color:'#5aab6b', family:'Legume', sowWeek:8, transplantWeek:null, harvestStart:18, harvestEnd:24, daysToMaturity:65, sun:'full' },
  scallion: { name:'Scallion', mono:'Sc', color:'#7da838', family:'Allium', sowWeek:10, transplantWeek:null, harvestStart:18, harvestEnd:32, daysToMaturity:60, sun:'full' },
  garlic: { name:'Garlic', mono:'Ga', color:'#b07d55', family:'Allium', sowWeek:42, transplantWeek:null, harvestStart:24, harvestEnd:30, daysToMaturity:240, sun:'full', cycleNote:'fall planting -> summer harvest' },
};
function isoWeek(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}
const TODAY = new Date();
const WEEK_NOW = isoWeek(TODAY);
const DAY_OF_SEASON = (() => {
  const yearStart = new Date(TODAY.getFullYear(), 0, 1);
  return Math.floor((TODAY - yearStart) / 86400000) + 1;
})();
const TODAY_LABEL = TODAY.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
const BED = [
  { r:0, c:0, crop:'tom', plantedWeek:16 }, { r:0, c:1, crop:'tom', plantedWeek:16 },
  { r:0, c:2, crop:'tom', plantedWeek:16 }, { r:0, c:3, crop:'cuc', plantedWeek:16 },
  { r:0, c:4, crop:'cuc', plantedWeek:16 }, { r:0, c:5, crop:'pep', plantedWeek:18 },
  { r:0, c:6, crop:'pep', plantedWeek:18 }, { r:0, c:7, crop:'pep', plantedWeek:18 },
  { r:1, c:0, crop:'bas', plantedWeek:18 }, { r:1, c:1, crop:'bas', plantedWeek:18 },
  { r:1, c:2, crop:'mar', plantedWeek:18 }, { r:1, c:3, crop:'bas', plantedWeek:18 },
  { r:1, c:4, crop:'mar', plantedWeek:18 }, { r:1, c:5, crop:'kal', plantedWeek:12 },
  { r:1, c:6, crop:'kal', plantedWeek:12 }, { r:1, c:7, crop:'chv', plantedWeek:12 },
  { r:2, c:0, crop:'car', plantedWeek:14 }, { r:2, c:1, crop:'car', plantedWeek:14 },
  { r:2, c:2, crop:'car', plantedWeek:14 }, { r:2, c:3, crop:'car', plantedWeek:14 },
  { r:2, c:4, crop:'oni', plantedWeek:12 }, { r:2, c:5, crop:'oni', plantedWeek:12 },
  { r:2, c:6, crop:'oni', plantedWeek:12 }, { r:2, c:7, crop:'oni', plantedWeek:12 },
  { r:3, c:0, crop:'let', plantedWeek:14 }, { r:3, c:1, crop:'let', plantedWeek:14 },
  { r:3, c:2, crop:'spi', plantedWeek:10 }, { r:3, c:3, crop:'spi', plantedWeek:10 },
  { r:3, c:4, crop:'rad', plantedWeek:15 }, { r:3, c:5, crop:'rad', plantedWeek:15 },
  { r:3, c:6, crop:'let', plantedWeek:14 }, { r:3, c:7, crop:'let', plantedWeek:14 },
];
const SEASON = { name:'Late Spring', zone:'7a', location:'Philadelphia, PA', today: TODAY_LABEL.replace(',', ' ·'), dayOfSeason: DAY_OF_SEASON };

// ── Bed + event-log persistence ─────────────────────────────────────────────
// As of build-order item #4, the Plan timeline reads its bed and events from
// GosBed (the canonical primitive in gos-bed.js), not from a per-page
// localStorage namespace. The fixture BED above is used only as a fallback
// when no active GosBed bed exists.
const SEASON_YEAR = String(TODAY.getFullYear());
const DONE_TYPES = ['mark_done', 'harvest'];
const CONCURRENT_WRITE_MSG = 'Could not save — another window is active. Reload to sync.';

// Translate a GosBed bed (canonical schema, painted[] uses {cell:"r0c2",
// cropId, ...} snapshots) into the internal shape the Planner components
// already consume (array of {r, c, crop, plantedWeek, plantedAt, isScheduled}).
//
// Realism: prefer the bed's recorded plantedWeek/plantedAt. Only fall back to
// the crop catalog's ideal sowWeek when the bed lacks real timing — and tag
// such entries with isScheduled so the UI can surface "(scheduled)" rather
// than pretend a textbook timeline is the gardener's actual one.
function bedFromGos(gosBed) {
  if (!gosBed || !Array.isArray(gosBed.painted)) return [];
  return gosBed.painted.map(p => {
    const cell = (typeof GosBed !== 'undefined') ? GosBed.parseCell(p.cell) : null;
    if (!cell) return null;
    const realWeek = (typeof GosBed !== 'undefined' && GosBed.plantedWeekOf)
      ? GosBed.plantedWeekOf(p)
      : (typeof p.plantedWeek === 'number' ? p.plantedWeek : null);
    const fallbackWeek = (CROPS[p.cropId] && CROPS[p.cropId].sowWeek) || WEEK_NOW;
    return {
      r: cell.r,
      c: cell.c,
      crop: p.cropId,
      id: p.id,
      displayName: p.displayName || p.cropName || (CROPS[p.cropId] && CROPS[p.cropId].name) || p.cropId,
      varietyName: p.varietyName,
      status: p.status,
      bedLocation: p.bedLocation,
      placementNote: p.placementNote,
      label: p.label,
      notes: p.notes,
      plantedWeek: realWeek != null ? realWeek : fallbackWeek,
      plantedAt: typeof p.plantedAt === 'string' ? p.plantedAt : null,
      isScheduled: realWeek == null,
    };
  }).filter(Boolean);
}

// Single read of the active context. Returns the same shape regardless of
// whether a real bed or the fixture is being shown. Callers branch on
// isFixture for banners + write-disabled paths.
function loadActiveContext() {
  if (typeof GosBed === 'undefined') {
    return { bed: BED, events: [], gosBed: null, allBeds: [], isFixture: true };
  }
  const allBeds = GosBed.readAll();
  const gosBed = GosBed.getActive();
  if (!gosBed) {
    return { bed: BED, events: [], gosBed: null, allBeds, isFixture: true };
  }
  const internalBed = bedFromGos(gosBed);
  return {
    bed: internalBed,
    events: Array.isArray(gosBed.events) ? gosBed.events : [],
    gosBed,
    allBeds,
    isFixture: false,
  };
}

// Find the most recent mark_done or harvest event for a crop in the current
// season. Returns the event or null. The "this season" check uses the
// canonical SEASON_YEAR string so events written in a future year do not
// satisfy a past year's done check.
function findDoneEventThisSeason(events, cropId, season) {
  if (!Array.isArray(events)) return null;
  for (let i = events.length - 1; i >= 0; i--) {
    const e = events[i];
    if (!e || e.season !== season) continue;
    if (DONE_TYPES.indexOf(e.type) < 0) continue;
    if (e.cropSnapshot && e.cropSnapshot.cropId === cropId) return e;
  }
  return null;
}

function makeDoneEvent(type, gosBed, cropId, cellStr, extra) {
  const c = CROPS[cropId];
  return {
    type,
    bedId: gosBed.id,
    season: SEASON_YEAR,
    cropSnapshot: {
      cropId,
      cropName: (c && c.name) || cropId,
      cropIcon: (c && c.mono) || '',
      cropColor: (c && c.color) || '#888',
    },
    cell: cellStr || null,
    timestamp: new Date().toISOString(),
    quantity: extra && extra.quantity != null ? extra.quantity : null,
    unit: extra && extra.unit ? extra.unit : null,
    notes: extra && extra.notes ? extra.notes : null,
  };
}

// Append a new event to the active bed's events[] via GosBed.write.
// Returns { ok: bool, error?: string } so callers can surface concurrent-
// write conflicts without changing state.
function appendEventToActiveBed(event) {
  if (typeof GosBed === 'undefined') return { ok: false, error: 'No storage' };
  const gosBed = GosBed.getActive();
  if (!gosBed) return { ok: false, error: 'No active bed' };
  const next = Object.assign({}, gosBed, {
    events: (Array.isArray(gosBed.events) ? gosBed.events : []).concat([event]),
  });
  try {
    GosBed.write(next);
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e.message || 'write failed' };
  }
}

// Remove only the most recent done/harvest event matching the given crop in
// the current season. Other events are preserved.
function removeMostRecentDoneEvent(cropId, season) {
  if (typeof GosBed === 'undefined') return { ok: false, error: 'No storage' };
  const gosBed = GosBed.getActive();
  if (!gosBed) return { ok: false, error: 'No active bed' };
  const events = Array.isArray(gosBed.events) ? gosBed.events : [];
  let lastIdx = -1;
  for (let i = events.length - 1; i >= 0; i--) {
    const e = events[i];
    if (!e || e.season !== season) continue;
    if (DONE_TYPES.indexOf(e.type) < 0) continue;
    if (e.cropSnapshot && e.cropSnapshot.cropId === cropId) { lastIdx = i; break; }
  }
  if (lastIdx < 0) return { ok: true, removed: false };
  const nextEvents = events.slice(0, lastIdx).concat(events.slice(lastIdx + 1));
  const next = Object.assign({}, gosBed, { events: nextEvents });
  try {
    GosBed.write(next);
    return { ok: true, removed: true };
  } catch (e) {
    return { ok: false, error: e.message || 'write failed' };
  }
}

// Per-cell variants of the helpers above. Used when the gardener wants to
// log a care action against a specific cell rather than the whole crop.
function findDoneEventForCell(events, cellStr, season) {
  if (!Array.isArray(events) || !cellStr) return null;
  for (let i = events.length - 1; i >= 0; i--) {
    const e = events[i];
    if (!e || e.season !== season) continue;
    if (DONE_TYPES.indexOf(e.type) < 0) continue;
    if (e.cell === cellStr) return e;
  }
  return null;
}

function removeMostRecentDoneEventForCell(cellStr, season) {
  if (typeof GosBed === 'undefined') return { ok: false, error: 'No storage' };
  const gosBed = GosBed.getActive();
  if (!gosBed) return { ok: false, error: 'No active bed' };
  const events = Array.isArray(gosBed.events) ? gosBed.events : [];
  let lastIdx = -1;
  for (let i = events.length - 1; i >= 0; i--) {
    const e = events[i];
    if (!e || e.season !== season) continue;
    if (DONE_TYPES.indexOf(e.type) < 0) continue;
    if (e.cell === cellStr) { lastIdx = i; break; }
  }
  if (lastIdx < 0) return { ok: true, removed: false };
  const nextEvents = events.slice(0, lastIdx).concat(events.slice(lastIdx + 1));
  const next = Object.assign({}, gosBed, { events: nextEvents });
  try {
    GosBed.write(next);
    return { ok: true, removed: true };
  } catch (e) {
    return { ok: false, error: e.message || 'write failed' };
  }
}

// Helper: pick the first painted cell coordinate (rRcC string) for a crop in
// the active bed. Mark-done events on a crop bar are anchored to that first
// cell so undo can find them deterministically.
function firstCellForCrop(gosBed, cropId) {
  if (!gosBed || !Array.isArray(gosBed.painted)) return null;
  const hit = gosBed.painted.find(p => p && p.cropId === cropId);
  return hit ? hit.cell : null;
}

// Legacy helper retained for the (now redirect-only) AddCropSheet codepath
// in fixture mode. Returns the first row/col not yet occupied in a 4×8 bed.
function firstOpenCell(bed) {
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      if (!bed.find(x => x.r === r && x.c === c)) return { r, c };
    }
  }
  return null;
}

const CALENDAR = (() => {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const weeks = [];
  for (let w = 10; w <= 44; w++) {
    const month = Math.min(11, Math.floor((w - 1) / 4.33));
    const sow = [], transplant = [], harvestActive = [];
    Object.entries(CROPS).forEach(([key, crop]) => {
      if (crop.sowWeek === w) sow.push(key);
      if (crop.transplantWeek === w) transplant.push(key);
      if (w >= crop.harvestStart && w <= crop.harvestEnd) harvestActive.push(key);
    });
    weeks.push({
      week: w,
      month: months[month],
      frost: w === 16 ? 'last' : (w === 42 ? 'first' : null),
      sow, transplant, harvestActive,
    });
  }
  return weeks;
})();

// ── Tiny SVG icon set (no emoji, per brand) ──────────────────────────────────
const Icons = {

// ── Primitives: Label, Disp, CropChip, KeyDot, Chip, Stat ───────────────────
function Label({ children, color = T.textSoft, size = 10, style = {} }) {
  return (
    <span style={{
      fontFamily: T.fontMono, fontSize: size, fontWeight: 500,
      textTransform: 'uppercase', letterSpacing: 0.12, color, ...style,
    }}>{children}</span>
  );
}
function Disp({ children, size = 22, weight = 600, style = {} }) {
  return (
    <span style={{
      fontFamily: T.fontDisp, fontSize: size, fontWeight: weight,
      letterSpacing: -0.015, lineHeight: 1.08, color: T.text, ...style,
    }}>{children}</span>
  );
}
function CropChip({ crop, size = 24 }) {
  const c = CROPS[crop];
  if (!c) return null;
  return (
    <span style={{
      width: size, height: size, borderRadius: '50%',
      background: c.color, color: '#fff',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: T.fontMono, fontSize: size * 0.42, fontWeight: 500,
      letterSpacing: -0.3,
      boxShadow: 'inset 0 -1.5px 0 rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.22)',
      lineHeight: 1,
    }}>{c.mono}</span>
  );
}
function BedPicker({ beds, activeId, onPick }) {

function CropLane({ cropKey, today, wStart, pxPerWeek, onPick, dim, done, actualPlantedWeeks = [] }) {

function nextMoveFor(c, stage, today) {
  if (stage === 'upcoming')   return `Start seeds indoors in week ${c.sowWeek}. Still ${c.sowWeek - today} weeks out.`;
  if (stage === 'sowing')     return c.transplantWeek ? `Move out to bed around week ${c.transplantWeek}.` : `Direct sown. Watch for germination in 7 to 14 days.`;
  if (stage === 'growing')    return `Keep watered. Harvest opens week ${c.harvestStart}.`;
  if (stage === 'harvesting') return `Harvest window open through week ${c.harvestEnd}. Don't let it bolt.`;
  return `Season closed. Clean bed and rotate to a different family.`;
}
function CropLife({ c, today }) {
  const wStart = c.sowWeek, wEnd = c.harvestEnd;
  const total = wEnd - wStart;
  const pct = w => ((w - wStart) / total) * 100;

  return (

          position: 'absolute', left: pct(c.sowWeek) + '%', right: (100 - pct(growAt)) + '%',

        <div style={{

        {today >= wStart && today <= wEnd && (
          <div style={{
            position: 'absolute', left: pct(today) + '%', top: -2, bottom: -2, width: 2,

function formatEventDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch (_) { return ''; }
}

function CropSheet({ cropKey, today, bed, events, season, gosBed, isFixture,
                    isPreview = false, weekOffset = 0,
                    onClose, onMarkDone, onHarvest, onUndoDone, onRemove,
                    onMarkCellDone, onHarvestCell, onUndoCellDone }) {
  const c = CROPS[cropKey];
  const cells = bed.filter(x => x.crop === cropKey);
  const primaryCell = cells.find(x => x.varietyName) || cells[0] || null;
  const inBed = cells.length > 0;
  const doneEvent = findDoneEventThisSeason(events, cropKey, season);

  // Earliest real planting date for this crop in the active bed. Cells flagged
  // isScheduled fall back to the catalog and don't count as actual plantings.
  const realCells = cells.filter(x => !x.isScheduled && x.plantedAt);
  const earliestPlantedAt = realCells.length
    ? realCells.reduce((acc, x) => (acc == null || x.plantedAt < acc ? x.plantedAt : acc), null)
    : null;
  const earliestPlantedWeek = realCells.length
    ? realCells.reduce((acc, x) => (acc == null || x.plantedWeek < acc ? x.plantedWeek : acc), null)
    : null;
  const [showHarvestForm, setShowHarvestForm] = React.useState(false);
  const [qty, setQty] = React.useState('');
  const [unit, setUnit] = React.useState('');
  const [notes, setNotes] = React.useState('');

  // If the user opens the harvest form then scrubs the season position into
  // preview mode, snap the form closed so the next render falls into the
  // preview banner branch instead of capturing input that can't be saved.
  React.useEffect(() => {
    if (isPreview && showHarvestForm) setShowHarvestForm(false);
  }, [isPreview, showHarvestForm]);

  // Stage prefers a recorded done event; otherwise falls back to schedule.
  const stage = (() => {
    if (doneEvent) return 'done';
    if (today < c.sowWeek) return 'upcoming';
    if (today < (c.transplantWeek || c.harvestStart)) return 'sowing';
    if (today < c.harvestStart) return 'growing';
    if (today <= c.harvestEnd) return 'harvesting';
    return 'done';
  })();
  const stageLabel = { upcoming: 'NOT YET', sowing: 'SOWING', growing: 'GROWING', harvesting: 'HARVEST WINDOW', done: 'DONE' }[stage];
  const stageColor = { upcoming: T.textMuted, sowing: T.leaf, growing: T.sun, harvesting: T.rust, done: T.leafBright }[stage];
  const weeksIn = Math.max(0, today - c.sowWeek);
  const weeksToHarv = Math.max(0, c.harvestStart - today);
  const doctorHref = (() => {
    const params = new URLSearchParams();
    if (gosBed && gosBed.id) params.set('bed', gosBed.id);
    if (primaryCell) {
      params.set('cell', `r${primaryCell.r}c${primaryCell.c}`);
      if (primaryCell.varietyName) params.set('variety', primaryCell.varietyName);
    }
    params.set('crop', cropKey);
    return `garden-doctor-v5.html?${params.toString()}`;
  })();

  const submitHarvest = () => {
    onHarvest(cropKey, {
      quantity: qty.trim() ? Number(qty) : null,
      unit: unit || null,
      notes: notes.trim() || null,
    });
    onClose();
  };
  const skipHarvestQty = () => {
    onHarvest(cropKey, {});
    onClose();
  };

  return (
    <>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.55)', zIndex: 40,
      }}/>
      <div role="dialog" aria-modal="true" aria-label={`${c.name} details`} style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 41,
        background: T.cream, borderRadius: '20px 20px 0 0',
        padding: '10px 20px 24px', maxHeight: '82%',
        boxShadow: '0 -8px 40px rgba(44,27,11,0.3)',
        display: 'flex', flexDirection: 'column', overflowY: 'auto',
      }}>
        <div style={{ width: 40, height: 4, background: T.border, borderRadius: 2, margin: '0 auto 12px' }}/>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
          <CropChip crop={cropKey} size={44}/>
          <div style={{ flex: 1 }}>
            <Disp size={22}>{primaryCell && primaryCell.displayName ? primaryCell.displayName : c.name}</Disp>
            {primaryCell && primaryCell.varietyName && (
              <div style={{ marginTop: 2, fontFamily: T.fontSerif, fontSize: 14, color: T.textSoft, fontStyle: 'italic' }}>
                {primaryCell.varietyName}
              </div>
            )}
            <div style={{ marginTop: 2 }}>
              <Label size={10} color={T.textMuted}>{c.family.toUpperCase()} · {c.daysToMaturity} DAYS · {c.sun.toUpperCase()} SUN</Label>
            </div>
            {c.cycleNote && (
              <Label size={10} color={T.rust} style={{ display: 'block', marginTop: 3, fontWeight: 600 }}>
                {c.cycleNote.toUpperCase()}
              </Label>
            )}
            {earliestPlantedAt && (
              <Label size={10} color={T.leaf} style={{ display: 'block', marginTop: 3, fontWeight: 600 }}>
                PLANTED {formatEventDate(earliestPlantedAt)}{earliestPlantedWeek != null ? ` · W${earliestPlantedWeek}` : ''}
              </Label>
            )}
            {!earliestPlantedAt && inBed && !isFixture && (
              <Label size={10} color={T.textMuted} style={{ display: 'block', marginTop: 3, fontStyle: 'italic' }}>
                Planting date not recorded (scheduled timing)
              </Label>
            )}
          </div>
          <div style={{
            background: stageColor, color: '#fff',
            padding: '4px 10px', borderRadius: 999,
            fontFamily: T.fontMono, fontSize: 10, fontWeight: 600, letterSpacing: 0.15,
          }}>{primaryCell && primaryCell.status ? primaryCell.status.toUpperCase() : stageLabel}</div>
        </div>

        <div style={{
          margin: '8px 0 14px', background: T.panel,
          borderRadius: 10, border: `1px solid ${T.borderSoft}`,
          padding: '10px 12px',
        }}>
          <CropLife c={c} today={today}/>
        </div>

        <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
          <Stat label="IN BED" value={cells.length} unit={cells.length === 1 ? 'cell' : 'cells'}/>
          <Stat label={stage === 'harvesting' ? 'HARVESTING' : stage === 'growing' ? 'WEEKS TO PICK' : 'WEEKS IN'}
            value={stage === 'growing' ? weeksToHarv : weeksIn}
            unit="weeks"/>
          <Stat label="ROW"
            value={cells.length ? [...new Set(cells.map(x => x.r + 1))].join('+') : '—'}
            unit={cells.length ? 'of 4' : ''}/>
        </div>

        {cells.length > 0 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 14 }}>
            {cells.map(cell => (
              <div key={`${cell.r}-${cell.c}-${cell.id || ''}`} style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8,
                padding: '8px 10px', borderRadius: 10,
                background: T.panel, border: `1px solid ${T.borderSoft}`,
              }}>
                <div style={{ minWidth: 0 }}>
                  {cell.varietyName && (
                    <span style={{
                      display: 'inline-flex', padding: '3px 7px', borderRadius: 999,
                      background: T.cedarWash, color: T.soil,
                      fontFamily: T.fontSans, fontSize: 11, fontWeight: 700,
                    }}>{cell.displayName || c.name} · {cell.varietyName}</span>
                  )}
                  <div style={{ marginTop: 3, fontFamily: T.fontMono, fontSize: 9, color: T.textMuted }}>
                    {cell.bedLocation || cell.label || `Row ${cell.r + 1}`}
                    {cell.placementNote ? ' · Garden OS placed' : ''}
                  </div>
                </div>
                <StatusBadge status={cell.status}/>
              </div>
            ))}
          </div>
        )}

        <div style={{
          background: T.sunPale, borderLeft: `3px solid ${T.sun}`,
          padding: '10px 14px', borderRadius: '0 8px 8px 0',
        }}>
          <Label size={9} color={T.rustLight} style={{ fontWeight: 600 }}>NEXT MOVE</Label>
          <div style={{
            marginTop: 2, fontFamily: T.fontSerif, fontSize: 14,
            color: T.text, lineHeight: 1.35, fontStyle: 'italic',
          }}>{nextMoveFor(c, stage, today)}</div>
        </div>

        <a href={doctorHref} style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          marginTop: 10, minHeight: 38, padding: '8px 12px', borderRadius: 10,
          background: T.panel, border: `1px solid ${T.borderSoft}`,
          color: T.leaf, textDecoration: 'none',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 700,
        }}>Ask Doctor</a>

        {/* Mark-done flow (build-order item #4) */}
        {showHarvestForm ? (
          <div style={{
            marginTop: 14, padding: '12px 14px', background: T.panel,
            border: `1px solid ${T.borderSoft}`, borderRadius: 10,
          }}>
            <Label size={9} color={T.leafBright}>HARVEST</Label>
            <div style={{ fontFamily: T.fontDisp, fontSize: 16, fontWeight: 600, marginTop: 2 }}>
              How much did you harvest?
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
              <input type="number" value={qty} onChange={e => setQty(e.target.value)}
                placeholder="0"
                style={{ flex: 1, minHeight: 44, padding: '8px 10px', borderRadius: 8,
                  border: `1px solid ${T.borderSoft}`, background: T.cream,
                  fontFamily: T.fontSans, fontSize: 14, boxSizing: 'border-box' }}
                aria-label="Quantity"/>
              <select value={unit} onChange={e => setUnit(e.target.value)}
                style={{ minHeight: 44, padding: '8px 10px', borderRadius: 8,
                  border: `1px solid ${T.borderSoft}`, background: T.cream,
                  fontFamily: T.fontSans, fontSize: 14 }}
                aria-label="Unit">
                <option value="">unit (optional)</option>
                <option value="lbs">lbs</option>
                <option value="oz">oz</option>
                <option value="pieces">pieces</option>
                <option value="bunches">bunches</option>
              </select>
            </div>
            <input type="text" value={notes} onChange={e => setNotes(e.target.value)}
              placeholder="Any notes? (optional)"
              style={{ marginTop: 8, width: '100%', minHeight: 44, padding: '8px 10px', borderRadius: 8,
                border: `1px solid ${T.borderSoft}`, background: T.cream,
                fontFamily: T.fontSans, fontSize: 14, boxSizing: 'border-box' }}
              aria-label="Notes"/>
            <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
              <ActionBtn primary onClick={submitHarvest}>Save harvest</ActionBtn>
              <ActionBtn onClick={skipHarvestQty}>Skip quantity</ActionBtn>
            </div>
          </div>
        ) : doneEvent ? (
          <div style={{
            marginTop: 14, padding: '12px 14px', background: T.leafPale + '55',
            border: `1px solid ${T.leafPale}`, borderRadius: 10,
            display: 'flex', alignItems: 'center', gap: 10,
          }}>
            <span style={{
              width: 28, height: 28, borderRadius: '50%', background: T.leafBright, color: '#fff',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
            }}>{Icons.check(16, '#fff')}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: T.fontSans, fontSize: 13, fontWeight: 500, color: T.text }}>
                Marked {doneEvent.type === 'harvest' ? 'harvested' : 'done'} {formatEventDate(doneEvent.timestamp)}.
              </div>
              {doneEvent.type === 'harvest' && (doneEvent.quantity || doneEvent.notes) && (
                <Label size={9} color={T.textSoft} style={{ display: 'block', marginTop: 2 }}>
                  {doneEvent.quantity != null ? `${doneEvent.quantity}${doneEvent.unit ? ' ' + doneEvent.unit : ''}` : ''}
                  {doneEvent.quantity != null && doneEvent.notes ? ' · ' : ''}
                  {doneEvent.notes || ''}
                </Label>
              )}
            </div>
            {!isPreview && (
              <ActionBtn onClick={() => { onUndoDone(cropKey); onClose(); }}>Undo</ActionBtn>
            )}
          </div>
        ) : isPreview ? (
          // Preview mode: the user has scrubbed the season position. Care
          // actions write wall-clock-now timestamps regardless of the scrub,
          // which would silently corrupt the garden log. Show a notice
          // instead and hide the action buttons.
          <div role="status" style={{
            marginTop: 14, padding: '12px 14px', background: T.sunPale,
            border: `1px solid ${T.sunBright}`, borderRadius: 10,
            display: 'flex', alignItems: 'flex-start', gap: 10,
          }}>
            <div style={{
              width: 22, height: 22, borderRadius: '50%', background: T.sun,
              color: '#fff', display: 'inline-flex',
              alignItems: 'center', justifyContent: 'center',
              fontFamily: T.fontDisp, fontSize: 13, fontWeight: 700, flexShrink: 0,
            }}>i</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontFamily: T.fontSans, fontSize: 13, fontWeight: 500, color: T.text, lineHeight: 1.35 }}>
                Previewing W{today} ({weekOffset > 0 ? '+' : ''}{weekOffset}w from today).
              </div>
              <Label size={9} color={T.textSoft} style={{ display: 'block', marginTop: 3 }}>
                Reset Season position in Tweaks to log care actions.
              </Label>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', gap: 8, marginTop: 14, flexWrap: 'wrap' }}>
            <ActionBtn primary onClick={() => { onMarkDone(cropKey); onClose(); }}>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                {Icons.check(13, '#fff')} Done today
              </span>
            </ActionBtn>
            <ActionBtn onClick={() => setShowHarvestForm(true)}>
              Harvested — log yield
            </ActionBtn>
            {inBed && !isFixture && (
              <ActionBtn onClick={onRemove}>Remove (in Beds)</ActionBtn>
            )}
          </div>
        )}

        {/* Per-cell garden log strip — only render for real beds with more
            than one cell of this crop, where precise per-cell logging is
            actually useful. Single-cell crops collapse to the crop-level
            controls above. */}
        {!isFixture && cells.length > 1 && onMarkCellDone && (
          <PerCellLogStrip
            cells={cells} cropKey={cropKey} events={events} season={season}
            isPreview={isPreview}
            onMarkCellDone={onMarkCellDone}
            onHarvestCell={onHarvestCell}
            onUndoCellDone={onUndoCellDone}/>
        )}

        {gosBed && Array.isArray(gosBed.events) && gosBed.events.some(e => e && e.cropSnapshot && e.cropSnapshot.cropId === cropKey) && (
          <div style={{
            marginTop: 10, fontFamily: T.fontMono, fontSize: 9,
            color: T.textMuted, letterSpacing: 0.1,
          }}>
            HISTORY · {gosBed.events.filter(e => e && e.cropSnapshot && e.cropSnapshot.cropId === cropKey).length} EVENT{gosBed.events.filter(e => e && e.cropSnapshot && e.cropSnapshot.cropId === cropKey).length === 1 ? '' : 'S'}
          </div>
        )}
      </div>
    </>
  );
}

// Per-cell garden log strip. Each chip shows the cell coord and its current
// state for this season (unmarked / mark_done / harvest). Tapping toggles
// mark_done for that cell. Long-tap (or shift-click on desktop) opens the
// harvest form on that cell — kept simple here: tap=done, alt-tap=harvest.
function PerCellLogStrip({ cells, cropKey, events, season, isPreview,
                          onMarkCellDone, onHarvestCell, onUndoCellDone }) {
  // Order cells row-major (top-left first).
  const ordered = cells.slice().sort((a, b) => a.r === b.r ? a.c - b.c : a.r - b.r);
  return (
    <div style={{
      marginTop: 14, padding: '10px 12px',
      background: T.panel, border: `1px solid ${T.borderSoft}`, borderRadius: 10,
    }}>
      <div style={{
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
        marginBottom: 6,
      }}>
        <Label size={9} color={T.textSoft}>PER-CELL LOG · {ordered.length} CELLS</Label>
        <Label size={8} color={T.textMuted} style={{ fontStyle: 'italic' }}>
          tap = done · alt-tap = harvest
        </Label>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {ordered.map(c => {
          const cellStr = 'r' + c.r + 'c' + c.c;
          const ev = findDoneEventForCell(events, cellStr, season);
          const state = ev ? ev.type : null; // 'mark_done' | 'harvest' | null
          const bg = state === 'harvest' ? T.sunBright
                   : state === 'mark_done' ? T.leafBright
                   : T.cedarWash;
          const fg = state ? '#fff' : T.text;
          const handleClick = (e) => {
            if (isPreview) return;
            if (e && (e.altKey || e.shiftKey || e.metaKey)) {
              if (state) {
                onUndoCellDone(cellStr);
              } else {
                onHarvestCell(cropKey, cellStr, {});
              }
              return;
            }
            if (state) onUndoCellDone(cellStr);
            else onMarkCellDone(cropKey, cellStr);
          };
          return (
            <button key={cellStr} onClick={handleClick}
              disabled={isPreview}
              aria-label={`${cellStr} ${state ? state.replace('_', ' ') + ' (tap to undo)' : 'unmarked (tap to mark done)'}`}
              style={{
                padding: '4px 8px', borderRadius: 6,
                border: `1px solid ${state ? bg : T.borderSoft}`,
                background: bg, color: fg,
                cursor: isPreview ? 'not-allowed' : 'pointer',
                fontFamily: T.fontMono, fontSize: 10, fontWeight: 600,
                letterSpacing: 0.05,
                opacity: isPreview ? 0.55 : 1,
                display: 'inline-flex', alignItems: 'center', gap: 4,
                minHeight: 28,
              }}>
              <span>{cellStr}</span>
              {state === 'mark_done' && Icons.check(9, '#fff')}
              {state === 'harvest' && (
                <span aria-hidden="true" style={{
                  fontFamily: T.fontMono, fontSize: 9, fontWeight: 700,
                  letterSpacing: 0,
                }}>H</span>
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function ActionBtn({ children, onClick, primary }) {
  return (
    <button onClick={onClick} style={{
      flex: '1 1 auto', minWidth: 120, padding: '10px 14px',
      borderRadius: 8, cursor: 'pointer',
      fontFamily: T.fontSans, fontSize: 13, fontWeight: 500,
      background: primary ? T.leaf : 'transparent',
      color: primary ? '#fff' : T.textMid,
      border: `1px solid ${primary ? T.leaf : T.borderSoft}`,
    }}>{children}</button>
  );
}

// ── Add-crop sheet ──────────────────────────────────────────────────────────
function AddCropSheet({ bed, today, onAdd, onClose }) {
  const open = firstOpenCell(bed);
  const order = Object.keys(CROPS).sort((a, b) => {
    const fa = CROPS[a].family, fb = CROPS[b].family;
    if (fa !== fb) return fa.localeCompare(fb);
    return CROPS[a].name.localeCompare(CROPS[b].name);
  });
  return (
    <>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.55)', zIndex: 40,
      }}/>
      <div role="dialog" aria-modal="true" aria-label="Add crop to bed" style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 41,
        background: T.cream, borderRadius: '20px 20px 0 0',
        padding: '10px 20px 24px', maxHeight: '78%',
        boxShadow: '0 -8px 40px rgba(44,27,11,0.3)',
        display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ width: 40, height: 4, background: T.border, borderRadius: 2, margin: '0 auto 12px' }}/>
        <Disp size={20}>Add a crop</Disp>
        <div style={{ marginTop: 4, marginBottom: 12 }}>
          <Label size={10} color={T.textMuted}>
            {open
              ? `Lands at row ${open.r + 1}, col ${open.c + 1} · sown W${today}`
              : 'Bed is full — remove a crop first.'}
          </Label>
        </div>
        <div style={{ overflowY: 'auto', flex: 1, marginRight: -4, paddingRight: 4 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {order.map(k => {
              const cr = CROPS[k];
              return (
                <button key={k}
                  disabled={!open}
                  onClick={() => { onAdd(k); onClose(); }}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 10,
                    padding: '10px 12px', borderRadius: 10,
                    background: T.panel,
                    border: `1px solid ${T.borderSoft}`,
                    opacity: open ? 1 : 0.45,
                    cursor: open ? 'pointer' : 'not-allowed',
                    textAlign: 'left',
                  }}>
                  <CropChip crop={k} size={28}/>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontFamily: T.fontSans, fontSize: 13, fontWeight: 500, color: T.text }}>{cr.name}</div>
                    <Label size={8} color={T.textMuted}>{cr.family.toUpperCase()}</Label>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </>
  );
}

// ── Main planner composition ────────────────────────────────────────────────
function Planner({ tweak, bed, events, gosBed, allBeds, isFixture, season,
                  onOpenTweaks, onAdd, onRecord, onRemove,
                  onPickBed,
                  onMarkDone, onHarvest, onUndoDone,
                  onMarkCellDone, onHarvestCell, onUndoCellDone }) {
  const density = tweak.density || 'comfortable';
  const showEnded = tweak.showEnded !== false;
  const weekOffset = tweak.weekOffset || 0;
  const today = WEEK_NOW + weekOffset;
  const [picked, setPicked] = React.useState(null);
  const [addOpen, setAddOpen] = React.useState(false);
  const [fixtureBannerDismissed, setFixtureBannerDismissed] = React.useState(false);

  const wStart = 8, wEnd = 44;
  const weekCount = wEnd - wStart + 1;
  const timelineH = density === 'compact' ? 440 : 520;
  const pxPerWeek = timelineH / weekCount;

  // Source the timeline crop list from what's actually planted in the bed.
  // Fixture mode falls back to the full catalog so the demo stays alive.
  const cropsInBed = React.useMemo(() => {
    const seen = new Set();
    bed.forEach(c => { if (c && c.crop) seen.add(c.crop); });
    return Array.from(seen);
  }, [bed]);

  const sourceCrops = isFixture ? Object.keys(CROPS) : cropsInBed;
  const crops = sourceCrops
    .filter(k => CROPS[k]) // skip unknown ids
    .filter(k => showEnded || CROPS[k].harvestEnd >= today)
    .sort((a, b) => {
      const fa = CROPS[a].family, fb = CROPS[b].family;
      if (fa !== fb) return fa.localeCompare(fb);
      return CROPS[a].sowWeek - CROPS[b].sowWeek;
    });
  const families = [...new Set(crops.map(k => CROPS[k].family))];
  const thisWeek = CALENDAR.find(w => w.week === today) || CALENDAR[0];

  // Map of cropId → array of actual planting ISO weeks pulled from the bed.
  // Cells flagged isScheduled (i.e. catalog fallback, no real plantedAt on
  // disk) are excluded so the markers only render genuine gardener data.
  const cropToActualWeeks = React.useMemo(() => {
    const map = {};
    bed.forEach(c => {
      if (!c || !c.crop || c.isScheduled) return;
      if (typeof c.plantedWeek !== 'number') return;
      if (!map[c.crop]) map[c.crop] = [];
      map[c.crop].push(c.plantedWeek);
    });
    return map;
  }, [bed]);

  // Set of crop ids that have a mark_done or harvest event this season.
  const doneCrops = React.useMemo(() => {
    const set = new Set();
    if (!Array.isArray(events)) return set;
    events.forEach(e => {
      if (!e || e.season !== season) return;
      if (DONE_TYPES.indexOf(e.type) < 0) return;
      if (e.cropSnapshot && e.cropSnapshot.cropId) set.add(e.cropSnapshot.cropId);
    });
    return set;
  }, [events, season]);

  const isBedEmpty = !isFixture && cropsInBed.length === 0;
  const showFixtureBanner = isFixture && !fixtureBannerDismissed;

  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
      display: 'flex', flexDirection: 'column', position: 'relative',
    }}>
      <FakeStatusBar/>

      {showFixtureBanner && (
        <div role="status" style={{
          margin: '0 14px 6px', padding: '8px 12px', borderRadius: 10,
          background: T.sunPale, border: `1px solid ${T.sunBright}`,
          display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0,
        }}>
          <span style={{
            fontFamily: T.fontSans, fontSize: 12, color: T.text, lineHeight: 1.4, flex: 1,
          }}>
            Showing example data. <a href="garden-painting.html" style={{ color: T.leaf, fontWeight: 600 }}>Set up your bed in Beds</a> to see your real plan.
          </span>
          <button aria-label="Dismiss banner" onClick={() => setFixtureBannerDismissed(true)} style={{
            width: 28, height: 28, minWidth: 28, minHeight: 28, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            color: T.textSoft, fontSize: 18, lineHeight: 1, flexShrink: 0,
          }}>×</button>
        </div>
      )}

      <header style={{
        padding: '2px 20px 10px', flexShrink: 0,
        display: 'flex', alignItems: 'baseline', justifyContent: 'space-between',
      }}>
        <div>
          <div style={{
            fontFamily: T.fontDisp, fontSize: 28, fontWeight: 600,
            letterSpacing: -0.5, lineHeight: 1,
          }}>
            {gosBed && gosBed.name
              ? <span>{gosBed.name}<span style={{ color: T.leaf, fontStyle: 'italic', fontWeight: 500 }}> / </span></span>
              : <span>Season<span style={{ color: T.leaf, fontStyle: 'italic', fontWeight: 500 }}> / </span></span>}
            <span style={{ fontWeight: 400, color: T.textMid, fontSize: 22 }}>W{today}</span>
          </div>
          <div style={{ marginTop: 3, display: 'flex', gap: 8 }}>
            <Label size={10} color={T.textSoft}>{SEASON.today.toUpperCase()}</Label>
            <Label size={10} color={T.textMuted}>·</Label>
            <Label size={10} color={T.textSoft}>ZONE {SEASON.zone}</Label>
            <Label size={10} color={T.textMuted}>·</Label>
            <Label size={10} color={T.textSoft}>DAY {SEASON.dayOfSeason}</Label>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button aria-label="Tweaks" onClick={onOpenTweaks} style={{
            width: 32, height: 32, borderRadius: 8,
            background: T.panel, border: `1px solid ${T.borderSoft}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', padding: 0,
          }}>{Icons.gear(14, T.soil)}</button>
          <button aria-label="Add crop" onClick={() => setAddOpen(true)} style={{
            width: 32, height: 32, borderRadius: 8,
            background: T.panel, border: `1px solid ${T.borderSoft}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', padding: 0,
          }}>{Icons.plus(14, T.soil)}</button>
        </div>
      </header>

      <BedPicker beds={allBeds} activeId={gosBed && gosBed.id} onPick={onPickBed}/>

      <ThisWeekStrip thisWeek={thisWeek}/>

      {isBedEmpty && (
        <div role="status" style={{
          margin: '8px 14px 0', padding: '10px 12px', borderRadius: 10,
          background: T.cedarWash, border: `1px dashed ${T.cedar}`,
          display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0,
        }}>
          <span style={{ fontFamily: T.fontSans, fontSize: 12, color: T.text, lineHeight: 1.45, flex: 1 }}>
            Your bed has no crops yet.
          </span>
          <a href="garden-painting.html" style={{
            padding: '8px 12px', borderRadius: 999, minHeight: 36,
            display: 'inline-flex', alignItems: 'center',
            background: T.leafBright, color: '#fff', textDecoration: 'none',
            fontFamily: T.fontSans, fontSize: 12, fontWeight: 600,
          }}>Open Beds →</a>
        </div>
      )}

      <section style={{
        flex: 1, margin: '10px 14px 0', background: T.panel,
        borderRadius: 14, border: `1px solid ${T.borderSoft}`,
        overflow: 'hidden', display: 'flex', flexDirection: 'column',
        boxShadow: '0 1px 3px rgba(44,27,11,0.06)',
      }}>
        <div style={{
          padding: '10px 14px 8px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          borderBottom: `1px solid ${T.borderSoft}`,
        }}>
          <Label size={10} color={T.soilMid}>THE SEASON · MAR → OCT</Label>
          <div style={{ display: 'flex', gap: 10 }}>
            <KeyDot label="SOW"  color={T.leafPale} border={T.leaf}/>
            <KeyDot label="GROW" color={T.sunPale}  border={T.sun}/>
            <KeyDot label="PICK" color={T.rust}     border={T.rust} solid/>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
          <div style={{ position: 'relative', padding: '10px 4px 14px', display: 'flex', alignItems: 'stretch' }}>
            <TimeAxis wStart={wStart} wEnd={wEnd} pxPerWeek={pxPerWeek} today={today} timelineH={timelineH}/>
            <div style={{ flex: 1, position: 'relative', marginLeft: 4 }}>
              <TodayLine today={today} wStart={wStart} pxPerWeek={pxPerWeek}/>
              <div style={{ display: 'flex', gap: 2, height: timelineH + 22 }}>
                {families.map(fam => {
                  const cropsInFam = crops.filter(k => CROPS[k].family === fam);
                  return (
                    <div key={fam} style={{ display: 'flex', flexDirection: 'column', flex: cropsInFam.length, minWidth: cropsInFam.length * 22 }}>
                      <div style={{
                        height: 22, display: 'flex', alignItems: 'center',
                        justifyContent: 'center', borderBottom: `1px solid ${T.borderSoft}`,
                        background: T.cedarWash,
                      }}>
                        <Label size={8} color={T.soilMid} style={{ fontWeight: 600 }}>
                          {fam.toUpperCase()}
                        </Label>
                      </div>
                      <div style={{ flex: 1, display: 'flex', gap: 0 }}>
                        {cropsInFam.map(k => (
                          <CropLane key={k} cropKey={k} today={today}
                            wStart={wStart} pxPerWeek={pxPerWeek}
                            onPick={() => setPicked(k)}
                            actualPlantedWeeks={cropToActualWeeks[k] || []}
                            dim={CROPS[k].harvestEnd < today}
                            done={doneCrops.has(k)}/>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </section>

      <InGroundStrip bed={bed} gosBed={gosBed} onPickCrop={setPicked}/>
      <TabBar active="planner"/>

      {picked && (
        <CropSheet cropKey={picked} today={today} bed={bed} events={events}
          season={season} gosBed={gosBed} isFixture={isFixture}
          isPreview={weekOffset !== 0} weekOffset={weekOffset}
          onMarkDone={onMarkDone}
          onHarvest={onHarvest}
          onUndoDone={onUndoDone}
          onMarkCellDone={onMarkCellDone}
          onHarvestCell={onHarvestCell}
          onUndoCellDone={onUndoCellDone}
          onRemove={onRemove}
          onClose={() => setPicked(null)}/>
      )}
      {addOpen && (
        <AddCropSheet bed={bed} today={today}
          onAdd={(k) => onAdd(k, today)}
          onClose={() => setAddOpen(false)}/>
      )}
    </div>
  );
}

// ── Tweaks panel ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { density: 'comfortable', showEnded: true, weekOffset: 0 };
const TWEAK_STORAGE_KEY = 'gos.planner-v5.tweaks';

function loadTweaks() {
  try {
    const raw = window.localStorage.getItem(TWEAK_STORAGE_KEY);
    if (!raw) return TWEAK_DEFAULTS;
    return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
  } catch (_) {
    return TWEAK_DEFAULTS;
  }
}
function saveTweaks(t) {
  try { window.localStorage.setItem(TWEAK_STORAGE_KEY, JSON.stringify(t)); } catch (_) {}
}

function Seg({ value, opts, onChange }) {
  return (
    <div style={{ display: 'flex', background: T.cedarWash, borderRadius: 6, padding: 2, gap: 2 }}>
      {opts.map(([val, lab]) => (
        <button key={val} onClick={() => onChange(val)} style={{
          flex: 1, padding: '5px 8px', borderRadius: 4, border: 'none',
          background: value === val ? T.panel : 'transparent',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 500,
          color: value === val ? T.text : T.textSoft,
          boxShadow: value === val ? '0 1px 2px rgba(44,27,11,0.1)' : 'none',
          cursor: 'pointer',
        }}>{lab}</button>
      ))}
    </div>
  );
}

function TweakRow({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <Label size={9} color={T.textSoft} style={{ display: 'block', marginBottom: 5, fontWeight: 500 }}>
        {label}
      </Label>
      {children}
    </div>
  );
}

function TweaksPanel({ tweak, setTweak, onClose }) {
  const setKey = (k, v) => {
    const next = { ...tweak, [k]: v };
    setTweak(next);
    saveTweaks(next);
  };
  return (
    <>
      <div onClick={onClose} style={{
        position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.42)', zIndex: 50,
      }}/>
      <div role="dialog" aria-modal="true" aria-label="Tweaks" style={{
        position: 'absolute', top: 60, right: 12, zIndex: 51,
        width: 264, maxWidth: 'calc(100% - 24px)',
        background: T.panel, borderRadius: 12,
        border: `1px solid ${T.border}`,
        boxShadow: '0 16px 48px rgba(44,27,11,0.28), 0 2px 6px rgba(44,27,11,0.12)',
        padding: '14px 16px 16px',
      }}>
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          marginBottom: 12,
        }}>
          <Disp size={17}>Tweaks</Disp>
          <button onClick={onClose} aria-label="Close tweaks" style={{
            width: 24, height: 24, borderRadius: 6, padding: 0,
            background: 'transparent', border: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: T.textSoft,
          }}>{Icons.close(12, T.textSoft)}</button>
        </div>
        <TweakRow label="Density">
          <Seg value={tweak.density}
            opts={[['comfortable', 'Comfortable'], ['compact', 'Compact']]}
            onChange={v => setKey('density', v)}/>
        </TweakRow>
        <TweakRow label="Finished crops">
          <Seg value={tweak.showEnded ? 'true' : 'false'}
            opts={[['true', 'Show'], ['false', 'Hide']]}
            onChange={v => setKey('showEnded', v === 'true')}/>
        </TweakRow>
        <TweakRow label="Season position">
          <input type="range" min="-10" max="20" step="1" value={tweak.weekOffset}
            onChange={e => setKey('weekOffset', +e.target.value)}
            style={{ width: '100%', accentColor: T.leaf }}
            aria-label="Season position offset in weeks"/>
          <div style={{
            fontFamily: T.fontMono, fontSize: 9, color: T.textSoft,
            letterSpacing: 0.1, marginTop: 4,
          }}>
            {tweak.weekOffset === 0
              ? `Today · W${WEEK_NOW}`
              : `W${WEEK_NOW + tweak.weekOffset} · ${tweak.weekOffset > 0 ? '+' : ''}${tweak.weekOffset}w`}
          </div>
        </TweakRow>
        <button onClick={() => { setTweak(TWEAK_DEFAULTS); saveTweaks(TWEAK_DEFAULTS); }} style={{
          width: '100%', padding: '6px 10px',
          background: 'transparent', border: `1px solid ${T.borderSoft}`,
          borderRadius: 6, cursor: 'pointer',
          fontFamily: T.fontMono, fontSize: 9,
          letterSpacing: 0.15, textTransform: 'uppercase',
          color: T.textSoft, fontWeight: 500,
        }}>Reset to defaults</button>
      </div>
    </>
  );
}

// ── Root ────────────────────────────────────────────────────────────────────
function App() {
  const [tweak, setTweak] = React.useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [active, setActive] = React.useState(loadActiveContext);
  const refresh = React.useCallback(() => setActive(loadActiveContext()), []);

  // Refresh when a bed is created or switched (item #1/#2 dispatch path).
  React.useEffect(() => {
    const handler = () => refresh();
    window.addEventListener('gosBedChanged', handler);
    return () => window.removeEventListener('gosBedChanged', handler);
  }, [refresh]);

  const { bed, events, gosBed, allBeds, isFixture } = active;

  // Bed-content edits live in the Painting screen now. Both the fixture and
  // the real-bed paths route the user there to keep one canonical writer.
  const goToPainting = () => {
    try { window.location.href = 'garden-painting.html'; } catch (_) {}
  };

  const handleMarkDone = (cropKey) => {
    if (!gosBed) { goToPainting(); return; }
    const cellStr = firstCellForCrop(gosBed, cropKey);
    const ev = makeDoneEvent('mark_done', gosBed, cropKey, cellStr);
    const res = appendEventToActiveBed(ev);
    if (!res.ok) { alert(CONCURRENT_WRITE_MSG); return; }
    refresh();
  };

  const handleHarvest = (cropKey, opts) => {
    if (!gosBed) { goToPainting(); return; }
    const cellStr = firstCellForCrop(gosBed, cropKey);
    const ev = makeDoneEvent('harvest', gosBed, cropKey, cellStr, opts || {});
    const res = appendEventToActiveBed(ev);
    if (!res.ok) { alert(CONCURRENT_WRITE_MSG); return; }
    refresh();
  };

  const handleUndoDone = (cropKey) => {
    if (!gosBed) return;
    const res = removeMostRecentDoneEvent(cropKey, SEASON_YEAR);
    if (!res.ok) { alert(CONCURRENT_WRITE_MSG); return; }
    refresh();
  };

  // Per-cell variants — writes/removes events targeting a specific cell so
  // the gardener can log "this row of lettuce is done" without claiming the
  // whole crop is finished.
  const handleMarkCellDone = (cropKey, cellStr) => {
    if (!gosBed || !cellStr) { goToPainting(); return; }
    const ev = makeDoneEvent('mark_done', gosBed, cropKey, cellStr);
    const res = appendEventToActiveBed(ev);
    if (!res.ok) { alert(CONCURRENT_WRITE_MSG); return; }
    refresh();
  };
  const handleHarvestCell = (cropKey, cellStr, opts) => {
    if (!gosBed || !cellStr) { goToPainting(); return; }
    const ev = makeDoneEvent('harvest', gosBed, cropKey, cellStr, opts || {});
    const res = appendEventToActiveBed(ev);
    if (!res.ok) { alert(CONCURRENT_WRITE_MSG); return; }
    refresh();
  };
  const handleUndoCellDone = (cellStr) => {
    if (!gosBed || !cellStr) return;
    const res = removeMostRecentDoneEventForCell(cellStr, SEASON_YEAR);
    if (!res.ok) { alert(CONCURRENT_WRITE_MSG); return; }
    refresh();
  };
  const handlePickBed = (id) => {
    if (typeof GosBed === 'undefined') return;
    GosBed.setActive(id);
    refresh();
  };

  return (
    <PhoneFrame>
      <Planner
        tweak={tweak}
        bed={bed} events={events} gosBed={gosBed} allBeds={allBeds} isFixture={isFixture}
        season={SEASON_YEAR}
        onOpenTweaks={() => setTweaksOpen(true)}
        onPickBed={handlePickBed}
        onAdd={goToPainting}
        onRemove={goToPainting}
        onRecord={(cropKey, type) => {
          // Legacy bridge: callers still passing 'harvested' get routed to
          // mark_done so the new schema is the only writer.
          if (type === 'harvested') handleHarvest(cropKey, {});
          else handleMarkDone(cropKey);
        }}
        onMarkDone={handleMarkDone}
        onHarvest={handleHarvest}
        onUndoDone={handleUndoDone}
        onMarkCellDone={handleMarkCellDone}
        onHarvestCell={handleHarvestCell}
        onUndoCellDone={handleUndoCellDone}/>
      {tweaksOpen && <TweaksPanel tweak={tweak} setTweak={setTweak} onClose={() => setTweaksOpen(false)}/>}
    </PhoneFrame>
  );
}

// gos-bed.js wiring: report active bed for verification (no rendering change)
if (typeof GosBed !== 'undefined') {
  const _activeBed = GosBed.getActive();
  if (_activeBed) {
    console.log('Active bed loaded: ' + _activeBed.name);
  } else {
    console.log('No bed found — using fixture data');
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
