  const yearEnd=yearStart+3;
  const yearHist2=hist.filter(en=>en.chapter>=yearStart&&en.chapter<yearEnd);

  if(yearHist2.length){
    card.appendChild(h('h3',null,'Year '+meta.year+' Scorecard'));
    const scoreGrid=h('div','');scoreGrid.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px';
    for(const en of yearHist2){
      const chMeta3=CHAPTERS[en.chapter];
      const sc=h('div','journal-card');
      sc.style.cssText='padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--cream-dark)';
      sc.appendChild(h('div','jc-title',(chMeta3?chMeta3.name:en.season)+' ('+en.season+')'));
      const scoreRow=h('div','');scoreRow.style.cssText='display:flex;justify-content:space-between;align-items:baseline;margin-top:4px';
      const gradeEl=h('span','');gradeEl.style.cssText='font-family:var(--ff-heading);font-size:1.4rem;font-weight:800;color:'+(en.grade==='A+'||en.grade==='A'?'var(--leaf-bright)':en.grade==='B'?'var(--sun)':'var(--danger)');
      gradeEl.textContent=en.grade;
      scoreRow.appendChild(gradeEl);
      scoreRow.appendChild(h('span','',en.finalScore.toFixed(1)+' pts'));
      sc.appendChild(scoreRow);
      if(CAM.journal[en.chapter]&&CAM.journal[en.chapter].narratorHighlight){
        const q=h('div','jc-moment','"'+CAM.journal[en.chapter].narratorHighlight+'"');
        q.style.cssText='margin-top:6px;font-size:0.72rem;font-style:italic;color:var(--text-muted)';
        sc.appendChild(q);
      }
      scoreGrid.appendChild(sc);
    }
    card.appendChild(scoreGrid);

    // Year average
    const yearAvg2=yearHist2.reduce((a,e)=>a+e.finalScore,0)/yearHist2.length;
    const avgRow=h('div','');avgRow.style.cssText='display:flex;justify-content:space-between;padding:8px 12px;background:var(--surface);border-radius:8px;border:1px solid var(--border);margin-bottom:16px;font-family:var(--ff-mono);font-size:0.75rem';
    avgRow.appendChild(h('span','','Year '+meta.year+' Average'));
    const avgVal=h('span','');avgVal.style.cssText='font-weight:800;font-size:1rem;color:'+(yearAvg2>=70?'var(--leaf-bright)':yearAvg2>=50?'var(--sun)':'var(--danger)');
    avgVal.textContent=yearAvg2.toFixed(1);
    avgRow.appendChild(avgVal);
    card.appendChild(avgRow);
  }

  // ── SOIL FATIGUE MAP ──
  const cf=S.carryForward||mkCF();
  const hasFatigue=Object.values(cf.soilFatigueMap).some(v=>v<-0.05);
  const hasInfra=Object.keys(cf.infrastructureMap).length>0;

  if(hasFatigue||hasInfra){
    card.appendChild(h('h3',null,'Soil & Infrastructure \u2192 Next Season'));
    const soilNote=h('div','');soilNote.style.cssText='font-size:0.75rem;color:var(--text-muted);margin-bottom:8px;line-height:1.5';
    soilNote.textContent='These effects carry into next season. Fatigued cells need crop rotation. Enriched cells are primed for high-value crops.';
    card.appendChild(soilNote);

    // Mini grid showing carry-forward state
    const miniGrid=h('div','');miniGrid.style.cssText='display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-bottom:12px';
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const k=r+','+c;
        const cell=h('div','');cell.style.cssText='aspect-ratio:1;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-family:var(--ff-mono);cursor:help';
        const fatigue=cf.soilFatigueMap[k]||0;
        const infra=cf.infrastructureMap[k]||[];
        if(fatigue<-0.05){
          cell.style.background='rgba(180,60,60,0.15)';
          cell.style.borderColor='rgba(180,60,60,0.3)';
          cell.textContent='\u26A0';
          cell.title='Soil fatigue: '+fatigue.toFixed(1)+'. Plant a different crop family here next season to recover.';
        }else if(infra.includes('mulched')){
          cell.style.background='rgba(93,171,107,0.15)';
          cell.style.borderColor='rgba(93,171,107,0.3)';
          cell.textContent='+';
          cell.title='Mulched: +0.25 bonus next season';
        }else if(infra.includes('enriched')){
          cell.style.background='rgba(232,200,74,0.15)';
          cell.style.borderColor='rgba(232,200,74,0.3)';
          cell.textContent='\u2728';
          cell.title='Enriched: +0.3 bonus next season. Plant high-value crops here.';
        }else if(infra.includes('compacted')){
          cell.style.background='rgba(140,100,60,0.15)';
          cell.style.borderColor='rgba(140,100,60,0.3)';
          cell.textContent='\u2013';
          cell.title='Compacted: -0.5 penalty next season';
        }else{
          cell.style.background='var(--cream-dark)';
          cell.textContent='\u00B7';
          cell.title='Row '+r+', Col '+c+' \u2014 no carry-forward effect';
        }
        miniGrid.appendChild(cell);
      }
    }
    card.appendChild(miniGrid);

    // Legend
    const legend=h('div','');legend.style.cssText='display:flex;gap:12px;flex-wrap:wrap;font-size:0.62rem;font-family:var(--ff-mono);color:var(--text-muted);margin-bottom:12px';
    [['rgba(180,60,60,0.15)','\u26A0 Fatigued \u2014 rotate crop'],['rgba(93,171,107,0.15)','+ Mulched (+0.25)'],['rgba(232,200,74,0.15)','\u2728 Enriched (+0.3)'],['rgba(140,100,60,0.15)','\u2013 Compacted (-0.5)']].forEach(([bg,label])=>{
      const item=h('span','');item.style.cssText='display:flex;align-items:center;gap:4px';
      const swatch=h('span','');swatch.style.cssText='width:10px;height:10px;border-radius:2px;background:'+bg+';border:1px solid var(--border)';
      item.appendChild(swatch);item.appendChild(h('span','',label));legend.appendChild(item);
    });
    card.appendChild(legend);
  }

  // ── EVENT TIMELINE ──
  const yearCF=cf.seasonHistory||[];
  if(yearCF.length){
    card.appendChild(h('h3',null,'Event Timeline'));
    for(const sh of yearCF){
      if(sh.chapter<yearStart||sh.chapter>=yearEnd)continue;
      const chM=CHAPTERS[sh.chapter];
      if(!chM)continue;
      const eventIds=sh.eventsDrawn||[];
      if(!eventIds.length)continue;
      const evRow=h('div','');evRow.style.cssText='margin-bottom:8px';
      evRow.appendChild(h('div','',chM.name+' ('+sh.season+') \u2014 '+sh.interventionsUsed+' intervention'+(sh.interventionsUsed!==1?'s':'')));
      const evList=h('div','');evList.style.cssText='display:flex;gap:4px;flex-wrap:wrap;margin-top:4px';
      for(const eid of eventIds){
        const ev=ED.find(e=>e.id===eid);
        if(!ev)continue;
        const chip=h('span','');chip.style.cssText='font-size:0.6rem;font-family:var(--ff-mono);padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:'+(ev.valence==='positive'?'rgba(93,171,107,0.12)':ev.valence==='negative'?'rgba(180,60,60,0.12)':'rgba(140,140,140,0.12)');
        chip.textContent=(ev.valence==='positive'?'\u2600 ':ev.valence==='negative'?'\u26A0 ':'\u2022 ')+ev.title;
        chip.title=ev.description;
        evList.appendChild(chip);
      }
      evRow.appendChild(evList);
      card.appendChild(evRow);
    }
  }

  // ── PLANNING HINTS FOR NEXT SEASON ──
  if(ch<12){
    const nextCh=ch+1;
    const nextMeta=CHAPTERS[nextCh];
    if(nextMeta&&!isWinter(nextCh)){
      card.appendChild(h('h3',null,'Looking Ahead \u2192 '+nextMeta.name+' ('+nextMeta.season+')'));
      const hints=h('div','');hints.style.cssText='font-size:0.78rem;color:var(--text-muted);line-height:1.6;margin-bottom:8px';
      let hintText='';
      if(hasFatigue)hintText+='Rotate away from heavy feeders on fatigued cells. ';
      if(hasInfra&&Object.values(cf.infrastructureMap).some(f=>f.includes('enriched')))hintText+='Enriched cells are primed \u2014 put your best crops there. ';
      if(hasInfra&&Object.values(cf.infrastructureMap).some(f=>f.includes('compacted')))hintText+='Compacted cells will drag your score \u2014 consider light crops or leave them empty. ';
      if(nextMeta.mechanic)hintText+='New mechanic: '+nextMeta.mechanic+'. '+nextMeta.mechanicHint;
      if(!hintText)hintText='The soil is clean. Plant with confidence.';
      hints.textContent=hintText;
      card.appendChild(hints);
    }
  }

  // Recipe progress
  card.appendChild(h('h3',null,'Recipe Ladder'));
  const rl=h('div','recipe-ladder');
  for(const rid of RECIPE_LADDER){
    const rec=RECIPE_DISPLAY[rid];
    const complete=CAM.recipesCompleted.includes(rid);
    const rr=h('div','recipe-row'+(complete?' complete':' incomplete'));
    rr.appendChild(h('span','r-name',rec.name));
    rr.appendChild(h('span','r-status',complete?'\u2714 Complete':rec.ingredients.map(c=>C[c]?C[c].name:c).join(', ')));
    rl.appendChild(rr);
  }
  card.appendChild(rl);

  // Keepsakes
  card.appendChild(h('h3',null,'Keepsakes'));
  const kr=h('div','keepsake-row');
  for(const[kid,kdef]of Object.entries(KEEPSAKES)){
    const earned=CAM.keepsakes[kid];
    const ki=h('div','keepsake-item'+(earned?'':' empty'),earned?kdef.emoji:'?');
    const kl=h('div','kp-label',earned?kdef.name:'???');
    ki.appendChild(kl);
    ki.title=earned?kdef.desc:'Not yet earned';
    kr.appendChild(ki);
  }
  card.appendChild(kr);

  // Resolution
  const yearHist=hist.filter(en=>en.chapter>=(meta.year-1)*4+1&&en.chapter<meta.year*4);
  const yearAvg=yearHist.length?yearHist.reduce((a,e)=>a+e.finalScore,0)/yearHist.length:0;
  const passed=yearAvg>=50;

  const na2=h('div','narrator-area');
  na2.setAttribute('role','status');na2.setAttribute('aria-live','polite');
  na2.style.marginTop='10px';
  const gl=passed?meta.successGurl:meta.failGurl;
  const ol=passed?meta.successOnion:meta.failOnion;
  if(gl){
    const gs=h('div','narrator-slot visible');
    const gh=h('div','char-head');
    gh.appendChild(h('span','char-emoji','\u{1F33F}'));
    gh.appendChild(h('span','char-name','GURL'));
    gs.appendChild(gh);
    gs.appendChild(h('div','char-line',gl));
    na2.appendChild(gs);
  }
  if(ol){
    const os=h('div','narrator-slot visible');
    const oh=h('div','char-head');
    oh.appendChild(h('span','char-emoji','\u{1F9C5}'));
    oh.appendChild(h('span','char-name','Onion Man'));
    os.appendChild(oh);
    os.appendChild(h('div','char-line',ol));
    na2.appendChild(os);
  }
  card.appendChild(na2);

  if(meta.transition){
    const tr=h('div','ch-opening',meta.transition);
    tr.style.marginTop='10px';
    card.appendChild(tr);
  }

  const bb=h('div','btns');
  bb.style.marginTop='12px';
  const nb=h('button','btn primary','Continue');
  nb.onclick=()=>completeChapter();
  bb.appendChild(nb);
  card.appendChild(bb);
  f.appendChild(card);
  el.board.replaceChildren(f);
}

/* ===== CHAPTER 11 SAUCE HANDLING ===== */
function handleChapter11Harvest(){
  if(!S.harvestResult)return;
  const yieldSet=new Set(S.harvestResult.yieldList);
  const hasAll=SAUCE_CROPS.every(c=>yieldSet.has(c));

  if(hasAll){
    CAM.sauceComplete=true;
    CAM.keepsakes.sauce_card={earnedCh:11,timestamp:Date.now()};
    CAM.mode='sauce_sequence';
    if(DIALOGUE_DB.chapter_11_sauce_moment)setTimeout(()=>fireDialogue('chapter_11_sauce_moment'),500);
    saveCampaign();
    render();
  }else{
    // Show what's missing on the review screen
    CAM.mode='campaign';
    // Fire failure dialogue
    setTimeout(()=>{
      const missing=SAUCE_CROPS.filter(c=>!yieldSet.has(c));
      const missingNames=missing.map(c=>SAUCE_NAMES[c]).join(', ');
      queueNarratorLines([
        {character:'gurl',line:'Harvest inventory incomplete for target recipe. Missing: '+missingNames+'.'},
        {character:'onion',line:'We are close. We are missing '+missingNames+'. The recipe needs all of them and the bed gave us most of them. Most is not enough for sauce. Most is enough for next year.'}
      ]);
    },500);
    saveCampaign();
    render();
  }
}

/* ===== MASTERY RANK ===== */
function computeMasteryRank(){
  const hist=loadH();
  const avgScore=hist.length?hist.reduce((a,e)=>a+e.finalScore,0)/hist.length:0;
  const recipesCount=CAM.recipesCompleted.length;
  const chaptersComplete=CAM.completedChapters.length;

  if(recipesCount>=4&&avgScore>=70&&chaptersComplete>=12)return{level:6,title:'Legacy Keeper'};
  if(recipesCount>=3&&avgScore>=65)return{level:5,title:'Yield Steward'};
  if(recipesCount>=2&&avgScore>=60)return{level:4,title:'Season Planner'};
  if(avgScore>=55&&chaptersComplete>=8)return{level:3,title:'Trellis Tech'};
  if(avgScore>=50&&chaptersComplete>=7)return{level:2,title:'Rowkeeper'};
  if(chaptersComplete>=2)return{level:1,title:'Bedhand'};
  return{level:0,title:'Novice'};
}

/* ===== UNDO STACK (planning phase only) ===== */
const UNDO_MAX=20;
let undoStack=[];
function pushUndo(){if(S&&S.phase===PHASES.PLANNING){undoStack.push(S.grid.map(c=>c.cropId));if(undoStack.length>UNDO_MAX)undoStack.shift()}}
function doUndo(){if(!S||S.phase!==PHASES.PLANNING||!undoStack.length)return;const prev=undoStack.pop();for(let i=0;i<SIZE;i++)S.grid[i].cropId=prev[i]||null;S._cachedBedScore=null;save();render()}

/* ===== CELL CLICK ===== */
function cellClick(i){
  S._cachedBedScore=null;
  if(S.interventionMode){execIntervention(i);return}
  if(S.phase===PHASES.PLANNING){
    if(!S.selectedCrop&&!S.eraserMode){
      S.selectedCell=i;render();return;
    }
    const prevCropId=S.grid[i].cropId;
    let changed=false;
    if(S.eraserMode){
      if(prevCropId){
        pushUndo();
        S.grid[i].cropId=null;
        changed=true;
      }
    }else if(S.selectedCrop){
      if(prevCropId!==S.selectedCrop){
        pushUndo();
        S.grid[i].cropId=S.selectedCrop;
        changed=true;
      }
      if(changed&&CAM){
        CAM.placementCount++;
        // Trigger dialogue
        const trigger=determinePlacementTrigger(i,S.selectedCrop);
        if(shouldFirePlacementDialogue(trigger)){
          const chars=getCharAvailability(S.chapter);
          setTimeout(()=>fireDialogue(trigger,chars),600);
        }
        // First crop keepsake check
        if(!CAM.firstCropPlaced&&countPlanted(S.grid)>=1){
          CAM.firstCropPlaced=true;
          if(!CAM.keepsakes.first_seed_packet){
            CAM.keepsakes.first_seed_packet={earnedCh:S.chapter,timestamp:Date.now()};
          }
        }
        saveCampaign();
      }
    }
    S.selectedCell=i;
    if(!changed){ render(); return; }
    save();render();
    // Plant bounce animation
    if(S.selectedCrop&&!S.eraserMode){
      const grid=el.board.querySelector('.grid');
      if(grid){const cells=grid.querySelectorAll('[role="gridcell"]');if(cells[i]){cells[i].classList.add('just-planted');setTimeout(()=>cells[i].classList.remove('just-planted'),200)}}
    }
    return;
  }
  // Only select cells during planning or intervention targeting
  if(S.phase===PHASES.PLANNING||S.interventionMode){S.selectedCell=i;render()}
}

function doCommit(){

  S.phase=PHASES.EARLY_SEASON;

/* ===== BEAT ===== */
function startBeat(){
  S.beatTokenAvailable=true;S.interventionMode=null;S.swapFirstCell=null;
  // Mulch is intentionally persistent: it carries through the season and into carry-forward infrastructure.
  for(const c of S.grid)if(c.interventionFlag==='protected'||c.interventionFlag==='companion_patched')c.interventionFlag=null;

  // Events only fire in Ch6+ for campaign (or always in freeplay)
  const eventsActive=!CAM||CAM.mode==='freeplay'||S.chapter>=6;
  if(eventsActive){
    const pool=eventPool(S.season);
    S.currentEvent=drawEvent(pool,S);
  }else{
    // Ch1-5: only spring events that are available at chapter
    const pool=eventPool(S.season).filter(e=>e.ca.includes(S.chapter));
    S.currentEvent=pool.length?drawEvent(pool,S):null;
  }
  S.eventAffectedCells=[];

  // Fire event dialogue
  if(S.currentEvent&&CAM){
    const valence=S.currentEvent.valence;
    const triggerKey='event_'+valence;
    setTimeout(()=>fireDialogue(triggerKey),500);
  }

  // Mid-chapter beat triggers
  if(CAM&&CAM.mode==='campaign'){
    const ch=S.chapter;
    const planted=countPlanted(S.grid);
    // Ch1 mid-beat: 8th crop
    if(ch===1&&planted>=8&&S.beatIndex===1){
      setTimeout(()=>queueNarratorLines([
        {character:'onion',line:'Eight in. That is a quarter of the bed. Starting to look like somebody lives here again.'}
      ]),1500);
    }
    // Ch10 mid-beat: 28 cells
    if(ch===10&&planted>=28&&S.beatIndex===1){
      setTimeout(()=>queueNarratorLines([
        {character:'vegeman',line:'Four cells left. Four. You are so close to the thing I tried to do drunk on ambition in Chapter 2. Except you are doing it right.'},
        {character:'gurl',line:'Twenty-eight cells placed. Current average is holding. Four remaining cells will determine whether this bed is full or just crowded.'}
      ]),1500);
    }
  }
}

function hasLoggedCurrentEventForBeat(){
  return !!(S&&S.currentEvent&&S.eventLog.some(en=>en.eventId===S.currentEvent.id&&en.beatIndex===S.beatIndex));
}

function hasPendingBeatDecision(){
  return !!(S && BEAT_PHASES.includes(S.phase) && S.currentEvent && S.beatTokenAvailable);
}

function advanceBeat(){
  if(hasPendingBeatDecision()) return false;
  if(S.currentEvent&&!hasLoggedCurrentEventForBeat()){
    const aff=applyEvent(S.currentEvent,S.grid);
    S.eventAffectedCells=aff;
    S.eventLog.push({eventId:S.currentEvent.id,beatIndex:S.beatIndex,affectedCells:aff,netModifier:S.currentEvent.me.mod*aff.length,wasInterventionUsed:false});
    // Keepsake: first_frost_marker on surviving a frost event
    if(CAM&&!CAM.keepsakes.first_frost_marker&&S.currentEvent.title&&/frost|freeze/i.test(S.currentEvent.title)){
      CAM.keepsakes.first_frost_marker={earnedCh:S.chapter,timestamp:Date.now()};saveCampaign();
    }
  }
  S.beatTokenAvailable=false;S.currentEvent=null;S.eventAffectedCells=[];
  if(S.beatIndex<2){S.beatIndex++;S.phase=BEAT_PHASES[S.beatIndex];startBeat()}
  else{
    clearTransientState();
    S.phase=PHASES.HARVEST;S.harvestResult=bedScore(S.grid,S.season);
    // Fire score dialogue
    if(CAM){
      const avg=S.harvestResult.bedAverage;
      const scoreTrigger=avg>=8?'simulation_score_high':avg>=5.5?'simulation_score_mid':'simulation_score_low';
      setTimeout(()=>fireDialogue(scoreTrigger),500);

      // Keepsake: onion_scorecard on first perfect adjacency
      if(!CAM.keepsakes.onion_scorecard&&S.harvestResult.cellScores.some(cs=>{const f=cs.factors;return f&&(f.adjacency-2.5)>=1.5})){
        CAM.keepsakes.onion_scorecard={earnedCh:S.chapter,timestamp:Date.now()};saveCampaign();
      }

      // Check for hard violations
      const hasViolation=S.grid.some(c=>{
        if(!c.cropId)return false;
        const crop=C[c.cropId];
        return crop&&crop.support&&!TRELLIS.has(c.row);
      });
      if(hasViolation){
        setTimeout(()=>fireDialogue('simulation_hard_violation'),1800);
      }

      // Harvest yield dialogue
      if(avg>=7.5)setTimeout(()=>fireDialogue('harvest_good_yield'),1200);
      else if(avg<4.0)setTimeout(()=>fireDialogue('harvest_poor_yield'),1200);

      // Mom memory (Ch3-11, once per chapter, at harvest)
      const ch=S.chapter;
      if(ch>=3&&ch<=11&&DIALOGUE_DB.mom_memory){
        setTimeout(()=>fireDialogue('mom_memory'),3000);
      }
    }
  }
  save();render();
  return true;
}

/* ===== INTERVENTION ===== */
function startIntervention(type){
  if(!S.beatTokenAvailable)return;
  if(type==='accept_loss'){doAcceptLoss();return}
  S.interventionMode=type;S.swapFirstCell=null;render();
}

function doAcceptLoss(){
  S.interventionLog.push({beatIndex:S.beatIndex,type:'accept_loss',targetCells:[],timestamp:new Date().toISOString()});
  S.beatTokenAvailable=false;
  if(S.currentEvent){
    const aff=applyEvent(S.currentEvent,S.grid);S.eventAffectedCells=aff;
    S.eventLog.push({eventId:S.currentEvent.id,beatIndex:S.beatIndex,affectedCells:aff,netModifier:S.currentEvent.me.mod*aff.length,wasInterventionUsed:false});
  }
  S.currentEvent=null;
  // Fire intervention_skipped dialogue
  if(CAM)setTimeout(()=>fireDialogue('intervention_skipped'),400);
  S.interventionMode=null;save();render();
}

function execIntervention(i){
  const cell=S.grid[i];const mode=S.interventionMode;
  if(mode==='protect'){if(!cell.cropId)return;cell.interventionFlag='protected';finishInt([{row:cell.row,col:cell.col}])}
  else if(mode==='mulch'){if(!cell.cropId)return;cell.interventionFlag='mulched';finishInt([{row:cell.row,col:cell.col}])}
  else if(mode==='companion_patch'){if(!cell.cropId)return;cell.interventionFlag='companion_patched';finishInt([{row:cell.row,col:cell.col}])}
  else if(mode==='prune'){if(!cell.cropId)return;cell.cropId=null;finishInt([{row:cell.row,col:cell.col}])}
  else if(mode==='swap'){
    if(!cell.cropId)return;
    if(S.swapFirstCell===null){S.swapFirstCell=i;render();return}
    const fi=S.swapFirstCell;if(fi===i){S.swapFirstCell=null;render();return}
    if(!nbs(fi).includes(i)){S.swapFirstCell=null;render();return}
    const fc=S.grid[fi];if(!fc.cropId){S.swapFirstCell=null;render();return}
    const tmp=fc.cropId;fc.cropId=cell.cropId;cell.cropId=tmp;
    const tmpMod=fc.eventModifier;fc.eventModifier=cell.eventModifier;cell.eventModifier=tmpMod;
    S.swapFirstCell=null;finishInt([{row:fc.row,col:fc.col},{row:cell.row,col:cell.col}]);
  }
}

function finishInt(targets){
  S.interventionLog.push({beatIndex:S.beatIndex,type:S.interventionMode,targetCells:targets,timestamp:new Date().toISOString()});
  S.beatTokenAvailable=false;S.interventionMode=null;
  if(S.currentEvent){
    const aff=applyEvent(S.currentEvent,S.grid);S.eventAffectedCells=aff;
    S.eventLog.push({eventId:S.currentEvent.id,beatIndex:S.beatIndex,affectedCells:aff,netModifier:S.currentEvent.me.mod*aff.length,wasInterventionUsed:true});
  }
  // Fire intervention_used dialogue
  if(CAM)setTimeout(()=>fireDialogue('intervention_used'),400);
  save();render();
}

/* ===== COMPLETE CHAPTER (campaign) ===== */
function completeChapter(){
  if(!CAM)return;
  const ch=S.chapter;
  const meta=CHAPTERS[ch];

  // Record score
  const score=S.harvestResult?S.harvestResult.finalScore:0;
  if(!CAM.bestScores[ch]||score>CAM.bestScores[ch])CAM.bestScores[ch]=score;
  if(!CAM.completedChapters.includes(ch))CAM.completedChapters.push(ch);
  if(ch<12)CAM.currentChapter=ch+1;

  // Update pantry
  if(S.harvestResult){
    const ps=new Set(Object.keys(CAM.pantry));
    for(const c of(S.harvestResult.yieldList||[])){
      CAM.pantry[c]=(CAM.pantry[c]||0)+1;
    }
  }

  // Check recipe completions
  for(const[rid,rec]of Object.entries(RECIPE_DISPLAY)){
    if(CAM.recipesCompleted.includes(rid))continue;
    if(rec.ingredients.every(c=>CAM.pantry[c]&&CAM.pantry[c]>0)){
      CAM.recipesCompleted.push(rid);
    }
  }

  // Keepsake: block_party_plate on completing the full recipe ladder
  if(!CAM.keepsakes.block_party_plate&&CAM.recipesCompleted.length>=RECIPE_LADDER.length){
    CAM.keepsakes.block_party_plate={earnedCh:ch,timestamp:Date.now()};
  }

  // Journal entry
  const narratorHighlight=CAM.lastNarratorLines.gurl||CAM.lastNarratorLines.onion||'';
  CAM.journal[ch]={
    chapter:ch,
    season:S.season,
    score:score,
    grade:S.harvestResult?S.harvestResult.grade:'F',
    narratorHighlight:narratorHighlight
  };

  // History
  const hist=loadH();
  hist.push({chapter:ch,season:S.season,finalScore:score,grade:S.harvestResult?S.harvestResult.grade:'-'});
  saveH(hist);

  // Carry forward
  const cf=buildCarryForward(S,S.carryForward||mkCF());

  // Prepare next season state
  if(ch<12){
    S=mkSeason(ch+1,cf);
    save();
  }

  // Show chapter end
  if(ch===12){
    CAM.mode='epilogue';
  }else{
    CAM.mode='chapter_end';
  }
  saveCampaign();
  render();
}

/* ===== TRANSITION (free play) ===== */
function doTransition(){
  const cf=buildCarryForward(S,S.carryForward||mkCF());
  const hist=loadH();hist.push({chapter:S.chapter,season:S.season,finalScore:S.harvestResult?S.harvestResult.finalScore:0,grade:S.harvestResult?S.harvestResult.grade:'F'});saveH(hist);
  const next=S.chapter+1;
  if(next>12){
    // Free play wraps back to ch1 season cycle
    S=mkSeason(1,cf);S.chapter=99;
  }else if(isWinter(next)){
    S=mkSeason(next,cf);S.phase=PHASES.WINTER_REVIEW;
    S.harvestResult={cellScores:[],bedAverage:0,finalScore:0,grade:'-',yieldList:[],recipeMatches:[],factorSummary:{sun:0,support:0,shade:0,access:0,season:0,adjacency:0}};
  }else{
    S=mkSeason(next,cf);
  }
  save();render();
}

/* ===== KEYBOARD ===== */
document.addEventListener('keydown',e=>{
  if(el.overlay.classList.contains('active')){
    if(e.key==='Escape'){el.overlay.classList.remove('active');return}
    if(e.key==='Enter'){const primary=el.cbox.querySelector('.btn.primary');if(primary){e.preventDefault();primary.click();}return}
    // Focus trap in modal
    if(e.key==='Tab'){
      const focusable=el.cbox.querySelectorAll('button,a,[tabindex]:not([tabindex="-1"]),input,select,textarea');
      if(focusable.length){
        const first=focusable[0],last=focusable[focusable.length-1];
        if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}
        else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}
      }
    }
    return;
  }
  if(el.gameMenuPanel && el.gameMenuPanel.hasAttribute('data-open')){
    if(e.key==='Escape'){closeGameMenu();return}
    if(e.key==='Tab'){
      const focusable=el.gameMenuPanel.querySelectorAll('button,a,[tabindex]:not([tabindex="-1"])');
      if(focusable.length){
        const first=focusable[0],last=focusable[focusable.length-1];
        if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}
        else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}
      }
    }
    return;
  }
  const t=e.target.tagName;
  const inField=t==='INPUT'||t==='SELECT'||t==='TEXTAREA';
  if(!inField&&(e.key==='m'||e.key==='M')){
    e.preventDefault();
    toggleGameMenu(true);
    return;
  }
  if(!inField&&(e.key==='h'||e.key==='H'||e.key==='?'||(e.key==='/'&&e.shiftKey))){
    e.preventDefault();
    showHowToOverlay(howToSection||'quickstart');
    return;
  }
  if(inField)return;
  if(!S)return;
  if((e.key==='z'||e.key==='Z')&&(e.ctrlKey||e.metaKey)){e.preventDefault();doUndo();return}
  if(e.key==='e'||e.key==='E'){if(S.phase===PHASES.PLANNING){toggleEraserTool();render()}}
  if(e.key==='r'||e.key==='R'){if(BEAT_PHASES.includes(S.phase)&&(!S.beatTokenAvailable||!S.currentEvent))advanceBeat()}
  if(e.key==='i'||e.key==='I'){if(S&&S.phase===PHASES.PLANNING){setInspectMode();render()}}
  if(e.key==='Escape'){if(S){setInspectMode();render()}}
});
document.addEventListener('keydown',e=>{
  if(!S)return;
  // Enter/Space on focused cell triggers placement
  if(e.key==='Enter'||e.key===' '){
    const grid=el.board.querySelector('.grid');if(!grid)return;
    const cells=grid.querySelectorAll('[role="gridcell"]');const foc=document.activeElement;
    const idx=Array.from(cells).indexOf(foc);
    if(idx>=0){e.preventDefault();cellClick(idx);return}
  }
  if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))return;
  const grid=el.board.querySelector('.grid');if(!grid)return;
  const cells=grid.querySelectorAll('.cell');const foc=document.activeElement;const idx=Array.from(cells).indexOf(foc);if(idx<0)return;
  e.preventDefault();const{row,col}=rc(idx);let nr=row,nc=col;
  if(e.key==='ArrowUp')nr=Math.max(0,row-1);if(e.key==='ArrowDown')nr=Math.min(ROWS-1,row+1);
  if(e.key==='ArrowLeft')nc=Math.max(0,col-1);if(e.key==='ArrowRight')nc=Math.min(COLS-1,col+1);
  const ni=ri(nr,nc);if(cells[ni]){cells[ni].focus();cells[ni].tabIndex=0;foc.tabIndex=-1}
});

/* ===== TEST HOOKS ===== */
window.gardenOS={
  getState:()=>S,
  getCampaign:()=>CAM,
  getPhaseContract:()=>({
    phase:S?S.phase:null,
    valid:!!(S&&VALID_PHASES.has(S.phase)),
    pendingDecision:hasPendingBeatDecision(),
    reviewPhases:[PHASES.HARVEST_REVIEW,PHASES.WINTER_REVIEW]
  }),
  resetGame:()=>{try{localStorage.removeItem(SKEY);localStorage.removeItem(HKEY);localStorage.removeItem(CKEY)}catch(e){}CAM=mkCampaign();S=mkSeason(1,mkCF());save();saveCampaign();render()},
  render_game_to_text:()=>{
    if(!S)return'No active season';
    const lines=['Chapter '+S.chapter+' | '+S.season+' | '+S.phase];
    for(let r=0;r<ROWS;r++){let row='';for(let c=0;c<COLS;c++){const cell=S.grid[ri(r,c)];row+=(cell.cropId?C[cell.cropId].short:'..').padEnd(4)}lines.push(row)}
    const s=safeScore();lines.push('Score: '+s.finalScore.toFixed(1)+' ('+s.grade+')');
    return lines.join('\n');
  },
  advanceTime:()=>{if(!S)return;if(BEAT_PHASES.includes(S.phase))advanceBeat();else if(S.phase===PHASES.HARVEST){S.phase=PHASES.HARVEST_REVIEW;save();render()}else if(S.phase===PHASES.HARVEST_REVIEW||S.phase===PHASES.WINTER_REVIEW){if(CAM&&CAM.mode==='campaign'&&S.phase===PHASES.HARVEST_REVIEW)completeChapter();else doTransition()}},
  skipToChapter:(ch)=>{if(!CAM)CAM=mkCampaign();CAM.currentChapter=ch;for(let i=1;i<ch;i++)if(!CAM.completedChapters.includes(i))CAM.completedChapters.push(i);CAM.mode='chapter_start';S=mkSeason(ch,mkCF());save();saveCampaign();render()},
  goToMenu:()=>{if(!CAM)CAM=mkCampaign();CAM.mode='menu';saveCampaign();render()}
};
window.render_game_to_text=()=>window.gardenOS.render_game_to_text();
window.advanceTime=()=>window.gardenOS.advanceTime();

/* ===== BOOT ===== */
CAM=loadCampaign();
if(!CAM){
  CAM=mkCampaign();
  // Check if there is an existing engine state to preserve
  const saved=load();
  if(saved&&saved.phase&&saved.grid){
    S=saved;
    CAM.mode='campaign';
    CAM.currentChapter=S.chapter;
    saveCampaign();
  }
}else{
  // Restore engine state
  const saved=load();
  if(saved&&saved.phase&&saved.grid){
    S=saved;
  }else if(CAM.mode==='campaign'||CAM.mode==='freeplay'){
    S=mkSeason(CAM.currentChapter,mkCF());
    save();
  }
}

// If mode is menu or no valid state, show menu
if(!CAM.mode||CAM.mode==='menu'||(!S&&CAM.mode!=='chapter_start'&&CAM.mode!=='chapter_end'&&CAM.mode!=='epilogue'&&CAM.mode!=='winter_review'&&CAM.mode!=='sauce_sequence')){
  if(!S)S=mkSeason(1,mkCF());
  CAM.mode='menu';
  saveCampaign();
}

render();
