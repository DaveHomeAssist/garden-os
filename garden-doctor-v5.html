// ── Diagnosis engine ────────────────────────────────────────────────────────
function rankDiagnoses(symptomIds) {
  const all = [
    { id:'fusarium', cause:'Fusarium wilt', confidence:0.78, tone:'bad',  prob:78,
      action:"Remove affected plant. Don't replant nightshades here for 2 seasons. Solarize the soil if possible.",
      ref:'fusarium', triggers:['wilt','yellow'] },
    { id:'water', cause:'Heat stress + uneven watering', confidence:0.62, tone:'warn', prob:62,
      action:'Deep-water at dawn for 3 days, mulch 2″. If recovery within 48h, this is it.',
      ref:'water', triggers:['wilt','curl','scorch'] },
    { id:'septoria', cause:'Septoria leaf spot', confidence:0.55, tone:'warn', prob:55,
      action:'Remove lower leaves with spots. Mulch to prevent splash. Copper spray if rain continues.',
      ref:'septoria', triggers:['spots','yellow'] },
    { id:'pest', cause:'Cabbage looper or hornworm', confidence:0.71, tone:'warn', prob:71,
      action:'Inspect undersides at dawn. Hand-pick. BT spray for repeat damage.',
      ref:'pests', triggers:['holes'] },
    { id:'cal', cause:'Calcium uptake (blossom-end)', confidence:0.48, tone:'warn', prob:48,
      action:'Even watering > calcium. Mulch to stabilize moisture. Test pH at 6.5.',
      ref:'calcium', triggers:['drop','scorch'] },
    { id:'cold', cause:'Cold-soil shock', confidence:0.42, tone:'warn', prob:42,
      action:'Soil under 60°F holds growth. Wait, mulch black, or row-cover.',
      ref:'cold', triggers:['stunt','curl'] },
  ];
  if (symptomIds.length === 0) return [];
  const scored = all.map(d => {
    const hits = d.triggers.filter(t => symptomIds.includes(t)).length;
    return { ...d, score: hits + (hits ? d.confidence : 0) };
  }).filter(d => d.score > 0);
  return scored.sort((a, b) => b.score - a.score).slice(0, 3);
}

  return <span style={{

    textTransform: 'uppercase', letterSpacing: 0.12, color, ...style,

}

// ── Tweaks panel ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = { confidenceThreshold: 40, showProbs: true };
const TWEAK_KEY = 'gos.doctor.tweaks';
const SAVED_KEY = 'gos.doctor.saved';
const LAST_QUERY_KEY = 'gos.doctor.lastQuery';

function loadTweaks() {
  try {
    const raw = window.localStorage.getItem(TWEAK_KEY);
    if (!raw) return TWEAK_DEFAULTS;
    return { ...TWEAK_DEFAULTS, ...JSON.parse(raw) };
  } catch (_) { return TWEAK_DEFAULTS; }
}
function saveTweaks(t) {
  try { window.localStorage.setItem(TWEAK_KEY, JSON.stringify(t)); } catch (_) {}
}
function loadLastQuery() {
  try {
    const raw = window.localStorage.getItem(LAST_QUERY_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (_) { return null; }
}
function saveLastQuery(q) {
  try { window.localStorage.setItem(LAST_QUERY_KEY, JSON.stringify(q)); } catch (_) {}
}
function appendSaved(entry) {
  try {
    const raw = window.localStorage.getItem(SAVED_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    arr.unshift(entry);
    window.localStorage.setItem(SAVED_KEY, JSON.stringify(arr.slice(0, 50)));
  } catch (_) {}
}
function popSaved(id) {
  try {
    const raw = window.localStorage.getItem(SAVED_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    const filtered = arr.filter(e => e.id !== id);
    window.localStorage.setItem(SAVED_KEY, JSON.stringify(filtered));
  } catch (_) {}
}
function Seg({ value, opts, onChange }) {
  return (
    <div style={{ display: 'flex', background: T.cedarWash, borderRadius: 6, padding: 2, gap: 2 }}>
      {opts.map(([val, lab]) => (
        <button key={val} onClick={() => onChange(val)} style={{
          flex: 1, padding: '5px 8px', borderRadius: 4, border: 'none',
          background: value === val ? T.panel : 'transparent',
          fontFamily: T.fontSans, fontSize: 12, fontWeight: 500,
          color: value === val ? T.text : T.textSoft,
          boxShadow: value === val ? '0 1px 2px rgba(44,27,11,0.1)' : 'none',
          cursor: 'pointer', minHeight: 28,
        }}>{lab}</button>
      ))}
    </div>
  );
}
function TweaksPanel({ tweak, setTweak, onClose }) {
  const setKey = (k, v) => { const next = { ...tweak, [k]: v }; setTweak(next); saveTweaks(next); };
  return (
    <>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(44,27,11,0.42)', zIndex: 50 }}/>
      <div role="dialog" aria-modal="true" aria-label="Tweaks" style={{
        position: 'absolute', top: 60, right: 12, zIndex: 51,
        width: 264, maxWidth: 'calc(100% - 24px)',
        background: T.panel, borderRadius: 12, border: `1px solid ${T.border}`,
        boxShadow: '0 16px 48px rgba(44,27,11,0.28)', padding: '14px 16px 16px',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
          <Disp size={17}>Tweaks</Disp>
          <button onClick={onClose} aria-label="Close tweaks" style={{
            width: 24, height: 24, borderRadius: 6, padding: 0, background: 'transparent',
            border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center',
            justifyContent: 'center', color: T.textSoft,
          }}>{Icons.close(12, T.textSoft)}</button>
        </div>
        <div style={{ marginBottom: 14 }}>
          <Label size={9} style={{ display: 'block', marginBottom: 5, fontWeight: 500 }}>
            Confidence threshold · {tweak.confidenceThreshold}%
          </Label>
          <input type="range" min="0" max="80" step="10" value={tweak.confidenceThreshold}
            onChange={e => setKey('confidenceThreshold', Number(e.target.value))}
            style={{ width: '100%', accentColor: T.leaf }}
            aria-label="Confidence threshold percent"/>
        </div>
        <div style={{ marginBottom: 14 }}>
          <Label size={9} style={{ display: 'block', marginBottom: 5, fontWeight: 500 }}>Show probabilities</Label>
          <Seg value={tweak.showProbs ? 'on' : 'off'} opts={[['on', 'On'], ['off', 'Off']]}
            onChange={v => setKey('showProbs', v === 'on')}/>
        </div>
        <button onClick={() => { setTweak(TWEAK_DEFAULTS); saveTweaks(TWEAK_DEFAULTS); }} style={{
          width: '100%', padding: '6px 10px', background: 'transparent',
          border: `1px solid ${T.borderSoft}`, borderRadius: 6, cursor: 'pointer',
          fontFamily: T.fontMono, fontSize: 9, letterSpacing: 0.15, textTransform: 'uppercase',
          color: T.textSoft, fontWeight: 500,
        }}>Reset to defaults</button>
      </div>
    </>
  );
}

            display: 'inline-flex', alignItems: 'center', gap: 4, marginTop: 8,

            letterSpacing: 0.1, textTransform: 'uppercase', textDecoration: 'none',

        </div>
        <Label size={11} color={T.textMuted} style={{ flexShrink: 0 }}>#{rank}</Label>
      </div>
    </div>
  );
}

// ── Doctor screen ───────────────────────────────────────────────────────────
function Doctor() {
  const [tweak, setTweak] = React.useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const last = loadLastQuery();
  const [symptoms, setSymptoms] = React.useState(() => last?.symptoms || []);
  const [cropId, setCropId] = React.useState(() => last?.cropId || 'tom');
  const [season, setSeason] = React.useState(() => last?.season || 'late-spring');
  const [diagnosed, setDiagnosed] = React.useState(false);
  const [savedState, setSavedState] = React.useState({ id: null, until: 0 });

  const toggle = (id) => setSymptoms(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const ranked = diagnosed ? rankDiagnoses(symptoms).filter(d => d.prob >= tweak.confidenceThreshold) : [];

  React.useEffect(() => {
    saveLastQuery({ symptoms, cropId, season });
  }, [symptoms, cropId, season]);

  React.useEffect(() => {
    if (!savedState.id) return;
    const ms = savedState.until - Date.now();
    if (ms <= 0) { setSavedState({ id: null, until: 0 }); return; }
    const t = setTimeout(() => setSavedState({ id: null, until: 0 }), ms);
    return () => clearTimeout(t);
  }, [savedState]);

  const handleSave = () => {
    if (!diagnosed || ranked.length === 0) return;
    const id = `d${Date.now()}`;
    appendSaved({ id, savedAt: Date.now(), query: { symptoms, cropId, season }, diagnoses: ranked });
    setSavedState({ id, until: Date.now() + 8000 });
  };
  const handleUndo = () => {
    if (!savedState.id) return;
    popSaved(savedState.id);
    setSavedState({ id: null, until: 0 });
  };

  const saveActive = !!savedState.id;
  const saveLabel = saveActive ? 'Saved · Undo' : 'Save to journal';

  return (
    <div style={{
      width: '100%', height: '100%', background: T.cream,
      fontFamily: T.fontSans, color: T.text, overflow: 'hidden',
      display: 'flex', flexDirection: 'column', position: 'relative',
    }}>
      <FakeStatusBar/>

      <header style={{ padding: '2px 22px 12px', flexShrink: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <Label size={9} color={T.soilMid}>DOCTOR</Label>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
            <Label size={9} color={T.soilMid}>{symptoms.length} SYMPTOMS · {cropId.toUpperCase()}</Label>
            <button aria-label="Tweaks" onClick={() => setTweaksOpen(true)} style={{
              width: 26, height: 26, borderRadius: 6, padding: 0, background: T.panel,
              border: `1px solid ${T.borderSoft}`, display: 'inline-flex',
              alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
            }}>{Icons.gear(12, T.soil)}</button>
          </div>
        </div>
        <div style={{
          fontFamily: T.fontDisp, fontSize: 28, fontWeight: 600,
          letterSpacing: -0.4, color: T.soil, lineHeight: 1.1, marginTop: 2,
        }}>
          I see <span style={{ fontStyle: 'italic', color: T.rust }}>something</span>.
        </div>
      </header>

      <div style={{ flex: 1, overflowY: 'auto', padding: '0 18px 24px' }}>
        <CropPicker cropId={cropId} onPick={setCropId}/>

        <div style={{ marginTop: 14 }}>
          <Label size={9} color={T.textSoft} style={{ marginLeft: 2 }}>WHAT'S WRONG?</Label>
          <div style={{ marginTop: 6, display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 6 }}>
            {SYMPTOMS.map(s => {
              const on = symptoms.includes(s.id);
              return (
                <button key={s.id} onClick={() => { toggle(s.id); setDiagnosed(false); }} aria-pressed={on} style={{
                  display: 'flex', alignItems: 'center', gap: 8,
                  padding: '10px 10px', borderRadius: 12,
                  background: on ? T.leafWash : T.panel,
                  border: `1.5px solid ${on ? T.leafBright : T.borderSoft}`,
                  fontFamily: T.fontSans, fontSize: 12.5, fontWeight: on ? 600 : 500,
                  color: on ? T.leaf : T.text, cursor: 'pointer',
                  minHeight: 44, textAlign: 'left',
                }}>
                  {DocIcons[s.id](20, on ? T.leaf : T.textMid)}
                  <span>{s.label}</span>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ marginTop: 14 }}>
          <Label size={9} color={T.textSoft} style={{ marginLeft: 2 }}>SEASON</Label>
          <div style={{ marginTop: 6, display: 'flex', gap: 4, padding: 3, background: T.cedarWash, borderRadius: 10 }}>
            {[
              ['early-spring', 'Early spr'],
              ['late-spring',  'Late spr'],
              ['summer',       'Summer'],
              ['fall',         'Fall'],
            ].map(([k, lab]) => (
              <button key={k} onClick={() => setSeason(k)} aria-pressed={season === k} style={{
                flex: 1, minHeight: 36, borderRadius: 8, border: 'none', cursor: 'pointer',
                background: season === k ? T.panel : 'transparent',
                color: season === k ? T.text : T.textSoft,
                fontFamily: T.fontSans, fontSize: 11, fontWeight: season === k ? 600 : 500,
                boxShadow: season === k ? '0 1px 2px rgba(44,27,11,0.1)' : 'none',
              }}>{lab}</button>
            ))}
          </div>
        </div>

        <button
          disabled={symptoms.length === 0}
          onClick={() => setDiagnosed(true)}
          style={{
            marginTop: 14, width: '100%', padding: '14px 16px', borderRadius: 12,
            background: symptoms.length === 0 ? T.cream : T.leafBright,
            color: symptoms.length === 0 ? T.textMuted : '#fff',
            border: symptoms.length === 0 ? `1px solid ${T.borderSoft}` : 'none',
            fontFamily: T.fontSans, fontSize: 14, fontWeight: 600,
            cursor: symptoms.length === 0 ? 'not-allowed' : 'pointer',
            minHeight: 48,
            boxShadow: symptoms.length === 0 ? 'none' : '0 2px 8px rgba(78,140,60,0.25)',
          }}>
          {symptoms.length === 0 ? 'Pick at least one symptom' : `Diagnose ${CROPS[cropId]?.name || 'plant'}`}
        </button>

        {diagnosed && ranked.length > 0 && (
          <div style={{ marginTop: 16 }}>
            <Label size={9} color={T.textSoft} style={{ marginLeft: 2 }}>RANKED · {ranked.length} {ranked.length === 1 ? 'MATCH' : 'MATCHES'}</Label>
            <div style={{ marginTop: 6, display: 'flex', flexDirection: 'column', gap: 8 }}>
              {ranked.map((d, i) => <DiagCard key={d.id} diag={d} rank={i + 1} showProbs={tweak.showProbs}/>)}
            </div>
            <button onClick={saveActive ? handleUndo : handleSave} aria-pressed={saveActive} style={{
              marginTop: 10, width: '100%', padding: '10px 12px', borderRadius: 10,
              background: saveActive ? T.leafWash : T.panel,
              border: `1px solid ${saveActive ? T.leafBright : T.borderSoft}`,
              fontFamily: T.fontSans, fontSize: 13, fontWeight: 500,
              color: saveActive ? T.leaf : T.text, cursor: 'pointer', minHeight: 44,
              transition: 'background 0.18s, border-color 0.18s',
            }}>{saveLabel}</button>
          </div>
        )}

        {diagnosed && ranked.length === 0 && (
          <div style={{
            marginTop: 16, padding: '14px 16px', background: T.panel,
            border: `1px dashed ${T.border}`, borderRadius: 12,
            fontSize: 13, color: T.textSoft, textAlign: 'center', fontStyle: 'italic',
            fontFamily: T.fontSerif,
          }}>
            No clean match. Try removing one symptom or pick a different season.
          </div>
        )}
      </div>

      <TabBar active="doctor"/>
      {tweaksOpen && <TweaksPanel tweak={tweak} setTweak={setTweak} onClose={() => setTweaksOpen(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PhoneFrame><Doctor/></PhoneFrame>);
</script>
</body>
</html>
