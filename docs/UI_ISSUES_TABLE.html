<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  UI ISSUES TABLE — Garden OS                                    ║
  ║                                                                 ║
  ║  Based on: 30-shared-resources/shared-standards/                ║
  ║            UI_ISSUES_TABLE_TEMPLATE.html                        ║
  ║                                                                 ║
  ║  AGENT UPDATE INSTRUCTIONS:                                     ║
  ║  1. Issues live in the <script id="issue-data"> JSON block      ║
  ║  2. To add an issue: append to the JSON array                   ║
  ║  3. To resolve: change "status" to "done", add "resolved" date  ║
  ║  4. To defer: change "status" to "deferred"                     ║
  ║  5. Update data-last-verified on <main> after any review        ║
  ║  6. Do NOT edit the HTML card markup — it renders from JSON     ║
  ║                                                                 ║
  ║  CUSTOMIZATION:                                                 ║
  ║  - Project config set below: Garden OS fonts, nav, areas, tools ║
  ║  - CSS custom properties use Garden OS design system            ║
  ║  - Storage key: gos-ui-issues-user                              ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<title>Garden OS — UI Issues Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --soil: #5c3d1e; --soil-mid: #7a5230;
    --leaf: #3d7a4f; --leaf-bright: #5aab6b; --leaf-pale: #c8e6c0; --leaf-wash: #edf5e8;
    --sun: #e8c84a; --sun-pale: #faf0c0; --sun-wash: #fdf8e8;
    --rust: #b84a1a; --rust-pale: #f5d8c8; --rust-wash: #fdf0e8;
    --cream: #f7f2ea; --cream-mid: #efe6d8;
    --panel: #fffdf9;
    --text: #1e110a; --text-soft: #6c5848; --text-muted: #9a8068;
    --border: #cfb899; --border-soft: #e7dac7;
    --sans: 'DM Sans', system-ui, sans-serif;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'DM Mono', ui-monospace, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans); color: var(--text); line-height: 1.6;
    background: radial-gradient(circle at top left, rgba(90,171,107,.08), transparent 28%),
                radial-gradient(circle at bottom right, rgba(139,94,60,.06), transparent 28%),
                var(--cream);
    min-height: 100vh;
  }
  .skip-link {
    position: absolute; top: -48px; left: 0; background: var(--leaf); color: #fff;
    padding: .5rem 1.2rem; font-size: .85rem; font-weight: 600; z-index: 9999;
    border-radius: 0 0 8px 0; text-decoration: none; transition: top .15s;
  }
  .skip-link:focus { top: 0; }

  .os-nav {
    position: sticky; top: 0; z-index: 20;
    background: var(--soil); border-bottom: 3px solid var(--sun);
    display: flex; gap: 0; justify-content: center; padding: 0;
    font-family: var(--mono); font-size: .65rem;
  }
  .os-nav a {
    color: rgba(245,237,224,0.6); text-decoration: none; padding: .5rem .8rem;
    letter-spacing: .04em; transition: color .15s; white-space: nowrap;
  }
  .os-nav a:hover { color: #f5ede0; }
  .os-nav a.active { color: #f5ede0; border-bottom: 2px solid var(--sun); }
  .os-nav .bridge { margin-left: auto; opacity: .55; }

  .wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem 1rem; }
  header { margin-bottom: 1.75rem; }
  .eyebrow {
    font-family: var(--mono); font-size: .68rem; letter-spacing: .14em;
    text-transform: uppercase; color: var(--leaf-bright); margin-bottom: .5rem;
  }
  h1 {
    font-family: var(--serif); font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 600; letter-spacing: -.02em; margin-bottom: .4rem;
  }
  .subtitle { color: var(--text-soft); font-size: .95rem; max-width: 600px; }
  .stats { display: flex; gap: 1.5rem; margin-top: 1.25rem; flex-wrap: wrap; }
  .stat {
    display: flex; align-items: center; gap: .5rem;
    font-family: var(--mono); font-size: .75rem; letter-spacing: .04em;
  }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-done { background: var(--leaf-bright); }
  .dot-partial { background: var(--sun); }
  .dot-open { background: var(--rust); }
  .dot-deferred { background: var(--text-muted); }

  .filter-bar {
    display: flex; gap: .4rem; margin-bottom: 1.25rem; flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar .label {
    font-family: var(--mono); font-size: .65rem; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-muted); margin-right: .25rem;
  }
  .fbtn {
    font-family: var(--mono); font-size: .68rem; letter-spacing: .04em;
    padding: .3rem .7rem; border-radius: 999px; border: 1.5px solid var(--border-soft);
    background: var(--panel); color: var(--text-soft); cursor: pointer;
    transition: all .15s;
  }
  .fbtn:hover { border-color: var(--border); color: var(--text); }
  .fbtn.active { background: var(--soil); color: var(--sun); border-color: var(--soil); }
  .fbtn:focus-visible { outline: 2.5px solid var(--leaf-bright); outline-offset: 2px; }

  .issue-group {
    background: var(--panel); border: 1.5px solid var(--border-soft);
    border-radius: 8px; overflow: hidden; margin-bottom: 1rem;
    box-shadow: 0 2px 8px rgba(44,27,11,.06);
  }
  .issue-group.is-hidden { display: none; }
  .group-toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: .65rem 1rem; border: none; background: var(--cream-mid);
    cursor: pointer; font-family: var(--serif); font-size: .9rem; font-weight: 600;
    color: var(--soil-mid); text-align: left; transition: background .15s;
  }
  .group-toggle:hover { background: var(--cream); }
  .group-toggle:focus-visible { outline: 2.5px solid var(--leaf-bright); outline-offset: -2px; }
  .group-toggle .badge {
    font-family: var(--mono); font-size: .68rem; font-weight: 500;
    padding: .15rem .5rem; border-radius: 999px; letter-spacing: .06em;
  }
  .badge-done { background: var(--leaf-wash); color: var(--leaf); border: 1px solid var(--leaf-pale); }
  .badge-partial { background: var(--sun-wash); color: #a08520; border: 1px solid var(--sun-pale); }
  .badge-open { background: var(--rust-wash); color: var(--rust); border: 1px solid var(--rust-pale); }
  .badge-deferred { background: var(--cream-mid); color: var(--text-soft); border: 1px solid var(--border-soft); }
  .group-toggle .chev {
    font-size: .8rem; color: var(--text-muted); transition: transform .2s;
  }
  .issue-group.open .chev { transform: rotate(90deg); }
  .group-body { display: none; padding: .5rem; }
  .issue-group.open .group-body { display: block; }

  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: .6rem;
  }
  .issue-card {
    background: var(--cream); border: 1px solid var(--border-soft);
    border-radius: 6px; padding: .65rem .85rem; cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    display: flex; flex-direction: column; gap: .3rem;
  }
  .issue-card:hover { border-color: var(--border); box-shadow: 0 2px 6px rgba(44,27,11,.08); }
  .issue-card:focus-visible { outline: 2.5px solid var(--leaf-bright); outline-offset: 2px; }
  .card-top {
    display: flex; align-items: center; gap: .5rem; justify-content: space-between;
  }
  .card-area {
    font-family: var(--mono); font-size: .65rem; font-weight: 500;
    letter-spacing: .06em; text-transform: uppercase; color: var(--soil-mid);
  }
  .card-sev {
    font-family: var(--mono); font-size: .6rem; letter-spacing: .06em;
    text-transform: uppercase; padding: .1rem .4rem; border-radius: 999px;
  }
  .card-sev-P1 { color: #fff; background: var(--rust); }
  .card-sev-P2 { color: #a08520; background: var(--sun-wash); border: 1px solid var(--sun-pale); }
  .card-sev-P3 { color: var(--text-muted); background: var(--cream-mid); border: 1px solid var(--border-soft); }
  .card-title {
    font-size: .88rem; font-weight: 500; line-height: 1.4;
  }
  .card-detail {
    display: none; margin-top: .4rem; padding-top: .4rem;
    border-top: 1px solid var(--border-soft); font-size: .82rem;
  }
  .issue-card.expanded .card-detail { display: block; }
  .card-detail dt {
    font-family: var(--mono); font-size: .65rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-muted); margin-top: .3rem;
  }
  .card-detail dt:first-child { margin-top: 0; }
  .card-detail dd { color: var(--text-soft); margin-left: 0; }
  .card-detail code {
    font-family: var(--mono); font-size: .78rem; background: rgba(0,0,0,.04);
    padding: .1rem .3rem; border-radius: 3px;
  }
  .card-expand-hint {
    font-family: var(--mono); font-size: .6rem; color: var(--text-muted);
    letter-spacing: .04em; margin-top: .15rem;
  }
  .issue-card.expanded .card-expand-hint { display: none; }

  .status {
    display: inline-flex; align-items: center; gap: .35rem;
    font-family: var(--mono); font-size: .62rem; font-weight: 500;
    letter-spacing: .08em; text-transform: uppercase;
    padding: .15rem .5rem; border-radius: 999px; white-space: nowrap;
  }
  .status-done { background: var(--leaf-wash); color: var(--leaf); border: 1px solid var(--leaf-pale); }
  .status-partial { background: var(--sun-wash); color: #a08520; border: 1px solid var(--sun-pale); }
  .status-open { background: var(--rust-wash); color: var(--rust); border: 1px solid var(--rust-pale); }
  .status-deferred { background: var(--cream-mid); color: var(--text-soft); border: 1px solid var(--border-soft); }

  .form-wrap { margin-top: 1.5rem; }
  .form-header {
    font-family: var(--serif); font-size: 1.15rem; font-weight: 600; margin-bottom: .75rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .form-panel {
    background: var(--panel); border: 1.5px solid var(--border-soft);
    border-radius: 8px; padding: 1.25rem;
    box-shadow: 0 2px 8px rgba(44,27,11,.06);
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .form-field { display: flex; flex-direction: column; gap: .25rem; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label {
    font-family: var(--mono); font-size: .68rem; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-soft);
  }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; font-family: var(--sans); font-size: .88rem; color: var(--text);
    background: var(--cream); border: 1.5px solid var(--border-soft); border-radius: 6px;
    padding: .5rem .65rem; transition: border-color .15s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    outline: none; border-color: var(--leaf-bright);
    box-shadow: 0 0 0 2.5px rgba(90,171,107,.15);
  }
  .form-field textarea { resize: vertical; min-height: 60px; }
  .form-actions {
    display: flex; align-items: center; gap: .75rem; margin-top: .85rem;
  }
  .btn-submit {
    font-family: var(--mono); font-size: .75rem; font-weight: 500;
    letter-spacing: .06em; padding: .5rem 1.2rem;
    background: var(--leaf); color: #fff; border: none; border-radius: 6px;
    cursor: pointer; transition: background .15s;
  }
  .btn-submit:hover { background: var(--leaf-bright); }
  .btn-submit:focus-visible { outline: 2.5px solid var(--sun); outline-offset: 2px; }
  .form-msg {
    font-family: var(--mono); font-size: .72rem; opacity: 0; transition: opacity .2s;
  }
  .form-msg.visible { opacity: 1; }

  .os-footer {
    background: var(--soil); color: rgba(245,237,224,.5); text-align: center;
    padding: 1.25rem 1rem; font-family: var(--mono); font-size: .65rem;
    letter-spacing: .06em; border-top: 2px solid var(--soil-mid); margin-top: 2.5rem;
  }
  .os-footer a { color: rgba(245,237,224,.7); text-decoration: none; }
  .os-footer a:hover { color: #f5ede0; }

  @media (max-width: 700px) {
    body { font-size: .9rem; }
    .wrap { padding: 1rem .75rem .75rem; }
    .card-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .full { grid-column: 1; }
    .os-nav { font-size: .58rem; overflow-x: auto; justify-content: flex-start; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>

<main id="main" data-last-verified="2026-04-20">
<div class="wrap">
  <header>
    <div class="eyebrow" id="eyebrow"></div>
    <h1>Issues Tracker</h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="stats" id="stats">
      <div class="stat"><span class="stat-dot dot-done"></span> <span id="stat-done">0</span> verified fixed</div>
      <div class="stat"><span class="stat-dot dot-partial"></span> <span id="stat-partial">0</span> follow-up</div>
      <div class="stat"><span class="stat-dot dot-open"></span> <span id="stat-open">0</span> open</div>
      <div class="stat"><span class="stat-dot dot-deferred"></span> <span id="stat-deferred">0</span> deferred</div>
      <div class="stat" style="color:var(--text-muted)"><span id="stat-total">0</span> tracked</div>
    </div>
  </header>
  <div class="filter-bar" role="group" aria-label="Filter issues" id="filterBar"></div>
  <div id="groups"></div>
  <div class="form-wrap">
    <div class="form-header">Report a Bug</div>
    <form class="form-panel" id="issueForm">
      <div class="form-grid">
        <div class="form-field">
          <label for="f-area">Area</label>
          <select id="f-area" required></select>
        </div>
        <div class="form-field">
          <label for="f-sev">Severity</label>
          <select id="f-sev" required>
            <option value="P1">P1 — Blocks usage</option>
            <option value="P2" selected>P2 — Degrades function</option>
            <option value="P3">P3 — Polish / edge case</option>
          </select>
        </div>
        <div class="form-field">
          <label for="f-location">Location</label>
          <input id="f-location" type="text" placeholder="e.g. Season Engine toolbar">
        </div>
        <div class="form-field">
          <label for="f-tool">Tool / Area Tag</label>
          <input id="f-tool" type="text" placeholder="e.g. planner, engine">
        </div>
        <div class="form-field full">
          <label for="f-issue">Issue</label>
          <input id="f-issue" type="text" placeholder="Describe the issue clearly" required>
        </div>
        <div class="form-field full">
          <label for="f-impact">Impact on User</label>
          <textarea id="f-impact" rows="2" placeholder="How does this affect the user experience?"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-submit">Add Issue</button>
        <span class="form-msg" id="formMsg"></span>
      </div>
    </form>
  </div>
</div>
</main>
<footer class="os-footer" id="footerEl"></footer>

<!--
  ═══════════════════════════════════════════════════════════════
  ISSUE DATA — This is the single source of truth.
  Agents: edit this JSON block to add, resolve, or defer issues.
  Schema per entry:
    id:           string  — zero-padded 3-digit sequential ID
    severity:     string  — "P1" | "P2" | "P3"
    status:       string  — "open" | "partial" | "done" | "deferred"
    area:         string  — category tag (e.g. "Accessibility", "UI bug")
    tool:         string  — tool/component filter tag ("planner" or "engine")
    title:        string  — short issue title
    impact:       string  — user impact description
    fix:          string  — fix description (optional)
    verification: string  — verification notes (optional)
    location:     string  — file/component/line reference
    notes:        string  — additional context (optional)
    added:        string  — ISO date when issue was opened
    resolved:     string  — ISO date when resolved (optional)
  ═══════════════════════════════════════════════════════════════
-->

<script>
(function() {
  'use strict';

  var dataEl = document.getElementById('issue-data');
  var config = JSON.parse(dataEl.textContent);
  var issues = config.issues || [];

  // Escape HTML
  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function(c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // Config: header
  document.getElementById('eyebrow').textContent = config.project + ' \u00b7 Issues Tracker';
  document.getElementById('subtitle').textContent = config.subtitle || '';
  document.title = config.project + ' \u2014 Issues Tracker';

  // Config: nav (Garden OS custom nav with bridge class support)
  var navBar = document.getElementById('navBar');
  (config.navLinks || []).forEach(function(link) {
    var a = document.createElement('a');
    a.href = link.href;
    a.textContent = link.label;
    if (link.active) a.className = 'active';
    if (link['class']) a.classList.add(link['class']);
    navBar.appendChild(a);
  });

  // Config: area options in form
  var areaSelect = document.getElementById('f-area');
  var opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = 'Select...';
  areaSelect.appendChild(opt0);
  (config.areaOptions || []).forEach(function(area) {
    var o = document.createElement('option');
    o.value = area;
    o.textContent = area;
    areaSelect.appendChild(o);
  });

  // Config: footer
  document.getElementById('footerEl').innerHTML =
    esc(config.project) + ' \u00b7 Issues Tracker \u00b7 ' +
    '<a href="' + esc((config.navLinks || [{}])[0].href || '../index.html') + '">Back to ' + esc(config.project) + '</a>';

  // Group issues by status
  var STATUS_ORDER = ['open', 'partial', 'done', 'deferred'];
  var STATUS_LABELS = { open: 'Open', partial: 'Needs Verification / Follow-up', done: 'Verified Fixed', deferred: 'Deferred / Planned' };
  var STATUS_BADGE = { open: 'badge-open', partial: 'badge-partial', done: 'badge-done', deferred: 'badge-deferred' };
  var STATUS_CSS = { open: 'status-open', partial: 'status-partial', done: 'status-done', deferred: 'status-deferred' };
  var STATUS_TEXT = { open: 'Open', partial: 'Follow-up', done: 'Done', deferred: 'Deferred' };

  var grouped = {};
  STATUS_ORDER.forEach(function(s) { grouped[s] = []; });
  issues.forEach(function(issue) {
    var s = issue.status || 'open';
    if (!grouped[s]) grouped[s] = [];
    grouped[s].push(issue);
  });

  // Build filter bar
  var filterBar = document.getElementById('filterBar');
  var allFilters = [
    { key: 'all', label: 'All' },
    { key: 'open', label: 'Open' },
    { key: 'partial', label: 'Follow-up' },
    { key: 'done', label: 'Verified fixed' },
    { key: 'deferred', label: 'Deferred' }
  ];
  (config.toolFilters || []).forEach(function(tf) {
    allFilters.push({ key: 'tool:' + tf.key, label: tf.label });
  });

  var spanLabel = document.createElement('span');
  spanLabel.className = 'label';
  spanLabel.textContent = 'Show:';
  filterBar.appendChild(spanLabel);

  var activeFilter = 'all';
  allFilters.forEach(function(f) {
    var btn = document.createElement('button');
    btn.className = 'fbtn' + (f.key === 'all' ? ' active' : '');
    btn.setAttribute('data-filter', f.key);
    btn.textContent = f.label;
    btn.addEventListener('click', function() {
      filterBar.querySelectorAll('.fbtn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      activeFilter = f.key;
      applyFilter();
    });
    filterBar.appendChild(btn);
  });

  // Render issue card
  function renderCard(issue) {
    var card = document.createElement('div');
    card.className = 'issue-card';
    card.tabIndex = 0;
    if (issue.tool) card.setAttribute('data-tool', issue.tool);

    var statusClass = STATUS_CSS[issue.status] || 'status-open';
    var statusText = STATUS_TEXT[issue.status] || issue.status;

    var topRight = '';
    if (issue.status === 'done' || issue.status === 'partial' || issue.status === 'deferred') {
      topRight = '<span class="status ' + statusClass + '">' + esc(statusText) + '</span>';
    } else if (issue.severity) {
      topRight = '<span class="card-sev card-sev-' + esc(issue.severity) + '">' + esc(issue.severity) + '</span>';
    }

    var detailParts = [];
    if (issue.impact) detailParts.push('<dt>Impact</dt><dd>' + esc(issue.impact) + '</dd>');
    if (issue.fix) detailParts.push('<dt>Fix</dt><dd>' + esc(issue.fix) + '</dd>');
    if (issue.verification) detailParts.push('<dt>Verification</dt><dd>' + esc(issue.verification) + '</dd>');
    if (issue.location) detailParts.push('<dt>Location</dt><dd>' + esc(issue.location) + '</dd>');
    if (issue.notes) detailParts.push('<dt>Notes</dt><dd>' + esc(issue.notes) + '</dd>');
    if (issue.resolved) detailParts.push('<dt>Resolved</dt><dd>' + esc(issue.resolved) + '</dd>');
    if (issue.added) detailParts.push('<dt>Added</dt><dd>' + esc(issue.added) + '</dd>');

    card.innerHTML =
      '<div class="card-top"><span class="card-area">' + esc(issue.area || '') + '</span>' + topRight + '</div>' +
      '<div class="card-title">' + esc(issue.title) + '</div>' +
      '<div class="card-expand-hint">click to expand</div>' +
      '<dl class="card-detail">' + detailParts.join('') + '</dl>';

    card.addEventListener('click', function() { card.classList.toggle('expanded'); });
    card.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.classList.toggle('expanded'); }
    });
    return card;
  }

  // Render groups
  var groupsEl = document.getElementById('groups');
  STATUS_ORDER.forEach(function(status) {
    var items = grouped[status];
    if (!items || items.length === 0) return;

    var section = document.createElement('section');
    section.className = 'issue-group' + (status === 'open' || status === 'partial' ? ' open' : '');
    section.setAttribute('data-status', status);

    var expanded = status === 'open' || status === 'partial';
    section.innerHTML =
      '<button class="group-toggle" type="button" aria-expanded="' + expanded + '">' +
        '<span>' + esc(STATUS_LABELS[status]) + ' (' + items.length + ')</span>' +
        '<span style="display:flex;align-items:center;gap:.5rem">' +
          '<span class="badge ' + STATUS_BADGE[status] + '">' + items.length + '</span>' +
          '<span class="chev">&rsaquo;</span>' +
        '</span>' +
      '</button>' +
      '<div class="group-body"><div class="card-grid"></div></div>';

    var grid = section.querySelector('.card-grid');
    items.forEach(function(issue) { grid.appendChild(renderCard(issue)); });

    section.querySelector('.group-toggle').addEventListener('click', function() {
      var open = section.classList.toggle('open');
      this.setAttribute('aria-expanded', String(open));
    });

    groupsEl.appendChild(section);
  });

  // User submitted section
  var userSection = document.createElement('section');
  userSection.className = 'issue-group';
  userSection.id = 'userGroup';
  userSection.style.display = 'none';
  userSection.setAttribute('data-status', 'open');
  userSection.innerHTML =
    '<button class="group-toggle" type="button" aria-expanded="false">' +
      '<span id="userGroupTitle">User Submitted (0)</span>' +
      '<span style="display:flex;align-items:center;gap:.5rem"><span class="badge badge-open" id="userBadge">0</span><span class="chev">&rsaquo;</span></span>' +
    '</button>' +
    '<div class="group-body"><div class="card-grid" id="userBody"></div></div>';
  userSection.querySelector('.group-toggle').addEventListener('click', function() {
    var open = userSection.classList.toggle('open');
    this.setAttribute('aria-expanded', String(open));
  });
  groupsEl.appendChild(userSection);

  // Stats
  function updateStats() {
    document.getElementById('stat-done').textContent = (grouped.done || []).length;
    document.getElementById('stat-partial').textContent = (grouped.partial || []).length;
    document.getElementById('stat-open').textContent = (grouped.open || []).length;
    document.getElementById('stat-deferred').textContent = (grouped.deferred || []).length;
    document.getElementById('stat-total').textContent = issues.length;
  }
  updateStats();

  // Filter
  function applyFilter() {
    document.querySelectorAll('.issue-group').forEach(function(g) {
      var status = g.getAttribute('data-status');
      if (!status) return;

      if (activeFilter === 'all') {
        g.classList.remove('is-hidden');
        g.querySelectorAll('.issue-card').forEach(function(c) { c.style.display = ''; });
        return;
      }

      if (activeFilter.indexOf('tool:') === 0) {
        var toolKey = activeFilter.slice(5);
        var anyVisible = false;
        g.querySelectorAll('.issue-card').forEach(function(c) {
          var match = (c.getAttribute('data-tool') || '') === toolKey;
          c.style.display = match ? '' : 'none';
          if (match) anyVisible = true;
        });
        g.classList.toggle('is-hidden', !anyVisible);
      } else {
        var show = activeFilter === status;
        g.classList.toggle('is-hidden', !show);
        g.querySelectorAll('.issue-card').forEach(function(c) { c.style.display = ''; });
      }
    });
  }

  // User submission persistence
  var SKEY = config.storageKey || 'ui-issues-user';
  function loadUser() { try { return JSON.parse(localStorage.getItem(SKEY) || '[]'); } catch(e) { return []; } }
  function saveUser(list) { try { localStorage.setItem(SKEY, JSON.stringify(list)); } catch(e) {} }
  var msgEl = document.getElementById('formMsg');
  function flash(text, color) {
    msgEl.textContent = text;
    msgEl.style.color = color || 'var(--leaf-bright)';
    msgEl.classList.add('visible');
    setTimeout(function() { msgEl.classList.remove('visible'); }, 2500);
  }

  function renderUserRows() {
    var userBody = document.getElementById('userBody');
    userBody.innerHTML = '';
    var items = loadUser();
    if (!items.length) { userSection.style.display = 'none'; return; }
    userSection.style.display = '';
    document.getElementById('userGroupTitle').textContent = 'User Submitted (' + items.length + ')';
    document.getElementById('userBadge').textContent = items.length;
    items.forEach(function(item, i) {
      var card = document.createElement('div');
      card.className = 'issue-card';
      card.tabIndex = 0;
      if (item.tool) card.setAttribute('data-tool', item.tool);
      card.innerHTML =
        '<div class="card-top"><span class="card-area">' + esc(item.area) + '</span>' +
          '<span class="card-sev card-sev-' + esc(item.severity || 'P2') + '">' + esc(item.severity || 'P2') + '</span></div>' +
        '<div class="card-title">' + esc(item.issue) + '</div>' +
        '<div class="card-expand-hint">click to expand</div>' +
        '<dl class="card-detail"><dt>Impact</dt><dd>' + esc(item.impact) + '</dd>' +
          '<dt>Location</dt><dd>' + esc(item.location) + '</dd></dl>' +
        '<button style="font-family:var(--mono);font-size:.65rem;color:var(--rust);background:none;border:1px solid var(--rust-pale);border-radius:4px;padding:.2rem .5rem;cursor:pointer;margin-top:.3rem" data-idx="' + i + '">&times; Remove</button>';
      card.addEventListener('click', function(e) { if (!e.target.closest('[data-idx]')) card.classList.toggle('expanded'); });
      card.querySelector('[data-idx]').addEventListener('click', function(e) {
        e.stopPropagation();
        var items = loadUser();
        items.splice(i, 1);
        saveUser(items);
        flash('Removed', 'var(--rust)');
        renderUserRows();
      });
      userBody.appendChild(card);
    });
  }

  document.getElementById('issueForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var area = document.getElementById('f-area').value.trim();
    var issue = document.getElementById('f-issue').value.trim();
    var impact = document.getElementById('f-impact').value.trim();
    var location = document.getElementById('f-location').value.trim();
    var severity = document.getElementById('f-sev').value;
    var tool = document.getElementById('f-tool').value.trim();
    if (!area || !issue) { flash('Area and issue are required', 'var(--rust)'); return; }
    var items = loadUser();
    items.push({
      area: area, issue: issue, impact: impact || 'Not specified',
      location: location || 'Not specified', severity: severity,
      tool: tool || '', date: new Date().toISOString().split('T')[0]
    });
    saveUser(items);
    this.reset();
    flash('Added: ' + area + ' issue');
    renderUserRows();
    userSection.classList.add('open');
    userSection.querySelector('.group-toggle').setAttribute('aria-expanded', 'true');
  });

  renderUserRows();
})();
</script>
</body>
</html>
