<svg width="1200" height="860" viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Garden OS Architecture Diagram</title>
  <desc id="desc">Four-layer architecture: UI, Core Engine, Data Model, Persistence with directional data flows.</desc>
  <defs>
    <linearGradient id="layerFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141e2c"/>
      <stop offset="100%" stop-color="#0f1622"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#63d2ff"/>
    </marker>
    <style>
      .bg { fill: #0b1018; }
      .layer { fill: url(#layerFill); stroke: #2a3b52; stroke-width: 1.2; rx: 14; }
      .node { fill: #172537; stroke: #34506f; stroke-width: 1; rx: 10; }
      .edge { stroke: #63d2ff; stroke-width: 2; fill: none; marker-end: url(#arrow); opacity: 0.9; }
      .cross { stroke: #4dcf99; stroke-width: 1.8; fill: none; marker-end: url(#arrow); opacity: 0.85; }
      .layer-title { fill: #9cc1e9; font: 700 13px 'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.08em; text-transform: uppercase; }
      .node-text { fill: #e7efff; font: 600 13px 'DM Sans', 'Segoe UI', system-ui, sans-serif; }
      .title { fill: #eef4ff; font: 700 28px 'DM Sans', 'Segoe UI', system-ui, sans-serif; }
      .subtitle { fill: #9cb3d5; font: 500 13px 'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.06em; text-transform: uppercase; }
      .legend { fill: #9cb3d5; font: 500 12px 'DM Sans', 'Segoe UI', system-ui, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="860"/>

  <text class="title" x="40" y="48">Garden OS Architecture</text>
  <text class="subtitle" x="40" y="72">v4.4 · browser-native, local-first, zero backend</text>

  <!-- Layer containers -->
  <rect class="layer" x="32" y="96" width="1136" height="150"/>
  <rect class="layer" x="32" y="270" width="1136" height="150"/>
  <rect class="layer" x="32" y="444" width="1136" height="150"/>
  <rect class="layer" x="32" y="618" width="1136" height="150"/>

  <text class="layer-title" x="52" y="122">User Interface</text>
  <text class="layer-title" x="52" y="296">Core Engine</text>
  <text class="layer-title" x="52" y="470">Data Model</text>
  <text class="layer-title" x="52" y="644">Persistence</text>

  <!-- UI nodes -->
  <rect class="node" x="60" y="142" width="200" height="78"/>
  <rect class="node" x="280" y="142" width="200" height="78"/>
  <rect class="node" x="500" y="142" width="200" height="78"/>
  <rect class="node" x="720" y="142" width="200" height="78"/>
  <rect class="node" x="940" y="142" width="200" height="78"/>

  <text class="node-text" x="130" y="186">Planner</text>
  <text class="node-text" x="331" y="186">Inspect Panel</text>
  <text class="node-text" x="538" y="186">Scoring Visualizer</text>
  <text class="node-text" x="778" y="186">Build Guide</text>
  <text class="node-text" x="1018" y="186">Ops Guide</text>

  <!-- Engine nodes -->
  <rect class="node" x="120" y="316" width="230" height="78"/>
  <rect class="node" x="370" y="316" width="230" height="78"/>
  <rect class="node" x="620" y="316" width="230" height="78"/>
  <rect class="node" x="870" y="316" width="230" height="78"/>

  <text class="node-text" x="162" y="360">Crop Scoring Engine</text>
  <text class="node-text" x="420" y="360">Adjacency Analyzer</text>
  <text class="node-text" x="669" y="360">Season Evaluator</text>
  <text class="node-text" x="896" y="360">Structural Support Model</text>

  <!-- Data model nodes -->
  <rect class="node" x="60" y="490" width="170" height="78"/>
  <rect class="node" x="245" y="490" width="170" height="78"/>
  <rect class="node" x="430" y="490" width="170" height="78"/>
  <rect class="node" x="615" y="490" width="170" height="78"/>
  <rect class="node" x="800" y="490" width="170" height="78"/>
  <rect class="node" x="985" y="490" width="155" height="78"/>

  <text class="node-text" x="82" y="534">Workspace Model</text>
  <text class="node-text" x="276" y="534">Crop Database</text>
  <text class="node-text" x="451" y="534">Bed Layout Records</text>
  <text class="node-text" x="645" y="534">Cage Configuration</text>
  <text class="node-text" x="847" y="534">Site Settings</text>
  <text class="node-text" x="1017" y="534">JSON Schema</text>

  <!-- Persistence nodes -->
  <rect class="node" x="260" y="664" width="320" height="78"/>
  <rect class="node" x="620" y="664" width="320" height="78"/>
  <text class="node-text" x="365" y="708">localStorage</text>
  <text class="node-text" x="698" y="708">.gos.json Export / Import</text>

  <!-- Vertical layer connectors -->
  <line class="edge" x1="600" y1="220" x2="600" y2="316"/>
  <line class="edge" x1="600" y1="394" x2="600" y2="490"/>
  <line class="edge" x1="600" y1="568" x2="600" y2="664"/>

  <!-- Cross-links: UI -> engine -->
  <line class="cross" x1="160" y1="220" x2="235" y2="316"/>
  <line class="cross" x1="380" y1="220" x2="485" y2="316"/>
  <line class="cross" x1="600" y1="220" x2="735" y2="316"/>

  <!-- Cross-links: engine -> data model -->
  <line class="cross" x1="235" y1="394" x2="145" y2="490"/>
  <line class="cross" x1="485" y1="394" x2="330" y2="490"/>
  <line class="cross" x1="735" y1="394" x2="700" y2="490"/>
  <line class="cross" x1="985" y1="394" x2="1060" y2="490"/>

  <!-- Legend -->
  <text class="legend" x="40" y="810">Flow: UI -> Core Engine -> Data Model -> Persistence</text>
  <text class="legend" x="430" y="810">Garden OS is local-first and deterministic by design.</text>
</svg>
