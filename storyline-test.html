<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden League — Full Storyline Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e12;--card:#1a1a22;--border:#2a2a35;--pass:var(--leaf-bright);--fail:#e85454;--warn:var(--sun-bright);--text:#e8e4dc;--muted:#888;--mono:'SF Mono','Fira Code',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;padding:20px}
h1{font-size:18px;font-weight:600;margin-bottom:4px}
.subtitle{color:var(--muted);font-size:12px;margin-bottom:16px}
.controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
button{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:12px}
button:hover{border-color:var(--pass)}
button.running{border-color:var(--warn);color:var(--warn)}
button.primary{background:var(--pass);color:#000;border-color:var(--pass);font-weight:600}
.progress{color:var(--muted);font-size:12px;min-width:120px}
.log{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:70vh;overflow-y:auto;white-space:pre-wrap;line-height:1.6;font-size:12px}
.log .pass{color:var(--pass)}.log .fail{color:var(--fail)}.log .warn{color:var(--warn)}.log .info{color:var(--muted)}
.log .chapter-head{color:var(--warn);font-weight:600;margin-top:8px;display:block}
.log .narrator-line{color:#9dabcf;padding-left:12px;display:block}
.summary{margin-top:12px;padding:10px;border-radius:8px;font-weight:600;font-size:14px}
.summary.all-pass{background:rgba(90,171,107,.15);color:var(--pass);border:1px solid var(--pass)}
.summary.has-fail{background:rgba(232,84,84,.15);color:var(--fail);border:1px solid var(--fail)}
iframe{position:fixed;bottom:0;right:0;width:1px;height:1px;opacity:0.01;pointer-events:none}
</style>
</head>
<body>
<h1>Garden League — Full Storyline Test</h1>
<div class="subtitle">Plays through all 12 chapters, verifying narrator timing, phase flow, keepsakes, and scoring</div>
<div class="controls">
  <button id="runBtn" class="primary" onclick="runTest()">Run Full Storyline</button>
  <button onclick="runTest(true)">Run Fast (skip narrator wait)</button>
  <button onclick="document.getElementById('log').textContent=''">Clear</button>
  <span class="progress" id="progress"></span>
</div>
<div class="log" id="log"></div>
<div id="summaryBox"></div>
<iframe id="frame" src="garden-league-simulator-v4.html"></iframe>

<script>
const logEl=document.getElementById('log');
const progressEl=document.getElementById('progress');
const summaryEl=document.getElementById('summaryBox');
let passed=0,failed=0,warned=0;

function log(msg,cls='info'){
  const s=document.createElement('span');
  s.className=cls;
  s.textContent=msg+'\n';
  logEl.appendChild(s);
  logEl.scrollTop=logEl.scrollHeight;
}
function logBlock(msg,cls){
  const s=document.createElement('span');
  s.className=cls;
  s.textContent=msg;
  logEl.appendChild(s);
  logEl.scrollTop=logEl.scrollHeight;
}

function assert(condition,label){
  if(condition){passed++;log('  PASS  '+label,'pass')}
  else{failed++;log('  FAIL  '+label,'fail')}
}
function warn(msg){warned++;log('  WARN  '+msg,'warn')}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

// Smart crop placement for a chapter — fills grid with valid crops
function fillGrid(G,chapter,season){
  const C=G.contentWindow.eval('C');
  const TRELLIS=G.contentWindow.eval('TRELLIS');
  const S=G.contentWindow.gardenOS.getState();

  // Get crops unlocked by this chapter
  const available=Object.values(C).filter(c=>c.chapterUnlock<=chapter);
  const climbers=available.filter(c=>c.support);
  const ground=available.filter(c=>!c.support);

  // Sort by season fit descending
  const bySeason=(arr)=>[...arr].sort((a,b)=>(b.sm[season]||0)-(a.sm[season]||0));
  const sortedClimbers=bySeason(climbers);
  const sortedGround=bySeason(ground);

  let ci=0,gi=0;
  for(let i=0;i<32;i++){
    const row=Math.floor(i/8);
    const isTrellis=TRELLIS.has(row);
    let crop;
    if(isTrellis&&sortedClimbers.length){
      crop=sortedClimbers[ci%sortedClimbers.length];ci++;
    }else if(sortedGround.length){
      crop=sortedGround[gi%sortedGround.length];gi++;
    }else{
      crop=available[i%available.length];
    }
    S.grid[i].cropId=crop.id;
  }
  // For Ch7 (row objective: row 3 = all roots), enforce roots in row 3
  if(chapter===7){
    const roots=available.filter(c=>c.faction==='roots');
    if(roots.length){
      for(let c=0;c<8;c++){
        S.grid[3*8+c].cropId=roots[c%roots.length].id;
      }
    }
  }
  // For Ch11 (sauce), ensure recipe ingredients present
  if(chapter===11){
    const sauceCrops=['cherry_tom','basil','pepper','onion','carrot'];
    // Place each at least once in ground rows
    for(let s=0;s<sauceCrops.length;s++){
      const crop=C[sauceCrops[s]];
      if(!crop)continue;
      const targetRow=crop.support?0:2;
      S.grid[targetRow*8+(s%8)].cropId=crop.id;
    }
  }
  G.contentWindow.eval('save();render()');
}

// Drive one chapter from PLANNING through to completion
async function playChapter(G,ch,skipNarratorWait){
  const api=G.contentWindow.gardenOS;
  const PHASES=G.contentWindow.eval('PHASES');
  const BEAT_PHASES=G.contentWindow.eval('BEAT_PHASES');
  const CHAPTERS=G.contentWindow.eval('CHAPTERS');
  const meta=CHAPTERS[ch];
  const isWinter=(ch%4===0);

  logBlock('\n--- Chapter '+ch+': "'+meta.name+'" ('+meta.season+') ---\n','chapter-head');
  progressEl.textContent='Ch '+ch+'/12 ...';

  // Skip to this chapter
  api.skipToChapter(ch);
  await wait(100);

  let S=api.getState();
  let CAM=api.getCampaign();

  // Verify chapter_start mode
  assert(CAM.mode==='chapter_start','Ch'+ch+' starts in chapter_start mode (got: '+CAM.mode+')');

  // Start the chapter (simulate clicking "Begin Chapter")
  G.contentWindow.eval('startChapter('+ch+')');
  await wait(200);

  S=api.getState();
  CAM=api.getCampaign();

  if(isWinter){
    assert(S.phase==='WINTER_REVIEW','Ch'+ch+' winter enters WINTER_REVIEW (got: '+S.phase+')');
    if(ch===12){
      assert(CAM.mode==='epilogue','Ch12 sets epilogue mode (got: '+CAM.mode+')');
    } else {
      assert(CAM.mode==='winter_review','Ch'+ch+' sets winter_review mode (got: '+CAM.mode+')');
    }
    // Check narrator fires for winter review
    if(!skipNarratorWait) await wait(1200);
    CAM=api.getCampaign();
    const winterNarrators=Object.entries(CAM.lastNarratorLines).filter(([k,v])=>v);
    log('  Winter narrator lines: '+winterNarrators.length,'info');
    for(const[ch2,line] of winterNarrators){
      logBlock('    ['+ch2+'] '+line.substring(0,80)+(line.length>80?'...':'')+'\n','narrator-line');
    }
    // Advance through winter
    api.advanceTime();
    await wait(100);
    return;
  }

  // Verify planning phase
  assert(S.phase==='PLANNING','Ch'+ch+' enters PLANNING phase (got: '+S.phase+')');
  assert(S.chapter===ch,'Engine chapter matches (got: '+S.chapter+')');
  assert(S.season===meta.season,'Season matches: '+meta.season+' (got: '+S.season+')');

  // Check narrator lines fired for chapter intro
  if(!skipNarratorWait) await wait(1200);
  CAM=api.getCampaign();
  const narratorChars=Object.keys(CAM.lastNarratorLines).filter(k=>CAM.lastNarratorLines[k]);

  // Check narrator queue system
  const pending=G.contentWindow.eval('_narratorPending');
  const busy=G.contentWindow.eval('_narratorBusy');
  log('  Narrator state: '+narratorChars.length+' active chars, queue='+pending.length+', busy='+busy,'info');

  // Fill the grid with valid crops
  fillGrid(G,ch,meta.season);
  await wait(50);

  S=api.getState();
  const planted=S.grid.filter(c=>c.cropId).length;
  assert(planted>=8,'Grid has enough crops: '+planted+'/32');

  // Commit the board
  G.contentWindow.eval('doCommit()');
  await wait(200);

  S=api.getState();
  assert(BEAT_PHASES.includes(S.phase),'After commit, in beat phase (got: '+S.phase+')');
  assert(S.committedGrid!==null,'Committed grid saved');

  // Advance through 3 beats
  for(let beat=0;beat<3;beat++){
    S=api.getState();
    if(!BEAT_PHASES.includes(S.phase)) break;

    const beatName=['Early','Mid','Late'][S.beatIndex];
    log('  Beat '+beatName+': phase='+S.phase+', event='+(S.currentEvent?S.currentEvent.title:'none'),'info');

    // Check narrator timing between beats
    if(!skipNarratorWait){
      const preLines={...api.getCampaign().lastNarratorLines};
      await wait(800);
      const postLines=api.getCampaign().lastNarratorLines;
      const changed=Object.keys(postLines).some(k=>postLines[k]!==preLines[k]);
      if(changed){
        for(const[ch2,line] of Object.entries(postLines)){
          if(line&&line!==preLines[ch2]){
            logBlock('    ['+ch2+'] '+line.substring(0,80)+(line.length>80?'...':'')+'\n','narrator-line');
          }
        }
      }
    }

    // If there's a pending event decision, accept loss
    if(S.currentEvent&&S.beatTokenAvailable){
      G.contentWindow.eval('S.beatTokenAvailable=false');
      await wait(50);
    }

    api.advanceTime();
    await wait(skipNarratorWait?50:600);
  }

  // Should be in HARVEST now
  S=api.getState();
  if(S.phase==='HARVEST'){
    assert(true,'Reached HARVEST phase');
    assert(S.harvestResult!==null,'Harvest result computed');
    if(S.harvestResult){
      log('  Score: '+S.harvestResult.finalScore.toFixed(1)+' | Grade: '+S.harvestResult.grade+' | Avg: '+S.harvestResult.bedAverage.toFixed(2),'info');
    }

    // Check narrator messages at harvest
    if(!skipNarratorWait) await wait(3500); // Wait for queued narrator messages
    CAM=api.getCampaign();
    const harvestNarrators=Object.entries(CAM.lastNarratorLines).filter(([k,v])=>v);
    if(harvestNarrators.length){
      log('  Harvest narrator lines: '+harvestNarrators.length,'info');
      for(const[ch2,line] of harvestNarrators){
        logBlock('    ['+ch2+'] '+line.substring(0,80)+(line.length>80?'...':'')+'\n','narrator-line');
      }
    }

    // Move to harvest review
    api.advanceTime();
    await wait(100);
    S=api.getState();
    assert(S.phase==='HARVEST_REVIEW','Reached HARVEST_REVIEW (got: '+S.phase+')');

    // Complete chapter
    api.advanceTime();
    await wait(100);
  } else {
    warn('Ch'+ch+' not in HARVEST after beats (phase: '+S.phase+')');
    // Try to advance anyway
    api.advanceTime();await wait(100);
    api.advanceTime();await wait(100);
  }

  // Check campaign state after chapter
  CAM=api.getCampaign();
  assert(CAM.completedChapters.includes(ch),'Ch'+ch+' marked complete');

  if(meta.scoreTarget>0){
    const score=CAM.bestScores[ch]||0;
    log('  Best score: '+score.toFixed(1)+' (target: '+(meta.scoreTarget*10).toFixed(1)+')','info');
  }
}

async function runTest(fast=false){
  const btn=document.getElementById('runBtn');
  btn.classList.add('running');btn.disabled=true;
  logEl.textContent='';summaryEl.innerHTML='';
  passed=0;failed=0;warned=0;

  const G=document.getElementById('frame');

  log('=== Garden League Full Storyline Test ===');
  log('Mode: '+(fast?'Fast (skip narrator waits)':'Full (with narrator timing checks)'));
  log('Started: '+new Date().toLocaleTimeString());
  log('');

  // Wait for iframe to fully load
  log('Waiting for simulator iframe...','info');
  await new Promise(r=>{
    function check(){
      try{
        if(G.contentWindow&&G.contentWindow.gardenOS&&G.contentWindow.eval('typeof C !== "undefined"')){r();return}
      }catch(e){}
      setTimeout(check,200);
    }
    if(G.contentDocument&&G.contentDocument.readyState==='complete') check();
    else G.addEventListener('load',check);
    // Also start polling immediately in case load already fired
    check();
  });
  await wait(500);
  log('Simulator loaded.','info');

  const api=G.contentWindow.gardenOS;

  // --- Pre-flight checks ---
  log('--- Pre-flight ---','info');
  assert(!!api,'gardenOS API available');
  try{
    assert(!!G.contentWindow.eval('C'),'Crop data loaded');
    assert(Object.keys(G.contentWindow.eval('C')).length===19,'19 crops defined');
    assert(!!G.contentWindow.eval('CHAPTERS'),'Chapters loaded');
    assert(Object.keys(G.contentWindow.eval('CHAPTERS')).length===12,'12 chapters defined');
  }catch(e){
    log('  ERROR accessing simulator globals: '+e.message,'fail');failed++;
    btn.classList.remove('running');btn.disabled=false;
    return;
  }

  // Check narrator queue system exists
  assert(typeof G.contentWindow.eval('_drainNarrator')==='function','Narrator queue system present (_drainNarrator)');
  assert(typeof G.contentWindow.eval('NARRATOR_MIN_DISPLAY')==='number','NARRATOR_MIN_DISPLAY constant defined');
  const minDisplay=G.contentWindow.eval('NARRATOR_MIN_DISPLAY');
  log('  NARRATOR_MIN_DISPLAY = '+minDisplay+'ms','info');
  assert(minDisplay>=2000,'Narrator min display >= 2000ms (got: '+minDisplay+')');

  // Reset game state
  api.resetGame();
  await wait(200);

  // --- Play all 12 chapters ---
  for(let ch=1;ch<=12;ch++){
    try{
      await playChapter(G,ch,fast);
    }catch(e){
      log('  ERROR in Ch'+ch+': '+e.message,'fail');
      log('  Stack: '+e.stack,'fail');
      failed++;
    }
  }

  // --- Post-game checks ---
  try{
  log('\n--- Post-Game Checks ---','info');
  const CAM=api.getCampaign();

  // Keepsakes
  const keepsakeKeys=Object.keys(CAM.keepsakes||{});
  log('  Keepsakes earned: '+keepsakeKeys.join(', '),'info');
  assert(keepsakeKeys.includes('moms_trowel'),"Mom's Trowel keepsake earned (Ch1)");
  assert(keepsakeKeys.includes('first_seed_packet'),'First Seed Packet keepsake earned');
  assert(keepsakeKeys.includes('the_photo'),'The Photo keepsake earned (Ch8)');

  // Completed chapters (winter chapters use doTransition not completeChapter, so they may not be in the list)
  const nonWinter=[1,2,3,5,6,7,9,10,11];
  const completedNonWinter=nonWinter.filter(ch=>CAM.completedChapters.includes(ch));
  assert(completedNonWinter.length>=8,'At least 8 non-winter chapters completed (got: '+completedNonWinter.length+': '+completedNonWinter.join(',')+')');
  log('  Completed: ['+CAM.completedChapters.sort((a,b)=>a-b).join(', ')+']','info');

  // Pantry / recipes
  const pantryItems=Object.keys(CAM.pantry||{}).filter(k=>CAM.pantry[k]>0);
  log('  Pantry items: '+pantryItems.join(', '),'info');
  log('  Recipes completed: '+(CAM.recipesCompleted||[]).join(', '),'info');
  }catch(e){log('  ERROR in post-game: '+e.message,'fail');failed++}

  // --- Narrator Timing Stress Test ---
  try{
  log('\n--- Narrator Queue Stress Test ---','info');
  api.resetGame();
  await wait(200);
  api.skipToChapter(1);
  G.contentWindow.eval('startChapter(1)');
  await wait(100);

  // Fire 4 rapid narrator lines and verify queuing
  G.contentWindow.eval(`
    queueNarratorLines([{character:'gurl',line:'Test line 1'}]);
    queueNarratorLines([{character:'onion',line:'Test line 2'}]);
    queueNarratorLines([{character:'vegeman',line:'Test line 3'}]);
    queueNarratorLines([{character:'gurl',line:'Test line 4'}]);
  `);
  await wait(50);
  const pending2=G.contentWindow.eval('_narratorPending.length');
  const busy2=G.contentWindow.eval('_narratorBusy');
  assert(busy2===true,'Narrator busy after rapid fire');
  assert(pending2>=2,'Narrator has queued messages ('+pending2+' pending)');

  // First message should be line 1 (gurl)
  const firstLine=G.contentWindow.eval('CAM.lastNarratorLines.gurl');
  assert(firstLine==='Test line 1','First displayed message is line 1 (got: "'+firstLine+'")');

  // Wait for min display, check second message shows
  await wait(minDisplay+200);
  const secondLine=G.contentWindow.eval('CAM.lastNarratorLines.onion');
  assert(secondLine==='Test line 2','After min display, line 2 appears (got: "'+secondLine+'")');

  // Wait for all messages to drain
  await wait(minDisplay*3+500);
  const finalLine=G.contentWindow.eval('CAM.lastNarratorLines.gurl');
  assert(finalLine==='Test line 4','All queued messages drained, final gurl line is "Test line 4" (got: "'+finalLine+'")');
  const finalPending=G.contentWindow.eval('_narratorPending.length');
  assert(finalPending===0,'Queue fully drained ('+finalPending+' remaining)');
  }catch(e){log('  ERROR in stress test: '+e.message,'fail');failed++}

  // --- Summary ---
  log('\n=== RESULTS ===');
  log('Passed: '+passed+'  Failed: '+failed+'  Warned: '+warned);
  log('Finished: '+new Date().toLocaleTimeString());

  const box=document.createElement('div');
  box.className='summary '+(failed===0?'all-pass':'has-fail');
  box.textContent=failed===0
    ?'ALL '+passed+' CHECKS PASSED'+(warned?' ('+warned+' warnings)':'')
    :failed+' FAILED / '+passed+' passed'+(warned?' / '+warned+' warnings':'');
  summaryEl.appendChild(box);

  progressEl.textContent='Done';
  btn.classList.remove('running');btn.disabled=false;
}
</script>
</body>
</html>
